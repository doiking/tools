<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>Vアバター — 8hammer</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0; overflow: hidden;
    background: transparent;
    color: #f2f2ee;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    -webkit-user-select: none; user-select: none;
  }

  /* ===== ステージ ===== */
  #stage { position: fixed; inset: 0; }
  /* 透過モードのプレビュー用市松(UI表示中のみ。OBS取り込み時はUIを隠す=完全透過) */
  body.bgnone:not(.uihide) #stage {
    background:
      repeating-conic-gradient(#1a1a20 0% 25%, #121216 0% 50%) 0 0 / 28px 28px;
  }

  #wrap {
    position: absolute; bottom: 88px; left: 50%;
    height: 58vh; width: auto;
    transform: translateX(-50%);
    transition: bottom .25s;
  }
  body.uihide #wrap { bottom: 16px; }
  #av { position: relative; height: 100%; will-change: transform; transform-origin: 50% 92%; }
  #chara, #chara2 { height: 100%; width: auto; display: block; }
  #chara3 { position: relative; height: 100%; }
  #chara3 img { height: 100%; width: auto; display: block; pointer-events: none; }
  #chara3 .mO { position: absolute; left: 0; top: 0; }
  #imgAv { position: relative; height: 100%; }
  #imgAv img { height: 100%; width: auto; display: block; pointer-events: none; }
  #imEyes, #imMouth { position: absolute; left: 0; top: 0; }
  #fx { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
  [hidden] { display: none !important; }

  /* ===== 吹き出し ===== */
  #bubble {
    position: absolute; bottom: calc(100% + 16px); left: 50%;
    transform: translateX(-50%);
    width: max-content; max-width: min(74vw, 540px);
    background: #fff; color: #17130a;
    border-radius: 18px; padding: 13px 18px;
    font-size: 20px; font-weight: 600; line-height: 1.55;
    box-shadow: 0 4px 18px rgba(0,0,0,.28);
    white-space: pre-wrap; word-break: break-word;
    animation: pop .18s ease-out;
  }
  #bubble::after {
    content: ""; position: absolute; top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 11px solid transparent; border-top-color: #fff; border-bottom: 0;
  }
  #bubble.fade { animation: fadeout .35s ease-in forwards; }
  @keyframes pop { from { transform: translateX(-50%) scale(.85); opacity: 0; } }
  @keyframes fadeout { to { opacity: 0; transform: translateX(-50%) translateY(-8px); } }

  /* ===== ネームプレート ===== */
  #plate {
    position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);
    background: rgba(14,14,17,.88); border: 1.5px solid #f7c114; color: #f7c114;
    padding: 4px 16px; border-radius: 999px;
    font-size: 15px; font-weight: 700; letter-spacing: .06em; white-space: nowrap;
  }

  /* ===== 下部バー ===== */
  #bar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    background: rgba(18,18,23,.94); border-top: 1px solid #33333c;
  }
  body.uihide #bar { display: none; }
  #msg {
    flex: 1; min-width: 0;
    background: #16161b; color: #f2f2ee;
    border: 1px solid #33333c; border-radius: 10px;
    font-size: 16px; padding: 10px 12px; font-family: inherit;
    -webkit-user-select: text; user-select: text;
  }
  #msg:focus { outline: none; border-color: #f7c114; }
  #bar button {
    flex: none; height: 42px; min-width: 44px; padding: 0 10px;
    background: #24242c; color: #f2f2ee;
    border: 1px solid #33333c; border-radius: 10px;
    font-size: 18px; cursor: pointer; font-family: inherit;
  }
  #bar button:hover, #bar button:active { border-color: #f7c114; }
  #bar button.acc { background: #f7c114; border-color: #f7c114; color: #17130a; font-weight: 700; }
  .sep { flex: none; width: 1px; height: 26px; background: #33333c; }
  @media (max-width: 560px) { .emo { display: none; } }

  /* ===== 設定モーダル ===== */
  #panel {
    position: fixed; inset: 0; z-index: 40;
    background: rgba(0,0,0,.55);
    display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  #pbox {
    width: min(92vw, 460px); max-height: 86vh; overflow: auto;
    background: #1c1c22; border: 1px solid #33333c; border-radius: 14px;
    padding: 18px; display: flex; flex-direction: column; gap: 14px;
  }
  #pbox h2 { margin: 0; font-size: 15px; font-weight: 700; }
  .sec { display: flex; flex-direction: column; gap: 7px; }
  .sec .lbl { font-size: 12px; color: #9a9aa4; font-weight: 600; }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {
    background: #16161b; color: #9a9aa4;
    border: 1.5px solid #33333c; border-radius: 999px;
    font-size: 13px; font-weight: 600; padding: 7px 13px;
    cursor: pointer; font-family: inherit;
  }
  .chip.sel { border-color: #f7c114; color: #f7c114; }
  .chip input[type=color] {
    width: 18px; height: 18px; border: 0; padding: 0; background: none;
    vertical-align: -4px; margin-left: 5px; cursor: pointer;
  }
  .sec input[type=range] { width: 100%; accent-color: #f7c114; }
  .sec input[type=text] {
    background: #16161b; color: #f2f2ee;
    border: 1px solid #33333c; border-radius: 9px;
    font-size: 14px; padding: 9px 11px; font-family: inherit;
    -webkit-user-select: text; user-select: text;
  }
  .sec input[type=text]:focus { outline: none; border-color: #f7c114; }
  .ck { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
  .ck input { accent-color: #f7c114; width: 17px; height: 17px; }
  .imgrow { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .imgrow .nm { width: 5.5em; color: #9a9aa4; flex: none; }
  .imgrow .st { flex: 1; color: #9a9aa4; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .imgrow .st.on { color: #f7c114; }
  .imgrow button {
    flex: none; background: #24242c; color: #f2f2ee;
    border: 1px solid #33333c; border-radius: 8px;
    font-size: 12px; font-weight: 600; padding: 7px 10px; cursor: pointer; font-family: inherit;
  }
  .imgrow button:hover { border-color: #f7c114; }
  .note { font-size: 11px; color: #9a9aa4; line-height: 1.8; margin: 0; }
  #pbtns { display: flex; justify-content: flex-end; }
  #pbtns button {
    background: #f7c114; color: #17130a; border: 1px solid #f7c114;
    border-radius: 9px; font-size: 13px; font-weight: 700;
    padding: 9px 18px; cursor: pointer; font-family: inherit;
  }
  hr { border: 0; border-top: 1px solid #33333c; margin: 2px 0; width: 100%; }
</style>
</head>

          <path d="M40 40 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4z"/>
          <path d="M160 66 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3z"/>

<div id="bar">
  <input id="msg" placeholder="セリフを入力して Enter" enterkeyhint="send">
  <button id="send" class="acc" title="しゃべる">💬</button>
  <div class="sep"></div>
  <button class="emo" data-emo="happy" title="にこにこ">😊</button>
  <button class="emo" data-emo="surprise" title="びっくり">😲</button>
  <button class="emo" data-emo="angry" title="ぷんぷん">💢</button>
  <button class="emo" data-emo="sparkle" title="キラキラ">✨</button>
  <div class="sep"></div>
  <button id="cfgBtn" title="設定">⚙️</button>
  <button id="hideBtn" title="UIを隠す(配信・収録用)">👁</button>
</div>

<div id="panel" hidden>
  <div id="pbox">
    <h2>⚙️ 設定</h2>

    <div class="sec">
      <div class="lbl">背景</div>
      <div class="chips" id="bgChips">
        <button class="chip" data-bg="none">透過</button>
        <button class="chip" data-bg="#00b140">グリーン</button>
        <button class="chip" data-bg="#0047bb">ブルー</button>
        <button class="chip" data-bg="#ff00ff">マゼンタ</button>
        <button class="chip" data-bg="custom">カスタム<input type="color" id="bgColor" value="#00b140"></button>
      </div>
      <p class="note">透過はOBSの「ブラウザソース」でこのページのURLを読み込むとそのまま抜けます(市松模様はプレビュー用で、UIを隠すと消えます)。画面キャプチャで使う場合はクロマ単色にしてクロマキーで抜いてください。</p>
    </div>

    <div class="sec">
      <div class="lbl">キャラクター</div>
      <div class="chips" id="chChips">
        <button class="chip" data-ch="neko">🐱 ねこみみ</button>
        <button class="chip" data-ch="hiyoko">🐣 ひよこ</button>
        <button class="chip" data-ch="human">🧑 人間</button>
      </div>
    </div>

    <div class="sec">
      <div class="lbl">大きさ: <span id="sizeVal"></span>%</div>
      <input type="range" id="size" min="30" max="90" step="1">
    </div>
    <div class="sec">
      <div class="lbl">横位置</div>
      <input type="range" id="posx" min="-40" max="40" step="1">
    </div>
    <div class="sec">
      <div class="lbl">吹き出しの文字サイズ: <span id="fsVal"></span>px</div>
      <input type="range" id="fs" min="14" max="36" step="1">
    </div>
    <div class="sec">
      <div class="lbl">名前(空欄で非表示)</div>
      <input type="text" id="name" placeholder="例: ハチくん" maxlength="20">
    </div>
    <div class="sec">
      <label class="ck"><input type="checkbox" id="speak">セリフを読み上げる(OS内蔵音声・オフライン)</label>
    </div>

    <hr>

    <div class="sec">
      <div class="lbl">キャラ画像の差し替え(PNG推奨・透過対応)</div>
      <div class="imgrow"><span class="nm">ベース</span><span class="st" id="stBase">内蔵キャラ</span><button data-img="base">選択</button><button data-clr="base">✕</button></div>
      <div class="imgrow"><span class="nm">口あき</span><span class="st" id="stMouth">なし</span><button data-img="mouth">選択</button><button data-clr="mouth">✕</button></div>
      <div class="imgrow"><span class="nm">目とじ</span><span class="st" id="stEyes">なし</span><button data-img="eyes">選択</button><button data-clr="eyes">✕</button></div>
      <p class="note">3枚とも同じキャンバスサイズで描いてください。しゃべる間は「口あき」、まばたき時は「目とじ」がベースの上に重なります。画像はこの端末(ブラウザ)にのみ保存され、外部には送信されません。</p>
      <input type="file" id="imgFile" accept="image/*" hidden>
    </div>

    <div id="pbtns"><button id="pClose">閉じる</button></div>
  </div>
</div>

<script>
(function () {
  "use strict";
  const $ = (id) => document.getElementById(id);

  /* ===== 設定 ===== */
  const PREF_KEY = "vtuber.v1";
  const IMG_KEY = "vtuber.img.v1";
  const DEF = { bg: "none", custom: "#00b140", size: 58, posx: 0, fs: 20, name: "", speak: false, chara: "neko" };
  const CHARAS = { hiyoko: "chara", human: "chara2", neko: "chara3" };
  let pref = { ...DEF };
  try { pref = { ...DEF, ...(JSON.parse(localStorage.getItem(PREF_KEY)) || {}) }; } catch (e) {}
  let imgs = {};
  try { imgs = JSON.parse(localStorage.getItem(IMG_KEY)) || {}; } catch (e) {}
  const save = () => localStorage.setItem(PREF_KEY, JSON.stringify(pref));
  const saveImgs = () => {
    try { localStorage.setItem(IMG_KEY, JSON.stringify(imgs)); return true; }
    catch (e) { alert("画像が大きすぎて保存できませんでした。小さい画像でお試しください。"); return false; }
  };

  function applyPref() {
    document.body.classList.toggle("bgnone", pref.bg === "none");
    document.body.style.background =
      pref.bg === "none" ? "transparent" : (pref.bg === "custom" ? pref.custom : pref.bg);
    $("wrap").style.height = pref.size + "vh";
    $("wrap").style.left = (50 + pref.posx) + "%";
    $("bubble").style.fontSize = pref.fs + "px";
    $("plate").hidden = !pref.name.trim();
    $("plate").textContent = pref.name.trim();
    // 設定UIへ反映
    document.querySelectorAll("#bgChips .chip").forEach((c) =>
      c.classList.toggle("sel", c.dataset.bg === pref.bg));
    document.querySelectorAll("#chChips .chip").forEach((c) =>
      c.classList.toggle("sel", c.dataset.ch === pref.chara));
    $("bgColor").value = pref.custom;
    $("size").value = pref.size; $("sizeVal").textContent = pref.size;
    $("posx").value = pref.posx;
    $("fs").value = pref.fs; $("fsVal").textContent = pref.fs;
    $("name").value = pref.name;
    $("speak").checked = pref.speak;
  }

  function applyImgs() {
    const useImg = !!imgs.base;
    const cur = CHARAS[pref.chara] || "chara3";
    Object.values(CHARAS).forEach((id) => setShow(id, !useImg && id === cur));
    $("imgAv").hidden = !useImg;
    if (useImg) {
      $("imBase").src = imgs.base;
      $("imMouth").src = imgs.mouth || "";
      $("imEyes").src = imgs.eyes || "";
    }
    $("stBase").textContent = imgs.base ? "設定済み" : "内蔵キャラ";
    $("stBase").classList.toggle("on", !!imgs.base);
    $("stMouth").textContent = imgs.mouth ? "設定済み" : "なし";
    $("stMouth").classList.toggle("on", !!imgs.mouth);
    $("stEyes").textContent = imgs.eyes ? "設定済み" : "なし";
    $("stEyes").classList.toggle("on", !!imgs.eyes);
  }

  /* ===== アニメ状態 ===== */
  let blinkUntil = 0, nextBlink = performance.now() + 2000;
  let talkUntil = 0, speaking = false;
  let emote = null; // {type, start, until}
  let bubbleTimer = 0, typeTimer = 0;

  // SVG要素は .hidden プロパティが効かないため属性で切り替える
  const setShow = (id, on) => { $(id).toggleAttribute("hidden", !on); };

  function fireEmote(type) {
    const now = performance.now();
    const dur = { happy: 1400, surprise: 1200, angry: 1100, sparkle: 1500 }[type];
    emote = { type, start: now, until: now + dur };
  }

  /* ===== 吹き出し・セリフ ===== */
  function say(text) {
    text = text.trim();
    if (!text) return;
    clearTimeout(bubbleTimer); clearInterval(typeTimer);
    const b = $("bubble");
    b.classList.remove("fade"); b.hidden = false; b.textContent = "";
    let i = 0;
    const SPEED = 55;
    typeTimer = setInterval(() => {
      i++;
      b.textContent = text.slice(0, i);
      if (i >= text.length) {
        clearInterval(typeTimer);
        bubbleTimer = setTimeout(() => {
          b.classList.add("fade");
          bubbleTimer = setTimeout(() => { b.hidden = true; }, 380);
        }, 1800 + text.length * 45);
      }
    }, SPEED);
    talkUntil = performance.now() + text.length * SPEED + 200;

    if (pref.speak && "speechSynthesis" in window) {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "ja-JP"; u.rate = 1.05;
      u.onstart = () => { speaking = true; };
      u.onend = u.onerror = () => { speaking = false; };
      speechSynthesis.speak(u);
    }
  }

  /* ===== メインループ ===== */
  function loop(t) {
    // まばたき
    if (t > nextBlink) {
      blinkUntil = t + 130;
      nextBlink = t + 2200 + Math.random() * 3800 + (Math.random() < 0.2 ? -1800 : 0);
    }
    const blinking = t < blinkUntil;
    const talking = t < talkUntil || speaking;
    const mouthOpen = talking && Math.floor(t / 130) % 2 === 0;

    // エモート
    let jumpY = 0, shakeX = 0, e = emote;
    if (e && t > e.until) { emote = e = null; }
    const p = e ? (t - e.start) / (e.until - e.start) : 0;
    if (e) {
      if (e.type === "happy") jumpY = -Math.abs(Math.sin(p * Math.PI * 2)) * 16;
      if (e.type === "surprise") jumpY = -Math.sin(Math.min(p * 2, 1) * Math.PI) * 42;
      if (e.type === "angry") shakeX = Math.sin(t / 34) * 3;
      if (e.type === "sparkle") jumpY = -Math.abs(Math.sin(p * Math.PI * 3)) * 7;
    }

    // 顔パーツ切り替え(内蔵キャラ: 表示中のSVG内をクラスで切り替え)
    const av2 = $(CHARAS[pref.chara] || "chara3");
    const part = (cls, on) => {
      const el = av2.querySelector("." + cls);
      if (el) el.toggleAttribute("hidden", !on);
    };
    const happyEyes = e && (e.type === "happy" || e.type === "sparkle");
    part("eyesH", happyEyes && !blinking);
    part("eyesC", blinking && !happyEyes);
    part("eyesO", !blinking && !happyEyes);
    part("brows", !!e && e.type === "angry");
    const openMouth = mouthOpen || (e && e.type === "surprise");
    part("mO", !!openMouth);
    part("mC", !openMouth);
    setShow("fxEx", !!e && e.type === "surprise");
    setShow("fxAng", !!e && e.type === "angry");
    setShow("fxSpk", !!e && e.type === "sparkle" && Math.floor(t / 160) % 2 === 0);
    const wave = av2.querySelector(".wave");
    if (wave) {
      if (e && e.type === "sparkle") {
        wave.setAttribute("transform", `rotate(${Math.sin(p * Math.PI * 4) * 28} ${wave.dataset.pivot})`);
      } else {
        wave.removeAttribute("transform");
      }
    }

    // 画像差し替えモード
    if (!$("imgAv").hidden) {
      $("imMouth").hidden = !(openMouth && imgs.mouth);
      $("imEyes").hidden = !(blinking && imgs.eyes);
    }

    // ゆらゆら・呼吸
    const rot = Math.sin(t / 1300) * 1.8;
    const bob = Math.sin(t / 900) * 3;
    const breath = 1 + Math.sin(t / 1100) * 0.008;
    $("av").style.transform =
      `translate(${shakeX}px, ${bob + jumpY}px) rotate(${rot}deg) scale(${breath})`;
    const ah = av2.querySelector(".ahoge");
    if (ah) ah.setAttribute("transform", `rotate(${Math.sin(t / 500) * 6} ${ah.dataset.pivot})`);

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  /* ===== UIイベント ===== */
  const sendMsg = () => { say($("msg").value); $("msg").value = ""; $("msg").focus(); };
  $("send").addEventListener("click", sendMsg);
  $("msg").addEventListener("keydown", (ev) => {
    if (ev.key === "Enter" && !ev.isComposing) { ev.preventDefault(); sendMsg(); }
  });
  document.querySelectorAll(".emo").forEach((b) =>
    b.addEventListener("click", () => fireEmote(b.dataset.emo)));

  // UI非表示(配信・収録用)
  function setUiHide(on) {
    document.body.classList.toggle("uihide", on);
  }
  $("hideBtn").addEventListener("click", () => setUiHide(true));
  document.addEventListener("pointerdown", (ev) => {
    if (document.body.classList.contains("uihide")) { ev.preventDefault(); setUiHide(false); }
  });
  document.addEventListener("keydown", (ev) => {
    if (ev.key === "Escape") setUiHide(!document.body.classList.contains("uihide"));
  });
  if (new URLSearchParams(location.search).get("ui") === "0") setUiHide(true);

  // 設定パネル
  $("cfgBtn").addEventListener("click", () => { $("panel").hidden = false; });
  $("pClose").addEventListener("click", () => { $("panel").hidden = true; });
  $("panel").addEventListener("click", (ev) => { if (ev.target === $("panel")) $("panel").hidden = true; });

  document.querySelectorAll("#bgChips .chip").forEach((c) =>
    c.addEventListener("click", () => { pref.bg = c.dataset.bg; save(); applyPref(); }));
  document.querySelectorAll("#chChips .chip").forEach((c) =>
    c.addEventListener("click", () => { pref.chara = c.dataset.ch; save(); applyPref(); applyImgs(); }));
  $("bgColor").addEventListener("input", () => {
    pref.bg = "custom"; pref.custom = $("bgColor").value; save(); applyPref();
  });
  $("bgColor").addEventListener("click", (ev) => ev.stopPropagation());
  $("size").addEventListener("input", () => { pref.size = +$("size").value; save(); applyPref(); });
  $("posx").addEventListener("input", () => { pref.posx = +$("posx").value; save(); applyPref(); });
  $("fs").addEventListener("input", () => { pref.fs = +$("fs").value; save(); applyPref(); });
  $("name").addEventListener("input", () => { pref.name = $("name").value; save(); applyPref(); });
  $("speak").addEventListener("change", () => { pref.speak = $("speak").checked; save(); });

  // 画像差し替え
  let imgTarget = null;
  document.querySelectorAll("[data-img]").forEach((b) =>
    b.addEventListener("click", () => { imgTarget = b.dataset.img; $("imgFile").click(); }));
  document.querySelectorAll("[data-clr]").forEach((b) =>
    b.addEventListener("click", () => {
      if (b.dataset.clr === "base") { delete imgs.base; delete imgs.mouth; delete imgs.eyes; }
      else delete imgs[b.dataset.clr];
      saveImgs(); applyImgs();
    }));
  $("imgFile").addEventListener("change", () => {
    const file = $("imgFile").files[0];
    $("imgFile").value = "";
    if (!file || !imgTarget) return;
    const img = new Image();
    img.onload = () => {
      const MAX = 1000;
      const sc = Math.min(1, MAX / Math.max(img.width, img.height));
      const cv = document.createElement("canvas");
      cv.width = Math.round(img.width * sc); cv.height = Math.round(img.height * sc);
      cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
      const url = cv.toDataURL("image/png");
      if (url.length > 2_500_000) { alert("画像が大きすぎます。もっと小さい画像にしてください。"); return; }
      imgs[imgTarget] = url;
      if (saveImgs()) applyImgs();
      URL.revokeObjectURL(img.src);
    };
    img.src = URL.createObjectURL(file);
  });

  applyPref(); applyImgs();

  // 初回デモ
  if (!localStorage.getItem(PREF_KEY)) {
    setTimeout(() => say("こんにちは!下の欄にセリフを入力してね"), 600);
  }
  save();

  if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
})();
</script>

<!-- 要望・不具合の送信(全ツール共通ウィジェット) -->
<script>
(function () {
  "use strict";
  var TOOL = "Vアバター";
  var MAIL = "doi@8hammer.com";
  var st = document.createElement("style");
  st.textContent =
    "#fbBtn{position:fixed;right:14px;bottom:76px;z-index:40;width:36px;height:36px;border-radius:50%;" +
    "background:#1c1c22;color:#9a9aa4;border:1px solid #33333c;font-size:16px;padding:0;cursor:pointer;opacity:.6;}" +
    "#fbBtn:hover,#fbBtn:active{opacity:1;border-color:#f7c114;color:#f7c114;}" +
    "body.uihide #fbBtn{display:none;}" +
    "#fbWrap{position:fixed;inset:0;z-index:41;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:16px;}" +
    "#fbWrap[hidden]{display:none;}" +
    "#fbBox{width:min(92vw,400px);background:#1c1c22;color:#f2f2ee;border:1px solid #33333c;border-radius:14px;padding:16px;" +
    "display:flex;flex-direction:column;gap:10px;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;}" +
    "#fbBox h2{font-size:14px;font-weight:700;margin:0;}" +
    "#fbText{width:100%;background:#16161b;color:#f2f2ee;border:1px solid #33333c;border-radius:9px;font-size:14px;line-height:1.7;" +
    "padding:10px;resize:vertical;font-family:inherit;-webkit-user-select:text;user-select:text;}" +
    "#fbText:focus{outline:none;border-color:#f7c114;}" +
    "#fbNote{font-size:11px;color:#9a9aa4;line-height:1.7;}" +
    "#fbBtns{display:flex;gap:8px;justify-content:flex-end;}" +
    "#fbBtns button{background:#24242c;color:#f2f2ee;border:1px solid #33333c;border-radius:9px;font-size:13px;font-weight:600;" +
    "padding:9px 14px;cursor:pointer;font-family:inherit;}" +
    "#fbBtns button:hover,#fbBtns button:active{border-color:#f7c114;}" +
    "#fbBtns button.acc{background:#f7c114;color:#17130a;border-color:#f7c114;font-weight:700;}" +
    "#fbCopy{margin-right:auto;}";
  document.head.appendChild(st);

  var btn = document.createElement("button");
  btn.id = "fbBtn";
  btn.title = "要望・不具合を送る";
  btn.textContent = "📮";
  document.body.appendChild(btn);

  var wrap = document.createElement("div");
  wrap.id = "fbWrap";
  wrap.hidden = true;
  wrap.innerHTML =
    '<div id="fbBox"><h2>📮 要望・不具合を送る — ' + TOOL + "</h2>" +
    '<textarea id="fbText" rows="5" placeholder="例: ○○ができると助かる / ○○のときに表示が崩れる など"></textarea>' +
    '<div id="fbNote">送信すると共有シート（またはメール作成画面）が開きます。ツール名・画面サイズなどの環境情報を自動で添付します（作業データは送られません）。</div>' +
    '<div id="fbBtns"><button id="fbCopy">コピー</button><button id="fbCancel">キャンセル</button><button id="fbSend" class="acc">送信</button></div></div>';
  document.body.appendChild(wrap);

  function buildText() {
    var body = document.getElementById("fbText").value.trim();
    return "【要望・不具合】" + TOOL + "\n" + body +
      "\n\n--- 環境情報 ---" +
      "\nツール: " + TOOL +
      "\nURL: " + location.href +
      "\n画面: " + window.innerWidth + "x" + window.innerHeight +
      "\nUA: " + navigator.userAgent;
  }
  function close() { wrap.hidden = true; }
  function mailto(text) {
    location.href = "mailto:" + MAIL +
      "?subject=" + encodeURIComponent("【8hammer Tools】" + TOOL + " への要望") +
      "&body=" + encodeURIComponent(text);
  }
  btn.addEventListener("click", function () { wrap.hidden = false; document.getElementById("fbText").focus(); });
  wrap.addEventListener("click", function (e) { if (e.target === wrap) close(); });
  document.getElementById("fbCancel").addEventListener("click", close);
  document.getElementById("fbCopy").addEventListener("click", function () {
    if (navigator.clipboard) navigator.clipboard.writeText(buildText());
    close();
  });
  document.getElementById("fbSend").addEventListener("click", function () {
    var t = document.getElementById("fbText");
    if (!t.value.trim()) { t.focus(); return; }
    var text = buildText();
    if (window.matchMedia("(pointer: coarse)").matches && navigator.share) {
      navigator.share({ text: text }).then(close).catch(function (e) {
        if (e && e.name === "AbortError") return;
        mailto(text); close();
      });
    } else { mailto(text); close(); }
  });
})();
</script>
