<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e11">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<title>絵コンテ — 8hammer</title>
<style>
  :root {
    --bg: #0e0e11;
    --panel: #1c1c22;
    --line: #33333c;
    --fg: #f2f2ee;
    --dim: #9a9aa4;
    --accent: #f7c114;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    min-height: 100dvh;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    touch-action: manipulation;
  }
  button { font-family: inherit; }

  /* ---------- 左サイドバー + メイン(アプリ型: 左端に全高で固定) ---------- */
  #layout { display: flex; align-items: flex-start; }
  #side {
    width: 224px; flex: none;
    position: sticky; top: 0;
    height: 100dvh;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 8px;
    background: var(--panel);
    border-right: 1px solid var(--line);
    padding: calc(12px + env(safe-area-inset-top)) 12px calc(14px + env(safe-area-inset-bottom)) calc(12px + env(safe-area-inset-left));
  }
  #sideTop {
    display: flex; align-items: center; gap: 8px;
    margin: 0 -12px;
    padding: 2px 12px 12px;
    border-bottom: 1px solid var(--line);
  }
  #sideTop img { height: 20px; }
  #sideTop h1 { font-size: 15px; font-weight: 700; margin: 0; }
  #side .ptitle { font-size: 11px; letter-spacing: .08em; color: var(--dim); margin: 8px 0 0; }
  #boardTitle {
    width: 100%;
    background: #16161b; color: var(--fg);
    border: 1px solid var(--line); border-radius: 9px;
    font-size: 13.5px; font-weight: 600; padding: 9px 10px;
    -webkit-user-select: text; user-select: text;
  }
  #boardTitle:focus { outline: none; border-color: var(--accent); }
  #boardList { display: flex; flex-direction: column; gap: 2px; max-height: 28vh; overflow-y: auto; }
  .bitem {
    padding: 8px 10px;
    border: 1px solid transparent;
    border-radius: 8px;
    font-size: 13px;
    color: var(--dim);
    cursor: pointer;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .bitem.sel { background: #24242c; border-color: var(--accent); color: var(--fg); }
  #side button {
    background: #24242c; color: var(--fg);
    border: 1px solid var(--line); border-radius: 9px;
    font-size: 12.5px; font-weight: 600; padding: 9px 6px;
    white-space: nowrap;
  }
  #side button:hover, #side button:active { border-color: var(--accent); }
  #side button.acc { background: var(--accent); color: #17130a; border-color: var(--accent); font-weight: 700; font-size: 13.5px; }
  #side button.danger { color: #ff8484; }
  .btnRow { display: flex; gap: 6px; }
  .btnRow button { flex: 1; }
  #total { font-size: 12px; color: var(--dim); line-height: 1.7; }
  #total b { color: var(--accent); font-size: 14px; font-variant-numeric: tabular-nums; }
  #addCol { display: none; } /* デスクトップは表ヘッダ右端の＋を使う */
  #side .ptitle.bottom { margin-top: auto; } /* 書き出しを最下部に */

  #main {
    flex: 1; min-width: 0;
    padding: calc(10px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) calc(20px + env(safe-area-inset-bottom)) 14px;
  }
  #grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }
  :root { --sbcols: 46px 300px 1.1fr 0.9fr 64px 44px; }
  #listHead {
    display: grid;
    grid-template-columns: var(--sbcols);
    gap: 0;
    position: sticky;
    top: 0;
    z-index: 5;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 11px; color: var(--dim); letter-spacing: .08em;
  }
  #listHead span { padding: 9px 8px; }
  #listHead .colHead { display: flex; align-items: center; gap: 4px; }
  #listHead .colHead a { color: var(--accent); cursor: pointer; text-decoration: underline dotted; }
  #listHead .colHead button {
    border: none; background: transparent; color: var(--dim);
    font-size: 10px; padding: 0 2px; cursor: pointer;
  }
  #listHead .secHead { display: flex; align-items: center; gap: 6px; padding: 4px 6px; }
  #listHead .addBtn {
    width: 24px; height: 22px; flex: none;
    background: transparent; color: var(--dim);
    border: 1px dashed var(--line); border-radius: 6px;
    font-size: 13px; line-height: 1; padding: 0;
    cursor: pointer;
  }
  #listHead .addBtn:hover, #listHead .addBtn:active { border-color: var(--accent); color: var(--accent); }
  .cell .lbl.exl { text-decoration: underline dotted; cursor: pointer; }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    display: grid;
    grid-template-columns: var(--sbcols);
    align-items: stretch;
    transition: border-color .15s;
  }
  .card:focus-within { border-color: #8a7420; } /* 編集中のカットを示す控えめな黄 */
  .cno {
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800; color: var(--accent);
    background: #17171d;
    border-right: 1px solid #26262c;
  }
  .frame {
    aspect-ratio: 16 / 9;
    background: #101014;
    position: relative;
    cursor: pointer;
    align-self: center;
    border-right: 1px solid #26262c;
    width: 100%;
  }
  .frame img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .frame .empty {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--dim); font-size: 12px; gap: 4px; text-align: center;
  }
  .frame .empty .big { font-size: 24px; }
  .cell {
    display: flex; flex-direction: column;
    border-right: 1px solid #26262c;
    padding: 6px;
    min-width: 0; /* textareaの固有幅でgrid列が広がるのを防ぐ */
  }
  .cell .lbl { display: none; font-size: 10.5px; color: var(--dim); letter-spacing: .08em; margin: 2px 2px 4px; }
  .cell textarea {
    flex: 1;
    width: 100%;
    min-width: 0;
    min-height: 96px;
    background: transparent; color: var(--fg);
    border: none; border-radius: 6px;
    font-size: 13.5px; line-height: 1.65;
    padding: 6px 7px;
    resize: none;
    font-family: inherit;
    -webkit-user-select: text; user-select: text;
  }
  .cell textarea:focus { outline: none; background: #16161b; }
  .secCell { align-items: center; justify-content: center; gap: 4px; }
  .secCell input {
    width: 50px;
    background: #16161b; color: var(--fg);
    border: 1px solid var(--line); border-radius: 7px;
    font-size: 15px; font-weight: 700; padding: 7px 5px; text-align: center;
    -webkit-user-select: text; user-select: text;
  }
  .secCell input:focus { outline: none; border-color: var(--accent); }
  .secCell .unit { font-size: 10.5px; color: var(--dim); }
  .secBtns { display: flex; gap: 4px; }
  .secBtns button {
    width: 24px; height: 22px;
    background: #24242c; color: var(--fg);
    border: 1px solid var(--line); border-radius: 6px;
    font-size: 13px; line-height: 1; padding: 0;
    cursor: pointer;
  }
  .secBtns button:hover, .secBtns button:active { border-color: var(--accent); }
  .ctrl {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px; padding: 6px 0;
  }
  .ctrl button {
    width: 32px; height: 30px;
    background: #24242c; color: var(--fg);
    border: 1px solid var(--line); border-radius: 7px;
    font-size: 13px; padding: 0;
  }
  .ctrl button:hover, .ctrl button:active { border-color: var(--accent); }
  .ctrl button.del { color: #ff8484; }
  .ctrl button.b3d:active { background: var(--accent); color: #17130a; }

  /* スマホ: サイドバーを上部ブロックに */
  @media (max-width: 700px) {
    #layout { flex-direction: column; }
    #side {
      position: static; width: auto; height: auto; max-height: none; align-self: stretch;
      border-right: none; border-bottom: 1px solid var(--line);
    }
    #main { padding: 10px 12px calc(20px + env(safe-area-inset-bottom)); }
    #side .ptitle.bottom { margin-top: 0; }
    #addCol { display: block; }
    #boardList { flex-direction: row; flex-wrap: wrap; max-height: none; }
    .bitem { max-width: 46%; }
  }
  @media (max-width: 700px) {
    #listHead { display: none; }
    .card { grid-template-columns: 1fr; }
    .cno, .frame, .cell { border-right: none; }
    .cno { justify-content: flex-start; padding: 8px 12px 0; }
    .frame { border-bottom: 1px solid #26262c; }
    .cell .lbl { display: block; }
    .cell textarea { min-height: 56px; background: #16161b; }
    .secCell { flex-direction: row; justify-content: flex-start; padding: 6px 10px; }
    .ctrl { flex-direction: row; justify-content: flex-end; padding: 4px 8px 8px; }
  }

  #addCard {
    border: 2px dashed var(--line);
    border-radius: 14px;
    min-height: 68px;
    display: flex; align-items: center; justify-content: center;
    color: var(--dim); font-size: 15px;
    background: transparent;
    cursor: pointer;
  }
  #addCard:active { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 640px) {
    .card {
      grid-template-columns: 1fr;
      grid-template-areas: "head" "frame" "body";
      grid-template-rows: auto auto auto;
    }
    .frame { border-right: none; border-bottom: 1px solid #26262c; align-self: stretch; }
  }

  /* ---------- 共通モーダル ---------- */
  #modal {
    position: fixed; inset: 0; z-index: 30;
    background: rgba(0, 0, 0, .55);
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  #modal[hidden] { display: none; }
  #modalBox {
    width: min(92vw, 380px);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  #modalTitle { font-size: 14px; font-weight: 700; }
  #modalBody { display: flex; flex-direction: column; gap: 10px; }
  #modalBody label { font-size: 11.5px; letter-spacing: .06em; color: var(--dim); display: block; margin-bottom: 4px; }
  #modalBody input[type=text], #modalBody select {
    width: 100%;
    background: #16161b; color: var(--fg);
    border: 1px solid var(--line); border-radius: 9px;
    font-size: 14px; padding: 9px 10px;
    -webkit-user-select: text; user-select: text;
  }
  #modalBody input:focus, #modalBody select:focus { outline: none; border-color: var(--accent); }
  #modalBody .note { font-size: 11.5px; color: var(--dim); line-height: 1.6; }
  #modalBtns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  #modalBtns button {
    background: #24242c; color: var(--fg);
    border: 1px solid var(--line); border-radius: 9px;
    font-size: 13px; font-weight: 600; padding: 9px 14px;
    cursor: pointer;
  }
  #modalBtns button:hover, #modalBtns button:active { border-color: var(--accent); }
  #modalBtns button.acc { background: var(--accent); color: #17130a; border-color: var(--accent); font-weight: 700; }
  #modalBtns button.danger { color: #ff8484; margin-right: auto; }

  #toast {
    position: fixed; left: 50%; bottom: 24px;
    transform: translateX(-50%);
    background: var(--accent); color: #17130a;
    font-size: 14px; font-weight: 700;
    padding: 10px 18px; border-radius: 12px;
    z-index: 20;
    display: none;
  }

  /* ---------- print (PDF / A4) ---------- */
  /* ページは印刷時にJSで明示的に組む(.psheet = 1ページ)。
     計測のため印刷用スタイルは@media printの外に置き、通常時はdisplay:noneで隠す */
  #printView { display: none; background: #fff; color: #000; }
  #printView.measure { display: block; position: absolute; left: -10000px; top: 0; width: 186mm; }
  @page { size: A4 portrait; margin: 12mm 12mm 14mm; }
  @media print {
    body { background: #fff; color: #000; padding: 0; }
    #layout, #addCard, #toast { display: none !important; }
    #printView { display: block; }
  }
  #printView .psheet {
    height: 268mm;
    display: flex; flex-direction: column;
    break-after: page;
    overflow: hidden;
  }
  #printView .psheet:last-child { break-after: auto; }
  #printView .pcover {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    gap: 6mm;
  }
  #printView .pcover .plogoBig { height: 14mm; margin-bottom: 10mm; }
  #printView .pcover .plabel {
    font-size: 11pt; letter-spacing: .5em; color: #333;
    border-top: 1px solid #000; border-bottom: 1px solid #000;
    padding: 2mm 6mm;
  }
  #printView .pcover .ptitle { font-size: 26pt; font-weight: 800; margin: 4mm 0 0; }
  #printView .pcover .pinfo { font-size: 11pt; color: #222; margin-top: 8mm; line-height: 1.9; }
  #printView .pcover .pfoot { font-size: 9pt; color: #555; margin-top: 22mm; }
  #printView .phead {
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid #000;
    padding-bottom: 2mm; margin-bottom: 4mm;
  }
  #printView h1 { font-size: 16pt; margin: 0; }
  #printView .plogo { height: 8mm; }
  #printView .meta { font-size: 9pt; color: #444; margin-bottom: 4mm; }
  #printView table {
    width: calc(100% - 1mm); /* 右端の罫線がページ端で切れるのを防ぐ */
    border-collapse: collapse;
    border: 1.2px solid #888;
  }
  #printView th, #printView td {
    border: 1px solid #888;
    padding: 2mm;
    font-size: 9.5pt;
    vertical-align: top;
    text-align: left;
  }
  #printView th { background: #eee; font-size: 8.5pt; }
  #printView td.no { width: 8mm; font-weight: 700; text-align: center; }
  #printView td.pic { width: 62mm; }
  #printView td.pic img { width: 100%; display: block; }
  #printView td.sec { width: 12mm; text-align: center; }
  #printView tr { break-inside: avoid; }
  #printView .white { white-space: pre-wrap; }
  #printView .pfoot2 {
    margin-top: auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 6mm;
    border-top: .5px solid #999;
    padding-top: 1.5mm;
    font-size: 7.5pt; color: #555;
  }
  #printView .pfoot2 .pnum { white-space: nowrap; }
</style>
</head>

<aside id="side">
  <div id="sideTop">

  <h1>絵コンテ</h1>
  </div>

  <div class="ptitle">作品名・シーン名</div>
  <input id="boardTitle" placeholder="作品名・シーン名" autocomplete="off">

  <div class="ptitle">ボード</div>
  <div id="boardList"></div>
  <div class="btnRow">
    <button id="newBoard">＋新規</button>
    <button id="dupBoard">複製</button>
    <button id="delBoard" class="danger">削除</button>
  </div>

  <div class="ptitle">表</div>
  <button id="addCol" title="このボードに列を追加(機材・備考など)">＋列を追加</button>
  <div id="total"></div>
  <!-- ＋列はデスクトップでは表ヘッダ右端の「＋」から。サイドバーのボタンはスマホ用 -->

  <div class="ptitle bottom">書き出し</div>
  <div class="btnRow">
    <button id="jsonOut" title="バックアップ">JSON保存</button>
    <button id="jsonIn" title="復元">読込</button>
  </div>
  <button id="printBtn" class="acc">🖨 印刷 / PDF</button>
</aside>

<main id="main">
  <div id="grid"></div>
</main>
</div>

<div id="printView"></div>

<div id="modal" hidden>
  <div id="modalBox">
    <div id="modalTitle"></div>
    <div id="modalBody"></div>
    <div id="modalBtns"></div>
  </div>
</div>

<div id="toast"></div>
<input type="file" id="fileIn" accept="image/*" hidden>
<input type="file" id="jsonFileIn" accept="application/json" hidden>

<script>

/* ---------- state ---------- */
/* 組み込みの文字列列(No・画・秒・操作は位置固定、この2つとカスタム列は並び替え可) */
const BUILTIN_COLS = {
  action: { label: "アクション / カメラ", ph: "例: Aが振り返る。ドリーで寄り", fr: "1.1fr", cls: "act" },
  dialog: { label: "セリフ / 音", ph: "例: A「おはよう」/ SE: ドアの音", fr: "0.9fr", cls: "dia" },
};

function newCut(partial) {
  return Object.assign({ id: newId(), img: null, sec: 3, action: "", dialog: "", ex: {} }, partial || {});
}
function newBoard(title) {
  return { id: newId(), title: title || "", cols: [], colNames: {}, colOrder: ["action", "dialog"], cuts: [newCut()] };
}
let state = { boards: [], currentId: null };
try { const raw = localStorage.getItem(LS_KEY); if (raw) state = JSON.parse(raw); } catch (e) {}
if (!state.boards || !state.boards.length) {
  const b = newBoard("");
  state = { boards: [b], currentId: b.id };
}
if (!state.boards.find(b => b.id === state.currentId)) state.currentId = state.boards[0].id;
for (const b of state.boards) fixBoard(b); // 旧データ互換

function fixBoard(b) {
  if (!b.cols) b.cols = [];
  if (!b.colNames) b.colNames = {}; // 組み込み列の名前上書き
  if (!b.colOrder) b.colOrder = ["action", "dialog", ...b.cols.map(c => c.id)];
  b.colOrder = b.colOrder.filter(t => BUILTIN_COLS[t] || b.cols.some(c => c.id === t));
  for (const k of ["dialog", "action"]) if (!b.colOrder.includes(k)) b.colOrder.unshift(k);
  for (const c of b.cols) if (!b.colOrder.includes(c.id)) b.colOrder.push(c.id);
}

/* 並び順どおりの中間列(アクション・セリフ・カスタム)リスト。labelは表示名 */
function middleCols() {
  const out = [];
  for (const tok of board().colOrder) {
    if (BUILTIN_COLS[tok]) {
      out.push({ kind: "b", key: tok, def: BUILTIN_COLS[tok], label: (board().colNames || {})[tok] || BUILTIN_COLS[tok].label });
    } else {
      const col = board().cols.find(x => x.id === tok);
      if (col) out.push({ kind: "c", col, label: col.label });
    }
  }
  return out;
}

/* 組み込み列(アクション・セリフ)の名前変更 */
function editBuiltinCol(key) {
  const def = BUILTIN_COLS[key];
  board().colNames = board().colNames || {};
  const cur = board().colNames[key] || def.label;
  let inp;
  modal.open("列名を変更", (body) => {
    inp = document.createElement("input");
    inp.type = "text";
    inp.value = cur;
    modal.field(body, "列名", inp);
    const note = document.createElement("div");
    note.className = "note";
    note.textContent = "この列は削除できません。「元に戻す」で標準の「" + def.label + "」に戻ります。";
    body.appendChild(note);
  }, [
    { label: "元に戻す", onClick: () => { delete board().colNames[key]; save(); renderAll(); } },
    { label: "キャンセル", onClick: () => {} },
    { label: "保存", cls: "acc", onClick: () => {
        const name = inp.value.trim();
        if (!name || name === def.label) delete board().colNames[key];
        else board().colNames[key] = name;
        save(); renderAll();
      } },
  ]);
}

function save() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); }
  catch (e) { alert("保存容量が足りません。古いボードの削除、またはJSON保存でのバックアップ後に整理してください。"); }
}
function board() { return state.boards.find(b => b.id === state.currentId); }

/* ---------- inbox from shot designer ---------- */
(function receiveInbox() {
  let inbox = [];
  try { inbox = JSON.parse(localStorage.getItem(INBOX_KEY)) || []; } catch (e) {}
  if (!inbox.length) return;
  for (const item of inbox) {
    board().cuts.push(newCut({ img: item.img || null, action: item.action || "", dialog: item.info ? "(" + item.info + ")" : "" }));
  }
  localStorage.removeItem(INBOX_KEY);
  save();
  setTimeout(() => toast("ショットデザイナーから " + inbox.length + " カット受信しました"), 300);
})();

/* ---------- 共通モーダル ---------- */
const modal = {
  open(title, buildBody, buttons) {
    $("modalTitle").textContent = title;
    const body = $("modalBody");
    body.textContent = "";
    buildBody(body);
    const btns = $("modalBtns");
    btns.textContent = "";
    for (const b of buttons) {
      const el = document.createElement("button");
      el.textContent = b.label;
      if (b.cls) el.className = b.cls;
      el.addEventListener("click", () => { if (b.onClick() !== false) modal.close(); });
      btns.appendChild(el);
    }
    $("modal").hidden = false;
    const first = body.querySelector("input, select");
    if (first) setTimeout(() => { first.focus(); if (first.select) first.select(); }, 30);
  },
  close() { $("modal").hidden = true; },
  field(body, labelText, el) {
    const wrap = document.createElement("div");
    const l = document.createElement("label");
    l.textContent = labelText;
    wrap.append(l, el);
    body.appendChild(wrap);
    return el;
  },
};
$("modal").addEventListener("click", (e) => { if (e.target === $("modal")) modal.close(); });
window.addEventListener("keydown", (e) => {
  if ($("modal").hidden) return;
  if (e.key === "Escape") modal.close();
  if (e.key === "Enter" && e.target.tagName !== "TEXTAREA") {
    const acc = $("modalBtns").querySelector("button.acc");
    if (acc) { e.preventDefault(); acc.click(); }
  }
});

/* 複製したカットでも3Dの続き編集ができるよう、shot側のリンク済みシーンも複製する */
function cloneShotScenes(pairs, newBoardId) {
  try {
    const raw = localStorage.getItem("shot.v1");
    if (!raw) return;
    const shot = JSON.parse(raw);
    if (!shot || !Array.isArray(shot.cuts)) return;
    let changed = false;
    for (const p of pairs) {
      const src = shot.cuts.find(c => c.sbRef && c.sbRef.cutId === p.oldCutId);
      if (!src) continue;
      const copy = JSON.parse(JSON.stringify(src));
      copy.id = newId();
      copy.sbRef = { boardId: newBoardId, cutId: p.newCutId };
      shot.cuts.push(copy);
      changed = true;
    }
    if (changed) localStorage.setItem("shot.v1", JSON.stringify(shot));
  } catch (e) {}
}

function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { t.style.display = "none"; }, 3200);
}

/* ---------- board selector ---------- */
function renderTop() {
  const list = $("boardList");
  list.textContent = "";
  for (const b of state.boards) {
    const el = document.createElement("div");
    el.className = "bitem" + (b.id === state.currentId ? " sel" : "");
    el.textContent = b.title || "(無題)";
    el.title = b.title || "(無題)";
    el.addEventListener("click", () => {
      if (state.currentId === b.id) return;
      state.currentId = b.id;
      save(); renderAll();
    });
    list.appendChild(el);
  }
  $("boardTitle").value = board().title;
  const total = board().cuts.reduce((a, c) => a + (parseFloat(c.sec) || 0), 0);
  const m = Math.floor(total / 60), sec = Math.round(total % 60);
  const t = $("total");
  t.textContent = "";
  const bN = document.createElement("b");
  bN.textContent = board().cuts.length;
  const bT = document.createElement("b");
  bT.textContent = (m ? m + "分" : "") + sec + "秒";
  t.append(bN, "カット ・ 合計 ", bT);
}
$("boardTitle").addEventListener("input", () => { board().title = $("boardTitle").value; save(); renderTop(); });
$("newBoard").addEventListener("click", () => {
  const b = newBoard("");
  state.boards.push(b); state.currentId = b.id;
  save(); renderAll();
  $("boardTitle").focus();
});
$("dupBoard").addEventListener("click", () => {
  const c = JSON.parse(JSON.stringify(board()));
  c.id = newId();
  c.title = (c.title || "(無題)") + " のコピー";
  const pairs = [];
  for (const cut of c.cuts) {
    const oldCutId = cut.id;
    cut.id = newId();
    pairs.push({ oldCutId, newCutId: cut.id });
  }
  cloneShotScenes(pairs, c.id);
  state.boards.push(c); state.currentId = c.id;
  save(); renderAll();
});
$("delBoard").addEventListener("click", () => {
  if (!confirm("「" + (board().title || "(無題)") + "」を削除しますか?")) return;
  state.boards = state.boards.filter(b => b.id !== state.currentId);
  if (!state.boards.length) state.boards = [newBoard("")];
  state.currentId = state.boards[0].id;
  save(); renderAll();
});

/* ---------- cuts grid ---------- */
let uploadTarget = null;

/* 列の設定(名前変更・削除)。ヘッダとスマホ表示のラベル両方から呼べる */
function editCol(col) {
  let inp;
  modal.open("列の設定 — " + col.label, (body) => {
    inp = document.createElement("input");
    inp.type = "text";
    inp.value = col.label;
    modal.field(body, "列名", inp);
  }, [
    { label: "列を削除", cls: "danger", onClick: () => {
        if (!confirm("列「" + col.label + "」を削除しますか?(この列の入力内容も消えます)")) return false;
        removeCol(col);
        save(); renderAll();
      } },
    { label: "キャンセル", onClick: () => {} },
    { label: "保存", cls: "acc", onClick: () => {
        const name = inp.value.trim();
        if (!name) { inp.focus(); return false; }
        col.label = name;
        save(); renderAll();
      } },
  ]);
}

function removeCol(col) {
  board().cols = board().cols.filter(x => x.id !== col.id);
  board().colOrder = board().colOrder.filter(t => t !== col.id);
  for (const c of board().cuts) if (c.ex) delete c.ex[col.id];
}

function moveCol(id, dir) {
  const ord = board().colOrder;
  const i = ord.indexOf(id);
  const j = i + dir;
  if (i < 0 || j < 0 || j >= ord.length) return;
  [ord[i], ord[j]] = [ord[j], ord[i]];
  save(); renderAll();
}

function renderGrid() {
  const g = $("grid");
  g.textContent = "";
  const mids = middleCols();
  g.style.setProperty("--sbcols",
    "46px 300px " + mids.map(m => m.kind === "b" ? m.def.fr : "0.7fr").join(" ") + " 64px 44px");
  const head = document.createElement("div");
  head.id = "listHead";
  const addSpan = (t) => {
    const sp = document.createElement("span");
    sp.textContent = t;
    head.appendChild(sp);
  };
  const mkHeadCell = (label, token, onRename, onDelete) => {
    const sp = document.createElement("span");
    sp.className = "colHead";
    const nm = document.createElement("a");
    nm.textContent = label;
    nm.title = "タップで列名の変更" + (onDelete ? "・削除" : "");
    nm.addEventListener("click", onRename);
    const mv = (dir, arrow, title) => {
      const b2 = document.createElement("button");
      b2.textContent = arrow;
      b2.title = title;
      b2.addEventListener("click", () => moveCol(token, dir));
      return b2;
    };
    sp.append(nm, mv(-1, "◀", "左へ移動"), mv(1, "▶", "右へ移動"));
    if (onDelete) {
      const x = document.createElement("button");
      x.textContent = "✕";
      x.title = "列を削除";
      x.addEventListener("click", onDelete);
      sp.appendChild(x);
    }
    head.appendChild(sp);
  };
  addSpan("No");
  addSpan("画");
  for (const m of mids) {
    if (m.kind === "b") {
      mkHeadCell(m.label, m.key, () => editBuiltinCol(m.key), null);
    } else {
      const col = m.col;
      mkHeadCell(col.label, col.id, () => editCol(col), () => {
        if (!confirm("列「" + col.label + "」を削除しますか?(この列の入力内容も消えます)")) return;
        removeCol(col);
        save(); renderAll();
      });
    }
  }
  const secSp = document.createElement("span");
  secSp.className = "secHead";
  const ab = document.createElement("button");
  ab.className = "addBtn";
  ab.textContent = "＋";
  ab.title = "列を追加(ここ=秒の左に入ります)";
  ab.addEventListener("click", addColumn);
  secSp.append(ab, "秒");
  head.appendChild(secSp);
  addSpan("");
  g.appendChild(head);
  board().cuts.forEach((c, i) => g.appendChild(cutCard(c, i)));
  const add = document.createElement("button");
  add.id = "addCard";
  add.textContent = "＋ カットを追加";
  add.addEventListener("click", () => {
    board().cuts.push(newCut());
    save(); renderAll();
  });
  g.appendChild(add);
}

function cutCard(c, i) {
  const card = document.createElement("div");
  card.className = "card";

  const no = document.createElement("div");
  no.className = "cno";
  no.textContent = "C" + (i + 1);

  const frame = document.createElement("div");
  frame.className = "frame";
  frame.title = "タップで画像を選択(撮影した写真・書き出したPNGなど)";
  if (c.img) {
    const img = document.createElement("img");
    img.src = c.img;
    frame.appendChild(img);
  } else {
    const e = document.createElement("div");
    e.className = "empty";
    const b1 = document.createElement("span"); b1.className = "big"; b1.textContent = "🖼";
    const b2 = document.createElement("span"); b2.textContent = "タップで画像を追加\n(🎥ボタンで3Dからも作れます)";
    b2.style.whiteSpace = "pre-line";
    e.append(b1, b2);
    frame.appendChild(e);
  }
  frame.addEventListener("click", () => {
    uploadTarget = c.id;
    $("fileIn").value = "";
    $("fileIn").click();
  });

  const mkCell = (cls, label, key, placeholder) => {
    const cell = document.createElement("div");
    cell.className = "cell " + cls;
    const l = document.createElement("div");
    l.className = "lbl";
    l.textContent = label;
    const t = document.createElement("textarea");
    t.placeholder = placeholder;
    t.value = c[key];
    t.addEventListener("input", () => { c[key] = t.value; save(); });
    cell.append(l, t);
    return cell;
  };
  // 中間列(アクション・セリフ・カスタム)を並び順どおりに生成
  const midEls = middleCols().map((m) => {
    if (m.kind === "b") {
      const cell = mkCell(m.def.cls, m.label, m.key, m.def.ph);
      const lbl = cell.querySelector(".lbl");
      lbl.classList.add("exl");
      lbl.title = "タップで列名の変更";
      lbl.addEventListener("click", () => editBuiltinCol(m.key));
      return cell;
    }
    const col = m.col;
    const cell = document.createElement("div");
    cell.className = "cell";
    const l = document.createElement("div");
    l.className = "lbl exl";
    l.textContent = col.label;
    l.title = "タップで列名の変更・削除";
    l.addEventListener("click", () => editCol(col));
    const t = document.createElement("textarea");
    t.placeholder = col.label;
    t.value = (c.ex && c.ex[col.id]) || "";
    t.addEventListener("input", () => { c.ex = c.ex || {}; c.ex[col.id] = t.value; save(); });
    cell.append(l, t);
    return cell;
  });

  const secCell = document.createElement("div");
  secCell.className = "cell secCell";
  const slbl = document.createElement("div");
  slbl.className = "lbl";
  slbl.textContent = "秒";
  const sec = document.createElement("input");
  sec.inputMode = "decimal";
  sec.value = c.sec;
  sec.addEventListener("change", () => {
    const v = parseFloat(sec.value);
    c.sec = Number.isFinite(v) && v >= 0 ? v : 3;
    save(); renderTop();
    sec.value = c.sec;
  });
  const unit = document.createElement("span");
  unit.className = "unit";
  unit.textContent = "秒";
  const btns = document.createElement("div");
  btns.className = "secBtns";
  const mkStep = (label, delta) => {
    const b = document.createElement("button");
    b.textContent = label;
    b.title = (delta > 0 ? "+" : "−") + "0.5秒";
    b.addEventListener("click", () => {
      const v = (parseFloat(sec.value) || 0) + delta;
      c.sec = Math.max(0, Math.round(v * 10) / 10);
      sec.value = c.sec;
      save(); renderTop();
    });
    return b;
  };
  btns.append(mkStep("−", -0.5), mkStep("＋", 0.5));
  secCell.append(slbl, sec, unit, btns);

  const ctrl = document.createElement("div");
  ctrl.className = "ctrl";
  const mkBtn = (label, title, cls, fn) => {
    const b = document.createElement("button");
    b.textContent = label; b.title = title;
    if (cls) b.className = cls;
    b.addEventListener("click", fn);
    return b;
  };
  ctrl.append(
    mkBtn("▲", "上へ移動", "", () => {
      if (i === 0) return;
      const arr = board().cuts;
      [arr[i - 1], arr[i]] = [arr[i], arr[i - 1]];
      save(); renderAll();
    }),
    mkBtn("▼", "下へ移動", "", () => {
      const arr = board().cuts;
      if (i >= arr.length - 1) return;
      [arr[i + 1], arr[i]] = [arr[i], arr[i + 1]];
      save(); renderAll();
    }),
    mkBtn("🎥", "ショットデザイナーでつくる/編集", "b3d", () => {
      try {
        localStorage.setItem("shot.request.v1", JSON.stringify({
          boardId: board().id,
          cutId: c.id,
          title: (board().title ? board().title + " " : "") + "C" + (i + 1),
        }));
      } catch (e) { alert("連携情報を書き込めませんでした"); return; }
      location.href = "../shot/";
    }),
    mkBtn("⧉", "カットを複製", "", () => {
      const copy = JSON.parse(JSON.stringify(c));
      copy.id = newId();
      cloneShotScenes([{ oldCutId: c.id, newCutId: copy.id }], board().id);
      board().cuts.splice(i + 1, 0, copy);
      save(); renderAll();
    }),
    mkBtn("✕", "カットを削除", "del", () => {
      if (!confirm("C" + (i + 1) + " を削除しますか?")) return;
      board().cuts.splice(i, 1);
      save(); renderAll();
    })
  );

  card.append(no, frame, ...midEls, secCell, ctrl);
  return card;
}

/* ---------- custom columns ---------- */
function addColumn() {
  const mids = middleCols();
  let inp, sel;
  modal.open("列を追加", (body) => {
    inp = document.createElement("input");
    inp.type = "text";
    inp.placeholder = "例: パート、機材、備考、T番号";
    modal.field(body, "列名", inp);
    sel = document.createElement("select");
    const opts = ["「画」のすぐ右", ...mids.map((m, i) =>
      "「" + m.label + "」の右" + (i === mids.length - 1 ? "(秒の左)" : ""))];
    opts.forEach((t, i) => {
      const op = document.createElement("option");
      op.value = i;
      op.textContent = t;
      if (i === mids.length) op.selected = true;
      sel.appendChild(op);
    });
    modal.field(body, "挿入位置(あとからヘッダの◀▶で移動できます)", sel);
  }, [
    { label: "キャンセル", onClick: () => {} },
    { label: "追加", cls: "acc", onClick: () => {
        const name = inp.value.trim();
        if (!name) { inp.focus(); return false; }
        const pos = Math.min(Math.max(parseInt(sel.value, 10) || 0, 0), mids.length);
        const col = { id: newId(), label: name };
        board().cols.push(col);
        board().colOrder.splice(pos, 0, col.id);
        save(); renderAll();
        toast("列「" + name + "」を追加しました");
      } },
  ]);
}
$("addCol").addEventListener("click", addColumn);

/* image upload: downscale to fit 960x540 */
$("fileIn").addEventListener("change", () => {
  const f = $("fileIn").files[0];
  if (!f || !uploadTarget) return;
  const img = new Image();
  img.onload = () => {
    const W = 960, H = 540;
    const cv = document.createElement("canvas");
    cv.width = W; cv.height = H;
    const ctx = cv.getContext("2d");
    ctx.fillStyle = "#101014";
    ctx.fillRect(0, 0, W, H);
    const sc = Math.min(W / img.width, H / img.height);
    const w = img.width * sc, h = img.height * sc;
    ctx.drawImage(img, (W - w) / 2, (H - h) / 2, w, h);
    const c = board().cuts.find(x => x.id === uploadTarget);
    if (c) { c.img = cv.toDataURL("image/jpeg", 0.82); save(); renderAll(); }
    URL.revokeObjectURL(img.src);
  };
  img.src = URL.createObjectURL(f);
});

/* ---------- JSON backup ---------- */
/* 保存: タッチ端末では共有シート(ドライブ等へ保存可)、その他はダウンロード */
async function saveFile(name, data, mime) {
  const blob = new Blob([data], { type: mime });
  const file = new File([blob], name, { type: blob.type });
  if (matchMedia("(pointer: coarse)").matches && navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file], title: name }); return; }
    catch (e) { if (e && e.name === "AbortError") return; }
  }
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 2000);
}
$("jsonOut").addEventListener("click", () => {
  saveFile("storyboard_" + (board().title || "untitled").replace(/[\\/:*?"<>|\s]+/g, "_") + ".json",
    JSON.stringify(board()), "application/json");
});
$("jsonIn").addEventListener("click", () => { $("jsonFileIn").value = ""; $("jsonFileIn").click(); });
$("jsonFileIn").addEventListener("change", async () => {
  const f = $("jsonFileIn").files[0];
  if (!f) return;
  try {
    const b = JSON.parse(await f.text());
    if (!b.cuts) throw new Error("bad");
    fixBoard(b);
    b.id = newId();
    const pairs = [];
    for (const c of b.cuts) {
      const oldCutId = c.id;
      c.id = newId();
      pairs.push({ oldCutId, newCutId: c.id });
    }
    cloneShotScenes(pairs, b.id); // 同じ端末に3Dシーンがあれば読込分にもリンク
    state.boards.push(b);
    state.currentId = b.id;
    save(); renderAll();
    toast("「" + (b.title || "(無題)") + "」を読み込みました");
  } catch (e) {
    alert("読み込めませんでした(このツールのJSON保存ファイルを指定してください)");
  }
});

/* ---------- print / PDF ---------- */
const CONFIDENTIAL_NOTE = "CONFIDENTIAL / 社外秘 — 本資料の無断転載・複製・第三者への開示を禁じます ・ © 8hammer";

$("printBtn").addEventListener("click", async () => {
  const pv = $("printView");
  const cols = board().cols;
  const mids = middleCols();
  const picW = cols.length >= 2 ? "44mm" : cols.length === 1 ? "52mm" : "62mm";
  const heads = ["No", "画", ...mids.map(m => m.label), "秒"];
  const totalSec = board().cuts.reduce((a, c) => a + (parseFloat(c.sec) || 0), 0);
  const durText = Math.floor(totalSec / 60) + "分" + Math.round(totalSec % 60) + "秒";

  const mkThead = () => {
    const thead = document.createElement("thead");
    const thr = document.createElement("tr");
    for (const t of heads) {
      const th = document.createElement("th");
      th.textContent = t;
      thr.appendChild(th);
    }
    thead.appendChild(thr);
    return thead;
  };
  const mkTr = (c, i) => {
    const tr = document.createElement("tr");
    const td1 = document.createElement("td"); td1.className = "no"; td1.textContent = i + 1;
    const td2 = document.createElement("td"); td2.className = "pic";
    td2.style.width = picW;
    if (c.img) { const im = document.createElement("img"); im.src = c.img; td2.appendChild(im); }
    tr.append(td1, td2);
    for (const m of mids) {
      const td = document.createElement("td");
      td.className = "white";
      td.textContent = m.kind === "b" ? (c[m.key] || "") : ((c.ex && c.ex[m.col.id]) || "");
      tr.appendChild(td);
    }
    const td5 = document.createElement("td"); td5.className = "sec"; td5.textContent = c.sec;
    tr.appendChild(td5);
    return tr;
  };
  const mkPhead = () => {
    const phead = document.createElement("div");
    phead.className = "phead";
    const h1 = document.createElement("h1");
    h1.textContent = "絵コンテ — " + (board().title || "(無題)");
    const plogo = document.createElement("img");
    plogo.className = "plogo";
    plogo.alt = "8hammer";
    plogo.src = PRINT_LOGO;
    phead.append(h1, plogo);
    return phead;
  };
  const mkMeta = () => {
    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = board().cuts.length + "カット / 合計 " + durText + " / 8hammer";
    return meta;
  };
  const mkFoot = (page, total) => {
    const f = document.createElement("div");
    f.className = "pfoot2";
    const note = document.createElement("span");
    note.textContent = CONFIDENTIAL_NOTE;
    const num = document.createElement("span");
    num.className = "pnum";
    num.textContent = page + " / " + total;
    f.append(note, num);
    return f;
  };
  const mkCover = (totalPages) => {
    const sheet = document.createElement("div");
    sheet.className = "psheet";
    const cover = document.createElement("div");
    cover.className = "pcover";
    const clogo = document.createElement("img");
    clogo.className = "plogoBig";
    clogo.alt = "8hammer";
    clogo.src = PRINT_LOGO;
    const clabel = document.createElement("div");
    clabel.className = "plabel";
    clabel.textContent = "STORYBOARD / 絵コンテ";
    const ctitle = document.createElement("div");
    ctitle.className = "ptitle";
    ctitle.textContent = board().title || "(無題)";
    const cinfo = document.createElement("div");
    cinfo.className = "pinfo";
    cinfo.textContent = "全 " + board().cuts.length + " カット ／ 合計尺 " + durText;
    const now = new Date();
    const cfoot = document.createElement("div");
    cfoot.className = "pfoot";
    cfoot.textContent = now.getFullYear() + "年" + (now.getMonth() + 1) + "月" + now.getDate() + "日 ／ 8hammer";
    cover.append(clogo, clabel, ctitle, cinfo, cfoot);
    sheet.appendChild(cover); // 表紙は欄外表記なし(ページ数には数える)
    return sheet;
  };

  // --- 1) 実寸(A4幅)で行の高さを計測 ---
  pv.textContent = "";
  pv.classList.add("measure");
  const mTbl = document.createElement("table");
  mTbl.appendChild(mkThead());
  const mBody = document.createElement("tbody");
  const trs = board().cuts.map(mkTr);
  trs.forEach(t => mBody.appendChild(t));
  mTbl.appendChild(mBody);
  const mHead = mkPhead(), mMeta = mkMeta(), mFoot = mkFoot(2, 9);
  pv.append(mHead, mMeta, mTbl, mFoot);
  await Promise.all([...pv.querySelectorAll("img")].map(im =>
    im.decode ? im.decode().catch(() => {}) : Promise.resolve()));
  const H = (el) => el.getBoundingClientRect().height;
  const MM = 96 / 25.4;
  const fixedH = H(mHead) + H(mMeta) + H(mTbl.tHead) + H(mFoot);
  const budget = 268 * MM - fixedH - 8 * MM; // 1ページに使える行の高さ(安全マージン8mm)
  const rowHs = trs.map(H);

  // --- 2) ページに割り付け ---
  const pages = [];
  let curIdx = [], acc = 0;
  board().cuts.forEach((c, i) => {
    if (curIdx.length && acc + rowHs[i] > budget) { pages.push(curIdx); curIdx = []; acc = 0; }
    curIdx.push(i);
    acc += rowHs[i];
  });
  if (curIdx.length) pages.push(curIdx);
  const totalPages = pages.length + 1; // +表紙

  // --- 3) ページを組み立て(各ページにヘッダー・ページ番号・機密表記) ---
  pv.textContent = "";
  pv.classList.remove("measure");
  pv.appendChild(mkCover(totalPages));
  pages.forEach((idxs, p) => {
    const sheet = document.createElement("div");
    sheet.className = "psheet";
    const tbl = document.createElement("table");
    tbl.appendChild(mkThead());
    const tb = document.createElement("tbody");
    idxs.forEach(i => tb.appendChild(mkTr(board().cuts[i], i)));
    tbl.appendChild(tb);
    sheet.append(mkPhead(), mkMeta(), tbl, mkFoot(p + 2, totalPages));
    pv.appendChild(sheet);
  });
  window.print();
});

  navigator.serviceWorker.register("sw.js").catch(() => {});
}
