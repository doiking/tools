<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e11">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<title>絵コンテ — 8hammer</title>
<style>
  :root {
    --bg: #0e0e11;
    --panel: #1c1c22;
    --line: #33333c;
    --fg: #f2f2ee;
    --dim: #9a9aa4;
    --accent: #f7c114;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    min-height: 100dvh;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    touch-action: manipulation;
    padding: calc(10px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) calc(20px + env(safe-area-inset-bottom)) calc(12px + env(safe-area-inset-left));
  }
  button { font-family: inherit; }

  #topbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  #topbar img { height: 24px; }
  #topbar h1 { font-size: 17px; font-weight: 700; margin: 0 6px 0 0; }
  #topbar select, #boardTitle {
    background: var(--panel); color: var(--fg);
    border: 1px solid var(--line); border-radius: 9px;
    font-size: 14px; padding: 9px 10px;
  }
  #boardTitle { width: 200px; font-weight: 600; -webkit-user-select: text; user-select: text; }
  #boardTitle:focus, select:focus { outline: none; border-color: var(--accent); }
  #topbar button {
    background: var(--panel); color: var(--fg);
    border: 1px solid var(--line); border-radius: 9px;
    font-size: 13.5px; padding: 9px 12px;
  }
  #topbar button.acc { background: var(--accent); color: #17130a; border-color: var(--accent); font-weight: 700; }
  #topbar button.danger { color: #ff8484; }
  .spacer { flex: 1; }
  #total { font-size: 13px; color: var(--dim); white-space: nowrap; }

  #grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 980px;
    margin: 0 auto;
  }
  :root { --sbcols: 46px 300px 1.1fr 0.9fr 64px 44px; }
  #listHead {
    display: grid;
    grid-template-columns: var(--sbcols);
    gap: 0;
    padding: 0 2px;
    font-size: 11px; color: var(--dim); letter-spacing: .08em;
  }
  #listHead span { padding: 2px 8px; }
  #listHead .colHead { display: flex; align-items: center; gap: 4px; }
  #listHead .colHead a { color: var(--accent); cursor: pointer; text-decoration: underline dotted; }
  #listHead .colHead button {
    border: none; background: transparent; color: var(--dim);
    font-size: 10px; padding: 0 2px; cursor: pointer;
  }
  .cell .lbl.exl { text-decoration: underline dotted; cursor: pointer; }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    display: grid;
    grid-template-columns: var(--sbcols);
    align-items: stretch;
  }
  .cno {
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 800; color: var(--accent);
    border-right: 1px solid #26262c;
  }
  .frame {
    aspect-ratio: 16 / 9;
    background: #101014;
    position: relative;
    cursor: pointer;
    align-self: center;
    border-right: 1px solid #26262c;
    width: 100%;
  }
  .frame img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .frame .empty {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--dim); font-size: 12px; gap: 4px; text-align: center;
  }
  .frame .empty .big { font-size: 24px; }
  .cell {
    display: flex; flex-direction: column;
    border-right: 1px solid #26262c;
    padding: 6px;
    min-width: 0; /* textareaの固有幅でgrid列が広がるのを防ぐ */
  }
  .cell .lbl { display: none; font-size: 10.5px; color: var(--dim); letter-spacing: .08em; margin: 2px 2px 4px; }
  .cell textarea {
    flex: 1;
    width: 100%;
    min-width: 0;
    min-height: 96px;
    background: transparent; color: var(--fg);
    border: none; border-radius: 6px;
    font-size: 13.5px; line-height: 1.65;
    padding: 6px 7px;
    resize: none;
    font-family: inherit;
    -webkit-user-select: text; user-select: text;
  }
  .cell textarea:focus { outline: none; background: #16161b; }
  .secCell { align-items: center; justify-content: center; gap: 4px; }
  .secCell input {
    width: 50px;
    background: #16161b; color: var(--fg);
    border: 1px solid var(--line); border-radius: 7px;
    font-size: 15px; font-weight: 700; padding: 7px 5px; text-align: center;
    -webkit-user-select: text; user-select: text;
  }
  .secCell input:focus { outline: none; border-color: var(--accent); }
  .secCell .unit { font-size: 10.5px; color: var(--dim); }
  .ctrl {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px; padding: 6px 0;
  }
  .ctrl button {
    width: 32px; height: 30px;
    background: #24242c; color: var(--fg);
    border: 1px solid var(--line); border-radius: 7px;
    font-size: 13px; padding: 0;
  }
  .ctrl button.del { color: #ff8484; }
  .ctrl button.b3d:active { background: var(--accent); color: #17130a; }

  @media (max-width: 700px) {
    #listHead { display: none; }
    .card { grid-template-columns: 1fr; }
    .cno, .frame, .cell { border-right: none; }
    .cno { justify-content: flex-start; padding: 8px 12px 0; }
    .frame { border-bottom: 1px solid #26262c; }
    .cell .lbl { display: block; }
    .cell textarea { min-height: 56px; background: #16161b; }
    .secCell { flex-direction: row; justify-content: flex-start; padding: 6px 10px; }
    .ctrl { flex-direction: row; justify-content: flex-end; padding: 4px 8px 8px; }
  }

  #addCard {
    border: 2px dashed var(--line);
    border-radius: 14px;
    min-height: 68px;
    display: flex; align-items: center; justify-content: center;
    color: var(--dim); font-size: 15px;
    background: transparent;
    cursor: pointer;
  }
  #addCard:active { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 640px) {
    .card {
      grid-template-columns: 1fr;
      grid-template-areas: "head" "frame" "body";
      grid-template-rows: auto auto auto;
    }
    .frame { border-right: none; border-bottom: 1px solid #26262c; align-self: stretch; }
  }

  #toast {
    position: fixed; left: 50%; bottom: 24px;
    transform: translateX(-50%);
    background: var(--accent); color: #17130a;
    font-size: 14px; font-weight: 700;
    padding: 10px 18px; border-radius: 12px;
    z-index: 20;
    display: none;
  }

  /* ---------- print (PDF / A4) ---------- */
  #printView { display: none; }
  @page { size: A4 portrait; margin: 12mm 12mm 14mm; }
  @media print {
    body { background: #fff; color: #000; padding: 0; }
    #topbar, #grid, #addCard, #toast { display: none !important; }
    #printView { display: block; }
    #printView .pcover {
      height: 262mm;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      break-after: page;
      gap: 6mm;
    }
    #printView .pcover .plogoBig { height: 14mm; margin-bottom: 10mm; }
    #printView .pcover .plabel {
      font-size: 11pt; letter-spacing: .5em; color: #333;
      border-top: 1px solid #000; border-bottom: 1px solid #000;
      padding: 2mm 6mm;
    }
    #printView .pcover .ptitle { font-size: 26pt; font-weight: 800; margin: 4mm 0 0; }
    #printView .pcover .pinfo { font-size: 11pt; color: #222; margin-top: 8mm; line-height: 1.9; }
    #printView .pcover .pfoot { font-size: 9pt; color: #555; margin-top: 22mm; }
    #printView .phead {
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 2px solid #000;
      padding-bottom: 2mm; margin-bottom: 4mm;
    }
    #printView h1 { font-size: 16pt; margin: 0; }
    #printView .plogo { height: 8mm; }
    #printView .meta { font-size: 9pt; color: #444; margin-bottom: 4mm; }
    #printView table {
      width: calc(100% - 1mm); /* 右端の罫線がページ端で切れるのを防ぐ */
      border-collapse: collapse;
      border: 1.2px solid #888;
    }
    #printView th, #printView td {
      border: 1px solid #888;
      padding: 2mm;
      font-size: 9.5pt;
      vertical-align: top;
      text-align: left;
    }
    #printView th { background: #eee; font-size: 8.5pt; }
    #printView td.no { width: 8mm; font-weight: 700; text-align: center; }
    #printView td.pic { width: 62mm; }
    #printView td.pic img { width: 100%; display: block; }
    #printView td.sec { width: 12mm; text-align: center; }
    #printView tr { break-inside: avoid; }
    #printView .white { white-space: pre-wrap; }
  }
</style>
</head>

  <input id="boardTitle" placeholder="作品名・シーン名" autocomplete="off">

<script>
"use strict";
const LS_KEY = "storyboard.v1";
const PRINT_LOGO = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAYAAAABICAAAAADaYH0OAAAFAElEQVR42u2c7bWsKgyGpz0boAEaoAEasIE0YANUYAMpgAZsgAa443ciwsy5Z+M67JX314yO6OSRkAT09RKJRCKRSCQSiUSiH5fuweEiANOJPR6VGnzkmpwSszwle7X+KtRimkdczxRzGsQ69TXEgrzYp7Z8LGoUCz1m/zBCrw047pGs2Kim3Gl+OAcFpNGQGKmizGl/dc8lRiNmqqfT21wizvEEAGKmBzoAXvZ0MbtLVCMCTYbaUQA8IMx5oNcL7gCYxWUFSc9+SuGwcpoe32XDkPu16P8p5nuAufNOBgVAJQA274JYYdoKgDpp8JgdhMcbZmK5H8+DY5frHFoA1JPNRvuQK0hPAqBOJhwd3a6y5WgUAJW6ACOwDw7hJQCeSsXeXqi72n9SeQAG3uLBk9awSLNtWttlgyYHdHb+crau5p9Bsken55h/MSCi64+r7eaD16+qB+ibdUJHRdoXpsNWAGYPksJeK1XIpnE263R7Pa9z4ay6HlPQyEccsufdHbthP4Qi6Nz1hrF7sKC2c7QFQAW2FMKSKeIh22Wosbtr3sCq21tLJNwKZkrm27aD6eS0ow2eXcrQyw0dSRnt2OgERsfnJENyb9/7rAk5pnXY9oiemVYf+USg1Lzn+E4onkAIGC65iN7ggCc9yPB/4JobB8Y/WQ+Bp4vpmZ/CfepAc0ewGjRo0kvmozfullc+yJ4Y+uMcgRav1oFpdTyKOroACrYzNSbWrz/MBCO5Ix21tEIEeptqind1FhvqkVQCgSV4I7WnJt5p+9FAGl5O3pOmFq+nG13K5NL1KLYAQFO3kxnYNR1gHb3PFSHDAdA9/mZHINs1aRfbdD35geAYkF/lPCADwCUA+psDIAVA9wwpTZscgeSiWp67tuF2TdCkPwDI1CUgAaBvzKyzAAzdQ7qcY87xCqDhpazuGpsUlmUxAJm02GYB+CwAzO0hAJaPvV5yO8ArgPbdz5z8wGWdaJILFwG8M9cRt0j0FgD+FYBsrNY0gCMT2/6xnW4zqs8AFA9nnwCwBVdNAzjsfwb+HEHovgNgL8apBWB1Qat+QYXwsD8L4tiCafwKwDJwTr3u3qH4UBOA/hSatVmL84WwyH4DYCIJq64JAH4VAMytiqA1OvwCgKK96A8A4F1EW4yCxt8EwOYLWCbezxdnADCbpXmA/QggfgHA5arNzeYBIbssiFUnaI7pEwD6WhhgZRqe8E5/BcDmfBDmBod/XH3Mzjyy5bn0L8cCgECLcXAHIH4PYLgx7nrDHFNe1qu2AUzF55D8lwD6E9dktTaOD+tlACFbisBXWmjb7hgP8xzkPP/lmgagyo8AuHS3uSAjKxUxzZIUpThjAhbz6vPz0W5g5DvSsLqt2s6XQebRGpsOtmUAkP6v65Lp8RxBSNg0Wdg3c8bIjlbnZ6CLhBXP5YCNUpckUVFH2tyzJFC+8DGdktW4aVzHZQXw/rzxWR/uw2E2ylwRWiKfcTtgeey+50cvb0Zwc+Nmb3dx/OzL+zLn+tJ5hWbA9UQIazMdHlelWwWA5THgJaoMIBajIHlUuD4A+MoDiWoNwjeT8FaeEauurrAMos+Vo0U1SnHLjU4KDgblVQVPSF8ypxFgXl87BnlVxEMa4gcFsX9dubL9vby17MFQNL395S0RD0hhxvyTmP+paLRP1yX6QZzPs/GQhQH3d4ZaSX1FIpFIJBKJRKJ/Q/8BhLAdogPv7KMAAAAASUVORK5CYII="; // 白黒ロゴ(印刷用)
const INBOX_KEY = "storyboard.inbox.v1";
const $ = (id) => document.getElementById(id);
const newId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

/* ---------- state ---------- */
function newCut(partial) {
  return Object.assign({ id: newId(), img: null, sec: 3, action: "", dialog: "", ex: {} }, partial || {});
}
function newBoard(title) {
  return { id: newId(), title: title || "", cols: [], cuts: [newCut()] };
}
let state = { boards: [], currentId: null };
try { const raw = localStorage.getItem(LS_KEY); if (raw) state = JSON.parse(raw); } catch (e) {}
if (!state.boards || !state.boards.length) {
  const b = newBoard("");
  state = { boards: [b], currentId: b.id };
}
if (!state.boards.find(b => b.id === state.currentId)) state.currentId = state.boards[0].id;
for (const b of state.boards) if (!b.cols) b.cols = []; // 旧データ互換

function save() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); }
  catch (e) { alert("保存容量が足りません。古いボードの削除、またはJSON保存でのバックアップ後に整理してください。"); }
}
function board() { return state.boards.find(b => b.id === state.currentId); }

/* ---------- inbox from shot designer ---------- */
(function receiveInbox() {
  let inbox = [];
  try { inbox = JSON.parse(localStorage.getItem(INBOX_KEY)) || []; } catch (e) {}
  if (!inbox.length) return;
  for (const item of inbox) {
    board().cuts.push(newCut({ img: item.img || null, action: item.action || "", dialog: item.info ? "(" + item.info + ")" : "" }));
  }
  localStorage.removeItem(INBOX_KEY);
  save();
  setTimeout(() => toast("ショットデザイナーから " + inbox.length + " カット受信しました"), 300);
})();

function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { t.style.display = "none"; }, 3200);
}

/* ---------- board selector ---------- */
function renderTop() {
  const s = $("boardSel");
  s.textContent = "";
  for (const b of state.boards) {
    const op = document.createElement("option");
    op.value = b.id;
    op.textContent = b.title || "(無題)";
    if (b.id === state.currentId) op.selected = true;
    s.appendChild(op);
  }
  $("boardTitle").value = board().title;
  const total = board().cuts.reduce((a, c) => a + (parseFloat(c.sec) || 0), 0);
  const m = Math.floor(total / 60), sec = Math.round(total % 60);
  $("total").textContent = board().cuts.length + "カット ・ 合計 " + (m ? m + "分" : "") + sec + "秒";
}
$("boardSel").addEventListener("change", () => { state.currentId = $("boardSel").value; save(); renderAll(); });
$("boardTitle").addEventListener("input", () => { board().title = $("boardTitle").value; save(); renderTop(); });
$("newBoard").addEventListener("click", () => {
  const b = newBoard("");
  state.boards.push(b); state.currentId = b.id;
  save(); renderAll();
  $("boardTitle").focus();
});
$("dupBoard").addEventListener("click", () => {
  const c = JSON.parse(JSON.stringify(board()));
  c.id = newId();
  c.title = (c.title || "(無題)") + " のコピー";
  for (const cut of c.cuts) cut.id = newId();
  state.boards.push(c); state.currentId = c.id;
  save(); renderAll();
});
$("delBoard").addEventListener("click", () => {
  if (!confirm("「" + (board().title || "(無題)") + "」を削除しますか?")) return;
  state.boards = state.boards.filter(b => b.id !== state.currentId);
  if (!state.boards.length) state.boards = [newBoard("")];
  state.currentId = state.boards[0].id;
  save(); renderAll();
});

/* ---------- cuts grid ---------- */
let uploadTarget = null;

/* 列名の変更/削除(空欄で削除)。ヘッダとスマホ表示のラベル両方から呼べる */
function editCol(col) {
  const v = prompt("列名を変更(空欄にすると列を削除)", col.label);
  if (v === null) return;
  const name = v.trim();
  if (!name) {
    if (!confirm("列「" + col.label + "」を削除しますか?(この列の入力内容も消えます)")) return;
    board().cols = board().cols.filter(x => x.id !== col.id);
    for (const c of board().cuts) if (c.ex) delete c.ex[col.id];
  } else {
    col.label = name;
  }
  save(); renderAll();
}

function renderGrid() {
  const g = $("grid");
  g.textContent = "";
  const cols = board().cols;
  g.style.setProperty("--sbcols",
    "46px 300px 1.1fr 0.9fr " + cols.map(() => "0.7fr").join(" ") + (cols.length ? " " : "") + "64px 44px");
  const head = document.createElement("div");
  head.id = "listHead";
  for (const t of ["No", "画", "アクション / カメラ", "セリフ / 音"]) {
    const sp = document.createElement("span");
    sp.textContent = t;
    head.appendChild(sp);
  }
  for (const col of cols) {
    const sp = document.createElement("span");
    sp.className = "colHead";
    const nm = document.createElement("a");
    nm.textContent = col.label;
    nm.title = "タップで列名の変更・削除";
    nm.addEventListener("click", () => editCol(col));
    const x = document.createElement("button");
    x.textContent = "✕";
    x.title = "列を削除";
    x.addEventListener("click", () => {
      if (!confirm("列「" + col.label + "」を削除しますか?(この列の入力内容も消えます)")) return;
      board().cols = board().cols.filter(c2 => c2.id !== col.id);
      for (const c of board().cuts) if (c.ex) delete c.ex[col.id];
      save(); renderAll();
    });
    sp.append(nm, x);
    head.appendChild(sp);
  }
  for (const t of ["秒", ""]) {
    const sp = document.createElement("span");
    sp.textContent = t;
    head.appendChild(sp);
  }
  g.appendChild(head);
  board().cuts.forEach((c, i) => g.appendChild(cutCard(c, i)));
  const add = document.createElement("button");
  add.id = "addCard";
  add.textContent = "＋ カットを追加";
  add.addEventListener("click", () => {
    board().cuts.push(newCut());
    save(); renderAll();
  });
  g.appendChild(add);
}

function cutCard(c, i) {
  const card = document.createElement("div");
  card.className = "card";

  const no = document.createElement("div");
  no.className = "cno";
  no.textContent = "C" + (i + 1);

  const frame = document.createElement("div");
  frame.className = "frame";
  frame.title = "タップで画像を選択(撮影した写真・書き出したPNGなど)";
  if (c.img) {
    const img = document.createElement("img");
    img.src = c.img;
    frame.appendChild(img);
  } else {
    const e = document.createElement("div");
    e.className = "empty";
    const b1 = document.createElement("span"); b1.className = "big"; b1.textContent = "🖼";
    const b2 = document.createElement("span"); b2.textContent = "タップで画像を追加\n(🎥ボタンで3Dからも作れます)";
    b2.style.whiteSpace = "pre-line";
    e.append(b1, b2);
    frame.appendChild(e);
  }
  frame.addEventListener("click", () => {
    uploadTarget = c.id;
    $("fileIn").value = "";
    $("fileIn").click();
  });

  const mkCell = (cls, label, key, placeholder) => {
    const cell = document.createElement("div");
    cell.className = "cell " + cls;
    const l = document.createElement("div");
    l.className = "lbl";
    l.textContent = label;
    const t = document.createElement("textarea");
    t.placeholder = placeholder;
    t.value = c[key];
    t.addEventListener("input", () => { c[key] = t.value; save(); });
    cell.append(l, t);
    return cell;
  };
  const act = mkCell("act", "アクション / カメラ", "action", "例: Aが振り返る。ドリーで寄り");
  const dia = mkCell("dia", "セリフ / 音", "dialog", "例: A「おはよう」/ SE: ドアの音");

  // カスタム列(機材・備考など)
  const exCells = board().cols.map((col) => {
    const cell = document.createElement("div");
    cell.className = "cell";
    const l = document.createElement("div");
    l.className = "lbl exl";
    l.textContent = col.label;
    l.title = "タップで列名の変更・削除";
    l.addEventListener("click", () => editCol(col));
    const t = document.createElement("textarea");
    t.placeholder = col.label;
    t.value = (c.ex && c.ex[col.id]) || "";
    t.addEventListener("input", () => { c.ex = c.ex || {}; c.ex[col.id] = t.value; save(); });
    cell.append(l, t);
    return cell;
  });

  const secCell = document.createElement("div");
  secCell.className = "cell secCell";
  const slbl = document.createElement("div");
  slbl.className = "lbl";
  slbl.textContent = "秒";
  const sec = document.createElement("input");
  sec.inputMode = "decimal";
  sec.value = c.sec;
  sec.addEventListener("change", () => {
    const v = parseFloat(sec.value);
    c.sec = Number.isFinite(v) && v >= 0 ? v : 3;
    save(); renderTop();
    sec.value = c.sec;
  });
  const unit = document.createElement("span");
  unit.className = "unit";
  unit.textContent = "秒";
  secCell.append(slbl, sec, unit);

  const ctrl = document.createElement("div");
  ctrl.className = "ctrl";
  const mkBtn = (label, title, cls, fn) => {
    const b = document.createElement("button");
    b.textContent = label; b.title = title;
    if (cls) b.className = cls;
    b.addEventListener("click", fn);
    return b;
  };
  ctrl.append(
    mkBtn("▲", "上へ移動", "", () => {
      if (i === 0) return;
      const arr = board().cuts;
      [arr[i - 1], arr[i]] = [arr[i], arr[i - 1]];
      save(); renderAll();
    }),
    mkBtn("▼", "下へ移動", "", () => {
      const arr = board().cuts;
      if (i >= arr.length - 1) return;
      [arr[i + 1], arr[i]] = [arr[i], arr[i + 1]];
      save(); renderAll();
    }),
    mkBtn("🎥", "ショットデザイナーでつくる/編集", "b3d", () => {
      try {
        localStorage.setItem("shot.request.v1", JSON.stringify({
          boardId: board().id,
          cutId: c.id,
          title: (board().title ? board().title + " " : "") + "C" + (i + 1),
        }));
      } catch (e) { alert("連携情報を書き込めませんでした"); return; }
      location.href = "../shot/";
    }),
    mkBtn("⧉", "カットを複製", "", () => {
      const copy = JSON.parse(JSON.stringify(c));
      copy.id = newId();
      board().cuts.splice(i + 1, 0, copy);
      save(); renderAll();
    }),
    mkBtn("✕", "カットを削除", "del", () => {
      if (!confirm("C" + (i + 1) + " を削除しますか?")) return;
      board().cuts.splice(i, 1);
      save(); renderAll();
    })
  );

  card.append(no, frame, act, dia, ...exCells, secCell, ctrl);
  return card;
}

/* ---------- custom columns ---------- */
$("addCol").addEventListener("click", () => {
  const v = prompt("追加する列の名前(例: 機材、備考、T番号、出演)");
  if (v === null) return;
  const name = v.trim();
  if (!name) return;
  board().cols.push({ id: newId(), label: name });
  save(); renderAll();
  toast("列「" + name + "」を追加しました");
});

/* image upload: downscale to fit 960x540 */
$("fileIn").addEventListener("change", () => {
  const f = $("fileIn").files[0];
  if (!f || !uploadTarget) return;
  const img = new Image();
  img.onload = () => {
    const W = 960, H = 540;
    const cv = document.createElement("canvas");
    cv.width = W; cv.height = H;
    const ctx = cv.getContext("2d");
    ctx.fillStyle = "#101014";
    ctx.fillRect(0, 0, W, H);
    const sc = Math.min(W / img.width, H / img.height);
    const w = img.width * sc, h = img.height * sc;
    ctx.drawImage(img, (W - w) / 2, (H - h) / 2, w, h);
    const c = board().cuts.find(x => x.id === uploadTarget);
    if (c) { c.img = cv.toDataURL("image/jpeg", 0.82); save(); renderAll(); }
    URL.revokeObjectURL(img.src);
  };
  img.src = URL.createObjectURL(f);
});

/* ---------- JSON backup ---------- */
$("jsonOut").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(board())], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "storyboard_" + (board().title || "untitled").replace(/[\\/:*?"<>|\s]+/g, "_") + ".json";
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 2000);
});
$("jsonIn").addEventListener("click", () => { $("jsonFileIn").value = ""; $("jsonFileIn").click(); });
$("jsonFileIn").addEventListener("change", async () => {
  const f = $("jsonFileIn").files[0];
  if (!f) return;
  try {
    const b = JSON.parse(await f.text());
    if (!b.cuts) throw new Error("bad");
    if (!b.cols) b.cols = [];
    b.id = newId();
    for (const c of b.cuts) c.id = newId();
    state.boards.push(b);
    state.currentId = b.id;
    save(); renderAll();
    toast("「" + (b.title || "(無題)") + "」を読み込みました");
  } catch (e) {
    alert("読み込めませんでした(このツールのJSON保存ファイルを指定してください)");
  }
});

/* ---------- print / PDF ---------- */
$("printBtn").addEventListener("click", () => {
  const pv = $("printView");
  pv.textContent = "";

  // 表紙
  const totalSec = board().cuts.reduce((a, c) => a + (parseFloat(c.sec) || 0), 0);
  const durText = Math.floor(totalSec / 60) + "分" + Math.round(totalSec % 60) + "秒";
  const cover = document.createElement("div");
  cover.className = "pcover";
  const clogo = document.createElement("img");
  clogo.className = "plogoBig";
  clogo.alt = "8hammer";
  clogo.src = PRINT_LOGO;
  const clabel = document.createElement("div");
  clabel.className = "plabel";
  clabel.textContent = "STORYBOARD / 絵コンテ";
  const ctitle = document.createElement("div");
  ctitle.className = "ptitle";
  ctitle.textContent = board().title || "(無題)";
  const cinfo = document.createElement("div");
  cinfo.className = "pinfo";
  cinfo.textContent = "全 " + board().cuts.length + " カット ／ 合計尺 " + durText;
  const now = new Date();
  const cfoot = document.createElement("div");
  cfoot.className = "pfoot";
  cfoot.textContent = now.getFullYear() + "年" + (now.getMonth() + 1) + "月" + now.getDate() + "日 ／ 8hammer";
  cover.append(clogo, clabel, ctitle, cinfo, cfoot);
  pv.appendChild(cover);

  const phead = document.createElement("div");
  phead.className = "phead";
  const h1 = document.createElement("h1");
  h1.textContent = "絵コンテ — " + (board().title || "(無題)");
  const plogo = document.createElement("img");
  plogo.className = "plogo";
  plogo.alt = "8hammer";
  plogo.src = PRINT_LOGO;
  phead.append(h1, plogo);
  const meta = document.createElement("div");
  meta.className = "meta";
  const total = board().cuts.reduce((a, c) => a + (parseFloat(c.sec) || 0), 0);
  meta.textContent = board().cuts.length + "カット / 合計 " +
    Math.floor(total / 60) + "分" + Math.round(total % 60) + "秒 / 8hammer";
  const tbl = document.createElement("table");
  const cols = board().cols;
  // 列が増えたら画を少し詰めてA4に収める
  const picW = cols.length >= 2 ? "44mm" : cols.length === 1 ? "52mm" : "62mm";
  const thr = document.createElement("tr");
  const heads = ["No", "画", "アクション / カメラ", "セリフ / 音", ...cols.map(x => x.label), "秒"];
  for (const t of heads) {
    const th = document.createElement("th");
    th.textContent = t;
    thr.appendChild(th);
  }
  tbl.appendChild(thr);
  board().cuts.forEach((c, i) => {
    const tr = document.createElement("tr");
    const td1 = document.createElement("td"); td1.className = "no"; td1.textContent = i + 1;
    const td2 = document.createElement("td"); td2.className = "pic";
    td2.style.width = picW;
    if (c.img) { const im = document.createElement("img"); im.src = c.img; td2.appendChild(im); }
    const td3 = document.createElement("td"); td3.className = "white"; td3.textContent = c.action;
    const td4 = document.createElement("td"); td4.className = "white"; td4.textContent = c.dialog;
    tr.append(td1, td2, td3, td4);
    for (const col of cols) {
      const td = document.createElement("td");
      td.className = "white";
      td.textContent = (c.ex && c.ex[col.id]) || "";
      tr.appendChild(td);
    }
    const td5 = document.createElement("td"); td5.className = "sec"; td5.textContent = c.sec;
    tr.appendChild(td5);
    tbl.appendChild(tr);
  });
  pv.append(phead, meta, tbl);
  window.print();
});

/* ---------- boot ---------- */
function renderAll() { renderTop(); renderGrid(); }
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
renderAll();
</script>
