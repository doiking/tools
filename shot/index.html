<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e11">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<title>ショットデザイナー — 8hammer</title>
<style>
  :root {
    --bg: #0e0e11;
    --panel: #1c1c22;
    --line: #33333c;
    --fg: #f2f2ee;
    --dim: #9a9aa4;
    --accent: #f7c114;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    touch-action: manipulation;
    overscroll-behavior: none;
  }
  button { font-family: inherit; }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding: calc(8px + env(safe-area-inset-top)) calc(10px + env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom)) calc(10px + env(safe-area-inset-left));
    gap: 8px;
  }
  #topbar { display: flex; align-items: center; gap: 10px; flex: none; flex-wrap: wrap; }
  #topbar img { height: 22px; border-radius: 4px; }
  #topbar h1 { font-size: 16px; font-weight: 700; margin: 0; }
  #cutName {
    background: var(--panel); color: var(--fg);
    border: 1px solid var(--line); border-radius: 9px;
    font-size: 14px; font-weight: 600; padding: 8px 10px;
    width: 170px;
    -webkit-user-select: text; user-select: text;
  }
  #cutName:focus { outline: none; border-color: var(--accent); }
  #topbar select {
    background: var(--panel); color: var(--fg);
    border: 1px solid var(--line); border-radius: 9px;
    font-size: 14px; padding: 8px 8px;
    max-width: 170px;
  }
  #topbar button {
    background: var(--panel); color: var(--fg);
    border: 1px solid var(--line); border-radius: 9px;
    font-size: 13.5px; padding: 8px 11px;
  }
  #topbar button.acc { background: var(--accent); color: #17130a; border-color: var(--accent); font-weight: 700; }
  #topbar button.danger { color: #ff8484; }
  .spacer { flex: 1; }

  #main { flex: 1; display: flex; gap: 8px; min-height: 0; }

  /* plan view */
  #planWrap {
    flex: 1.1; min-width: 0;
    background: #141419;
    border: 1px solid var(--line);
    border-radius: 14px;
    position: relative;
    overflow: hidden;
  }
  #plan { width: 100%; height: 100%; display: block; touch-action: none; }
  #planTools {
    position: absolute; top: 8px; left: 8px;
    display: flex; gap: 6px;
  }
  #planTools button {
    background: rgba(36,36,44,.95); color: var(--fg);
    border: 1px solid var(--line); border-radius: 9px;
    font-size: 13.5px; font-weight: 600; padding: 8px 11px;
  }
  #sceneMenu[hidden] { display: none; }
  #sceneMenu {
    position: absolute; top: 52px; left: 8px;
    display: flex; flex-direction: column; gap: 5px;
    background: rgba(24,24,30,.97);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 8px;
    z-index: 5;
  }
  #sceneMenu button {
    background: #24242c; color: var(--fg);
    border: 1px solid var(--line); border-radius: 8px;
    font-size: 13.5px; padding: 9px 14px;
    text-align: left;
  }
  #sceneMenu button:active { background: var(--accent); color: #17130a; }
  #planZoom {
    position: absolute; bottom: 8px; left: 8px;
    display: flex; gap: 6px;
  }
  #planZoom button {
    width: 40px; height: 40px;
    background: rgba(36,36,44,.95); color: var(--fg);
    border: 1px solid var(--line); border-radius: 9px;
    font-size: 19px;
  }
  #planHint {
    position: absolute; bottom: 10px; right: 10px;
    font-size: 11px; color: var(--dim);
    pointer-events: none;
    text-align: right;
  }

  /* camera view + props */
  #side { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
  #camWrap {
    background: #000;
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    aspect-ratio: 16 / 9;
    flex: none;
  }
  #cam3d { width: 100%; height: 100%; display: block; }
  #thirds { position: absolute; inset: 0; pointer-events: none; }
  #camInfo {
    position: absolute; top: 6px; left: 8px;
    font-size: 11.5px; color: #ddd;
    text-shadow: 0 0 5px #000;
    pointer-events: none;
  }
  #fpsBtn {
    position: absolute; right: 8px; bottom: 8px;
    width: 42px; height: 36px;
    background: rgba(36,36,44,.9); color: var(--fg);
    border: 1px solid var(--line); border-radius: 9px;
    font-size: 17px;
  }
  #fpsHint {
    position: absolute; bottom: 8px; left: 50%;
    transform: translateX(-50%);
    font-size: 11.5px; color: #eee;
    background: rgba(0,0,0,.6);
    padding: 4px 12px; border-radius: 8px;
    pointer-events: none; white-space: nowrap;
  }

  #props {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 10px 12px;
    overflow-y: auto;
    min-height: 0;
  }
  #props .ptitle { font-size: 12px; letter-spacing: .1em; color: var(--dim); margin-bottom: 8px; }
  .prow { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .prow label { font-size: 13px; color: var(--dim); width: 74px; flex: none; }
  .prow input[type=range] { flex: 1; accent-color: var(--accent); height: 30px; }
  .prow .pval { width: 64px; text-align: right; font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .prow .btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .prow .btns button, .prowBtns button {
    background: #24242c; color: var(--fg);
    border: 1px solid var(--line); border-radius: 8px;
    font-size: 13px; padding: 7px 11px;
  }
  .prow .btns button.sel { background: var(--accent); color: #17130a; border-color: var(--accent); font-weight: 700; }
  .colorDot { width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent; padding: 0; }
  .colorDot.sel { border-color: #fff; }
  .prowBtns { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .prowBtns button.danger { color: #ff8484; }
  .prowBtns button.acc { background: var(--accent); color: #17130a; border-color: var(--accent); font-weight: 700; }
  #noSel { color: var(--dim); font-size: 13.5px; line-height: 1.8; }
  #props details { margin-top: 4px; border-top: 1px solid #26262e; padding-top: 8px; }
  #props summary {
    font-size: 13px; color: var(--dim);
    cursor: pointer; padding: 4px 0 10px;
    -webkit-user-select: none; user-select: none;
  }

  @media (max-width: 780px), (orientation: portrait) {
    #main { flex-direction: column; }
    #planWrap { flex: 1; min-height: 200px; }
    #side { flex: none; }
    #props { max-height: 200px; }
  }
  /* phones: compact toolbar (2 rows max) */
  @media (max-width: 600px) {
    #topbar { gap: 6px; }
    #topbar h1 { display: none; }
    #topbar select { max-width: 108px; font-size: 13px; padding: 8px 4px; }
    #cutName { width: 0; flex: 1; min-width: 80px; font-size: 13px; }
    #topbar button { font-size: 12.5px; padding: 8px 8px; }
    #planTools button { font-size: 12.5px; padding: 7px 9px; }
    #planHint { display: none; }
    #props { max-height: 240px; }
  }
</style>
</head>
<body>

  <div id="topbar">

    <h1>ショットデザイナー</h1>
    <select id="cutSel"></select>
    <input id="cutName" placeholder="カット名">
    <button id="newCut">＋新規</button>
    <button id="dupCut">複製</button>
    <button id="delCut" class="danger">削除</button>
    <span class="spacer"></span>
    <button id="exportPng" class="acc">📷 PNG書き出し</button>
  </div>

  <div id="main">
    <div id="planWrap">
      <canvas id="plan"></canvas>
      <div id="planTools">
        <button id="addPerson">＋人物</button>
        <button id="addCam">＋カメラ</button>
        <button id="addBox">＋箱</button>

          <line x1="106.7" y1="0" x2="106.7" y2="90" stroke="rgba(255,255,255,.22)" stroke-width="0.4"/>

<script type="module">
import * as THREE from "./vendor/three.module.min.js";

"use strict";
const LS_KEY = "shot.v1";
const $ = (id) => document.getElementById(id);
const PERSON_COLORS = ["#f7c114", "#ff6b5a", "#4aa3ff", "#3ecf6e", "#c07bff", "#ff9a3c"];

// sensors (native size; the app always shoots 16:9 so we use the 16:9 crop)
const SENSORS = [
  { n: "フルサイズ", w: 36.0, h: 24.0 },
  { n: "Super35", w: 24.9, h: 18.7 },
  { n: "APS-C", w: 23.6, h: 15.6 },
  { n: "MFT", w: 17.3, h: 13.0 },
  { n: "1型", w: 13.2, h: 8.8 },
];
function sensor169(name) {
  const sn = SENSORS.find(x => x.n === name) || SENSORS[0];
  const w = Math.min(sn.w, sn.h * 16 / 9);
  return { w, h: w * 9 / 16 };
}
const FF169_DIAG = Math.hypot(36, 20.25);

// mannequin pose (degrees)
const DEFAULT_PV = { armRp: 0, armRa: 0, armRe: 0, armLp: 0, armLa: 0, armLe: 0,
  legRp: 0, legRk: 0, legLp: 0, legLk: 0, bend: 0, headP: 0, headY: 0 };
const POSE_PRESETS = {
  "立ち": {},
  "歩き": { armRp: 28, armLp: -28, armRe: 12, armLe: 12, legRp: -16, legRk: 18, legLp: 22, bend: 3 },
  "走り": { armRp: 60, armLp: -50, armRe: 100, armLe: 100, legRp: -35, legRk: 70, legLp: 45, legLk: 30, bend: 14 },
  "座り": { legRp: 85, legRk: 85, legLp: 85, legLk: 85, armRp: 20, armLp: 20, armRe: 25, armLe: 25, bend: 4 },
  "指差し": { armRp: 85, armRa: 10 },
  "電話": { armRp: 18, armRa: 6, armRe: 152, headY: -10 },
  "万歳": { armRp: 168, armLp: 168, armRa: 18, armLa: 18 },
  "お辞儀": { bend: 48, headP: 12, armRp: 8, armLp: 8 },
  "構え": { legRp: 28, legRk: 32, legLp: -14, legLk: 22, armRp: 58, armRe: 115, armLp: 46, armLe: 125, bend: 10 },
  "食べる": { legRp: 85, legRk: 85, legLp: 85, legLk: 85, armRp: 42, armRe: 122, armLp: 25, armLe: 45, bend: 8, headP: 10 },
  "乾杯": { armRp: 52, armRa: 14, armRe: 95, headP: -4 },
};
const FACES = [["normal", "普通"], ["smile", "笑顔"], ["surprise", "驚き"], ["angry", "怒り"]];
function mirrorPV(pv) {
  const m = Object.assign({}, DEFAULT_PV, pv);
  const swap = (a, b) => { const t = m[a]; m[a] = m[b]; m[b] = t; };
  swap("armRp", "armLp"); swap("armRa", "armLa"); swap("armRe", "armLe");
  swap("legRp", "legLp"); swap("legRk", "legLk");
  m.headY = -m.headY;
  return m;
}

// multi-person scene presets: offsets are relative to the current view center.
// rotDeg: 0 = +x(東), 90 = +z(手前/南)
const P = POSE_PRESETS;
const SCENE_PRESETS = {
  "食事(2人+テーブル)": {
    boxes: [{ dx: 0, dz: 0, w: 1.2, d: 0.8, bh: 0.72 }],
    people: [
      { dx: 0, dz: -0.88, rotDeg: 90, pose: P["食べる"], face: "smile" },
      { dx: 0, dz: 0.88, rotDeg: -90, pose: mirrorPV(P["食べる"]), face: "normal" },
    ],
  },
  "対談(2人)": {
    boxes: [{ dx: 0, dz: 0, w: 0.55, d: 0.55, bh: 0.45 }],
    people: [
      { dx: -0.95, dz: 0, rotDeg: 20, pose: P["座り"], face: "smile" },
      { dx: 0.95, dz: 0, rotDeg: 160, pose: mirrorPV(P["座り"]), face: "normal" },
    ],
  },
  "対決(2人)": {
    people: [
      { dx: -1.2, dz: 0, rotDeg: 0, pose: P["構え"], face: "angry" },
      { dx: 1.2, dz: 0, rotDeg: 180, pose: mirrorPV(P["構え"]), face: "angry" },
    ],
  },
  "会議(4人+テーブル)": {
    boxes: [{ dx: 0, dz: 0, w: 1.8, d: 0.9, bh: 0.72 }],
    people: [
      { dx: -0.45, dz: -0.92, rotDeg: 90, pose: P["座り"], face: "normal" },
      { dx: 0.45, dz: -0.92, rotDeg: 90, pose: P["座り"], face: "smile" },
      { dx: -0.45, dz: 0.92, rotDeg: -90, pose: mirrorPV(P["座り"]), face: "normal" },
      { dx: 0.45, dz: 0.92, rotDeg: -90, pose: P["座り"], face: "surprise" },
    ],
  },
  "乾杯(2人)": {
    people: [
      { dx: -0.65, dz: 0, rotDeg: 0, pose: P["乾杯"], face: "smile" },
      { dx: 0.65, dz: 0, rotDeg: 180, pose: P["乾杯"], face: "smile" },
    ],
  },
  "プレゼン(3人)": {
    people: [
      { dx: 0, dz: -1.6, rotDeg: 90, pose: P["指差し"], face: "normal" },
      { dx: -0.55, dz: 1.1, rotDeg: -90, pose: P["座り"], face: "normal" },
      { dx: 0.55, dz: 1.1, rotDeg: -90, pose: mirrorPV(P["座り"]), face: "smile" },
    ],
  },
  "並んで歩く(2人)": {
    people: [
      { dx: -0.45, dz: 0, rotDeg: 90, pose: P["歩き"], face: "smile" },
      { dx: 0.45, dz: 0, rotDeg: 90, pose: mirrorPV(P["歩き"]), face: "normal" },
    ],
  },
};
function migratePerson(o) {
  if (!o.pv) {
    o.pv = Object.assign({}, DEFAULT_PV, o.pose === "sit" ? POSE_PRESETS["座り"] : {});
    o.poseName = o.pose === "sit" ? "座り" : "立ち";
    delete o.pose;
  }
  if (!o.face) o.face = "normal";
}

/* ================= data ================= */
let uid = 0;
const newId = () => Date.now().toString(36) + (uid++);

function defaultCut(name) {
  const cam = { id: newId(), type: "camera", x: 0, z: 3, rot: -Math.PI / 2, h: 1.5, fl: 35, tilt: 0, sensor: "フルサイズ" };
  return {
    id: newId(), name,
    objects: [
      { id: newId(), type: "person", x: 0, z: 0, rot: Math.PI / 2, h: 1.7,
        pv: Object.assign({}, DEFAULT_PV), poseName: "立ち", face: "normal",
        color: PERSON_COLORS[0], label: "A" },
      cam,
    ],
    camId: cam.id,
  };
}

let state = { cuts: [], currentId: null };
try { const raw = localStorage.getItem(LS_KEY); if (raw) state = JSON.parse(raw); } catch (e) {}
if (!state.cuts || !state.cuts.length) {
  const c = defaultCut("カット1");
  state = { cuts: [c], currentId: c.id };
}
if (!state.cuts.find(c => c.id === state.currentId)) state.currentId = state.cuts[0].id;
for (const c of state.cuts) {
  for (const o of c.objects) {
    if (o.type === "person") migratePerson(o);
    if (o.type === "camera" && !o.sensor) o.sensor = "フルサイズ";
  }
}

function save() { try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {} }
function cut() { return state.cuts.find(c => c.id === state.currentId); }
function objs() { return cut().objects; }
function activeCam() { return objs().find(o => o.id === cut().camId) || objs().find(o => o.type === "camera"); }

let selId = null;
function sel() { return objs().find(o => o.id === selId) || null; }

/* ================= plan view (2D canvas) ================= */
const plan = $("plan");
const pctx = plan.getContext("2d");
let view = { cx: 0, cz: 1.2, scale: 60 }; // world center + px per meter

function resizePlan() {
  const dpr = window.devicePixelRatio || 1;
  const r = plan.getBoundingClientRect();
  plan.width = r.width * dpr;
  plan.height = r.height * dpr;
  drawPlan();
}
function w2s(x, z) { // world → screen (css px)
  const r = plan.getBoundingClientRect();
  return [r.width / 2 + (x - view.cx) * view.scale, r.height / 2 + (z - view.cz) * view.scale];
}
function s2w(px, py) {
  const r = plan.getBoundingClientRect();
  return [(px - r.width / 2) / view.scale + view.cx, (py - r.height / 2) / view.scale + view.cz];
}

function drawPlan() {
  const dpr = window.devicePixelRatio || 1;
  const W = plan.width / dpr, H = plan.height / dpr;
  pctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  pctx.clearRect(0, 0, W, H);

  // grid (1m)
  const [x0, z0] = s2w(0, 0), [x1, z1] = s2w(W, H);
  pctx.lineWidth = 1;
  for (let gx = Math.floor(x0); gx <= Math.ceil(x1); gx++) {
    const [sx] = w2s(gx, 0);
    pctx.strokeStyle = gx === 0 ? "#3c3c48" : "#22222a";
    pctx.beginPath(); pctx.moveTo(sx, 0); pctx.lineTo(sx, H); pctx.stroke();
  }
  for (let gz = Math.floor(z0); gz <= Math.ceil(z1); gz++) {
    const [, sz] = w2s(0, gz);
    pctx.strokeStyle = gz === 0 ? "#3c3c48" : "#22222a";
    pctx.beginPath(); pctx.moveTo(0, sz); pctx.lineTo(W, sz); pctx.stroke();
  }

  for (const o of objs()) {
    const [sx, sz] = w2s(o.x, o.z);
    const isSel = o.id === selId;

    if (o.type === "camera") {
      const active = o.id === cut().camId;
      // FOV cone
      const half = Math.atan(sensor169(o.sensor).w / 2 / o.fl);
      const len = 4 * view.scale;
      pctx.fillStyle = active ? "rgba(247,193,20,.13)" : "rgba(150,150,160,.08)";
      pctx.beginPath();
      pctx.moveTo(sx, sz);
      pctx.lineTo(sx + Math.cos(o.rot - half) * len, sz + Math.sin(o.rot - half) * len);
      pctx.lineTo(sx + Math.cos(o.rot + half) * len, sz + Math.sin(o.rot + half) * len);
      pctx.closePath(); pctx.fill();
      // body
      pctx.save();
      pctx.translate(sx, sz); pctx.rotate(o.rot);
      pctx.fillStyle = active ? "#f7c114" : "#8a8a94";
      pctx.fillRect(-9, -7, 14, 14);
      pctx.beginPath();
      pctx.moveTo(5, -6); pctx.lineTo(13, 0); pctx.lineTo(5, 6);
      pctx.closePath(); pctx.fill();
      pctx.restore();
      if (isSel) ring(sx, sz, 17);
      tag(sx, sz - 20, (active ? "📷" : "cam") + " " + o.fl + "mm");
    } else if (o.type === "person") {
      const r = 0.26 * view.scale;
      pctx.fillStyle = o.color;
      pctx.beginPath(); pctx.arc(sx, sz, r, 0, 7); pctx.fill();
      // facing tick
      pctx.strokeStyle = "#111"; pctx.lineWidth = 3;
      pctx.beginPath();
      pctx.moveTo(sx + Math.cos(o.rot) * r * 0.4, sz + Math.sin(o.rot) * r * 0.4);
      pctx.lineTo(sx + Math.cos(o.rot) * r * 1.25, sz + Math.sin(o.rot) * r * 1.25);
      pctx.stroke();
      pctx.fillStyle = "#111";
      pctx.font = "bold " + Math.max(11, r * 0.9) + "px sans-serif";
      pctx.textAlign = "center"; pctx.textBaseline = "middle";
      pctx.fillText(o.label, sx, sz);
      if (isSel) ring(sx, sz, r + 5);
    } else { // box
      pctx.save();
      pctx.translate(sx, sz); pctx.rotate(o.rot);
      const w = o.w * view.scale, d = o.d * view.scale;
      pctx.fillStyle = "#5a5a66";
      pctx.strokeStyle = "#787884"; pctx.lineWidth = 1.5;
      pctx.fillRect(-w / 2, -d / 2, w, d);
      pctx.strokeRect(-w / 2, -d / 2, w, d);
      pctx.restore();
      if (isSel) ring(sx, sz, Math.max(o.w, o.d) * view.scale * 0.72 + 4);
    }
  }

  function ring(x, y, r) {
    pctx.strokeStyle = "#f7c114"; pctx.lineWidth = 2.5;
    pctx.setLineDash([5, 4]);
    pctx.beginPath(); pctx.arc(x, y, r, 0, 7); pctx.stroke();
    pctx.setLineDash([]);
  }
  function tag(x, y, text) {
    pctx.font = "10.5px sans-serif";
    pctx.textAlign = "center"; pctx.textBaseline = "bottom";
    pctx.fillStyle = "#bbb";
    pctx.fillText(text, x, y);
  }
}

/* plan interactions */
let drag = null; // {mode:'obj'|'pan', id, offX, offZ} ; pinch: {mode:'pinch', d0, s0}
const pointers = new Map();

plan.addEventListener("pointerdown", (e) => {
  plan.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, e);
  if (pointers.size === 2) {
    const [a, b] = [...pointers.values()];
    drag = { mode: "pinch", d0: Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY), s0: view.scale };
    return;
  }
  const rect = plan.getBoundingClientRect();
  const [wx, wz] = s2w(e.clientX - rect.left, e.clientY - rect.top);
  const hit = hitTest(wx, wz);
  if (hit) {
    selId = hit.id;
    drag = { mode: "obj", id: hit.id, offX: hit.x - wx, offZ: hit.z - wz };
  } else {
    drag = { mode: "pan", wx, wz };
  }
  renderAll();
});
plan.addEventListener("pointermove", (e) => {
  if (!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, e);
  if (!drag) return;
  const rect = plan.getBoundingClientRect();
  if (drag.mode === "pinch" && pointers.size === 2) {
    const [a, b] = [...pointers.values()];
    const d = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    view.scale = Math.min(220, Math.max(18, drag.s0 * d / drag.d0));
    drawPlan();
    return;
  }
  const [wx, wz] = s2w(e.clientX - rect.left, e.clientY - rect.top);
  if (drag.mode === "obj") {
    const o = objs().find(x => x.id === drag.id);
    if (o) {
      o.x = Math.round((wx + drag.offX) * 10) / 10;
      o.z = Math.round((wz + drag.offZ) * 10) / 10;
      renderAll(false);
    }
  } else if (drag.mode === "pan") {
    view.cx -= wx - drag.wx;
    view.cz -= wz - drag.wz;
    drawPlan();
  }
});
function endPointer(e) {
  pointers.delete(e.pointerId);
  if (pointers.size < 2 && drag && drag.mode === "pinch") drag = null;
  if (pointers.size === 0) { if (drag && drag.mode === "obj") save(); drag = null; }
}
plan.addEventListener("pointerup", endPointer);
plan.addEventListener("pointercancel", endPointer);

function hitTest(wx, wz) {
  const list = [...objs()].reverse();
  for (const o of list) {
    const d = Math.hypot(o.x - wx, o.z - wz);
    const r = o.type === "person" ? 0.35 : o.type === "camera" ? 0.35 : Math.max(o.w, o.d) * 0.6;
    if (d <= r) return o;
  }
  return null;
}

$("zoomIn").addEventListener("click", () => { view.scale = Math.min(220, view.scale * 1.3); drawPlan(); });
$("zoomOut").addEventListener("click", () => { view.scale = Math.max(18, view.scale / 1.3); drawPlan(); });

/* ================= 3D camera view ================= */
const renderer = new THREE.WebGLRenderer({ canvas: $("cam3d"), antialias: true, preserveDrawingBuffer: true });
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x191921);
scene.fog = new THREE.Fog(0x191921, 22, 45);
const cam3 = new THREE.PerspectiveCamera(40, 16 / 9, 0.05, 200);

scene.add(new THREE.HemisphereLight(0xcfd4e8, 0x2a2a30, 1.1));
const dir = new THREE.DirectionalLight(0xffffff, 1.4);
dir.position.set(5, 9, 4);
scene.add(dir);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshLambertMaterial({ color: 0x26262e })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);
const grid = new THREE.GridHelper(80, 80, 0x4a4a56, 0x32323c);
grid.position.y = 0.002;
scene.add(grid);

const meshCache = new Map(); // id → {group, key}

function disposeGroup(g) {
  g.traverse(n => {
    if (n.geometry) n.geometry.dispose();
    if (n.material) n.material.dispose();
  });
}

/* ---- articulated mannequin ---- */
const D2R = Math.PI / 180;
function personKey(o) { return JSON.stringify(["p", o.h, o.color, o.face, o.pv]); }

function buildPerson(o) {
  const s = o.h / 1.7;
  const pv = o.pv || DEFAULT_PV;
  const mat = () => new THREE.MeshLambertMaterial({ color: o.color });
  const dark = () => new THREE.MeshLambertMaterial({ color: 0x222226 });

  const headR = 0.105 * s;
  const torsoR = 0.14 * s, torsoLen = 0.36 * s;
  const shoulderY = 0.50 * s;                 // from pelvis
  const upperLen = 0.28 * s, foreLen = 0.24 * s, armR = 0.045 * s;
  const thighLen = 0.42 * s, shinLen = 0.48 * s, legR = 0.06 * s;

  // pelvis height so the lower foot stays on the ground
  const legH = (p, k) =>
    Math.max(0, thighLen * Math.cos(p * D2R)) + Math.max(0, shinLen * Math.cos((p - k) * D2R));
  const pelvisY = Math.max(legH(pv.legRp, pv.legRk), legH(pv.legLp, pv.legLk), 0.30 * s);

  const g = new THREE.Group();
  const pelvis = new THREE.Group();
  pelvis.position.y = pelvisY;
  g.add(pelvis);

  // hips block
  const hips = new THREE.Mesh(new THREE.CapsuleGeometry(torsoR * 0.9, 0.06 * s, 4, 10), mat());
  hips.rotation.z = Math.PI / 2;
  pelvis.add(hips);

  // torso bends forward from the pelvis
  const torsoPivot = new THREE.Group();
  torsoPivot.rotation.x = pv.bend * D2R; // 正=前屈(キャラ正面は+z)
  pelvis.add(torsoPivot);
  const torso = new THREE.Mesh(new THREE.CapsuleGeometry(torsoR, torsoLen, 6, 14), mat());
  torso.position.y = shoulderY / 2 + 0.04 * s;
  torsoPivot.add(torso);

  // head + face
  const neck = new THREE.Group();
  neck.position.y = shoulderY + 0.02 * s;
  neck.rotation.set(pv.headP * D2R, pv.headY * D2R, 0);
  torsoPivot.add(neck);
  const head = new THREE.Mesh(new THREE.SphereGeometry(headR, 18, 14), mat());
  head.position.y = headR + 0.04 * s;
  neck.add(head);
  const face = new THREE.Group();
  face.position.y = headR + 0.04 * s;
  neck.add(face);
  const eyeGeo = new THREE.SphereGeometry(headR * 0.13, 8, 8);
  for (const sx of [-1, 1]) {
    const eye = new THREE.Mesh(eyeGeo.clone(), dark());
    eye.position.set(sx * headR * 0.34, headR * 0.15, headR * 0.93);
    face.add(eye);
    if (o.face === "angry") {
      const brow = new THREE.Mesh(new THREE.BoxGeometry(headR * 0.42, headR * 0.09, headR * 0.06), dark());
      brow.position.set(sx * headR * 0.34, headR * 0.44, headR * 0.93);
      brow.rotation.z = sx * 0.5;
      face.add(brow);
    }
  }
  let mouth;
  if (o.face === "smile") {
    mouth = new THREE.Mesh(new THREE.TorusGeometry(headR * 0.32, headR * 0.06, 8, 14, Math.PI), dark());
    mouth.rotation.z = Math.PI;
  } else if (o.face === "surprise") {
    mouth = new THREE.Mesh(new THREE.TorusGeometry(headR * 0.16, headR * 0.06, 8, 14), dark());
  } else {
    mouth = new THREE.Mesh(new THREE.BoxGeometry(headR * (o.face === "angry" ? 0.4 : 0.5), headR * 0.08, headR * 0.06), dark());
  }
  mouth.position.set(0, -headR * 0.36, headR * 0.99);
  face.add(mouth);

  // arms: pivot at shoulder; abduction(z) → pitch(x), limb hangs down (-y)
  const limb = (len, r, m) => {
    const mesh = new THREE.Mesh(new THREE.CapsuleGeometry(r, len, 4, 10), m);
    mesh.position.y = -len / 2;
    return mesh;
  };
  for (const side of [1, -1]) { // 1 = 右(+x), -1 = 左
    const a = side === 1 ? { p: pv.armRp, ab: pv.armRa, e: pv.armRe } : { p: pv.armLp, ab: pv.armLa, e: pv.armLe };
    const shoulder = new THREE.Group();
    shoulder.position.set(side * (torsoR + armR + 0.015 * s), shoulderY - 0.03 * s, 0);
    shoulder.rotation.set(-a.p * D2R, 0, side * a.ab * D2R); // XYZ: abd applied first
    torsoPivot.add(shoulder);
    shoulder.add(limb(upperLen, armR, mat()));
    const elbow = new THREE.Group();
    elbow.position.y = -upperLen;
    elbow.rotation.x = -a.e * D2R;
    shoulder.add(elbow);
    elbow.add(limb(foreLen, armR * 0.9, mat()));
    const hand = new THREE.Mesh(new THREE.SphereGeometry(armR * 1.3, 10, 8), mat());
    hand.position.y = -foreLen - armR;
    elbow.add(hand);

    // legs
    const l = side === 1 ? { p: pv.legRp, k: pv.legRk } : { p: pv.legLp, k: pv.legLk };
    const hip = new THREE.Group();
    hip.position.set(side * 0.09 * s, 0, 0);
    hip.rotation.x = -l.p * D2R;
    pelvis.add(hip);
    hip.add(limb(thighLen, legR, mat()));
    const knee = new THREE.Group();
    knee.position.y = -thighLen;
    knee.rotation.x = l.k * D2R;
    hip.add(knee);
    knee.add(limb(shinLen - 0.05 * s, legR * 0.85, mat()));
    const foot = new THREE.Mesh(new THREE.BoxGeometry(legR * 2, 0.05 * s, 0.16 * s), mat());
    foot.position.set(0, -(shinLen - 0.03 * s), 0.04 * s);
    knee.add(foot);
  }
  return g;
}
function boxKey(o) { return ["b", o.w, o.d, o.bh].join("|"); }
function buildBox(o) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(o.w, o.bh, o.d),
    new THREE.MeshLambertMaterial({ color: 0x6a6a76 }));
  const g = new THREE.Group();
  m.position.y = o.bh / 2;
  g.add(m);
  return g;
}
function camKey(o, active) { return ["c", active].join("|"); }
function buildCamModel() {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.22, 0.34),
    new THREE.MeshLambertMaterial({ color: 0x35353f }));
  const lens = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.16, 14),
    new THREE.MeshLambertMaterial({ color: 0x18181d }));
  lens.rotation.x = Math.PI / 2;
  lens.position.z = 0.25;
  const legs = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.32, 1.0, 8, 1, true),
    new THREE.MeshLambertMaterial({ color: 0x44444e, wireframe: true }));
  legs.position.y = -0.6;
  g.add(body, lens, legs);
  return g;
}

function syncScene() {
  const alive = new Set();
  for (const o of objs()) {
    const isActiveCam = o.type === "camera" && o.id === cut().camId;
    if (isActiveCam) continue; // don't render the camera we look through
    let key, builder;
    if (o.type === "person") { key = personKey(o); builder = () => buildPerson(o); }
    else if (o.type === "box") { key = boxKey(o); builder = () => buildBox(o); }
    else { key = camKey(o, false); builder = buildCamModel; }
    let entry = meshCache.get(o.id);
    if (!entry || entry.key !== key) {
      if (entry) { scene.remove(entry.group); disposeGroup(entry.group); }
      entry = { group: builder(), key };
      scene.add(entry.group);
      meshCache.set(o.id, entry);
    }
    const g = entry.group;
    g.position.set(o.x, o.type === "camera" ? o.h : 0, o.z);
    // face along rot: rot=0 → +x
    g.rotation.y = -o.rot + Math.PI / 2;
    alive.add(o.id);
  }
  for (const [id, entry] of meshCache) {
    if (!alive.has(id)) { scene.remove(entry.group); disposeGroup(entry.group); meshCache.delete(id); }
  }
}

function renderCam() {
  const c = activeCam();
  if (!c) { renderer.clear(); $("camInfo").textContent = "カメラがありません(＋カメラで追加)"; return; }
  syncScene();
  const sn = sensor169(c.sensor);
  cam3.fov = 2 * Math.atan(sn.h / 2 / c.fl) * 180 / Math.PI;
  cam3.aspect = 16 / 9;
  cam3.updateProjectionMatrix();
  const tilt = (c.tilt || 0) * Math.PI / 180;
  cam3.position.set(c.x, c.h, c.z);
  cam3.lookAt(
    c.x + Math.cos(c.rot) * Math.cos(tilt),
    c.h + Math.sin(tilt),
    c.z + Math.sin(c.rot) * Math.cos(tilt)
  );
  const r = $("cam3d").getBoundingClientRect();
  renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
  renderer.setSize(r.width, r.height, false);
  renderer.render(scene, cam3);
  const cf = FF169_DIAG / Math.hypot(sn.w, sn.h);
  const eq = Math.round(c.fl * cf);
  $("camInfo").textContent = "📷 " + (c.sensor || "フルサイズ") + " " + c.fl + "mm" +
    (cf > 1.01 ? "(フルサイズ換算 " + eq + "mm)" : "") +
    " / 高さ" + c.h.toFixed(2) + "m / TILT " + (c.tilt || 0) + "°";
}

/* ================= property panel ================= */
function slider(labelText, min, max, step, val, unit, onInput) {
  const row = document.createElement("div");
  row.className = "prow";
  const lb = document.createElement("label"); lb.textContent = labelText;
  const rg = document.createElement("input");
  rg.type = "range"; rg.min = min; rg.max = max; rg.step = step; rg.value = val;
  const pv = document.createElement("span"); pv.className = "pval";
  const show = (v) => pv.textContent = (step < 1 ? (+v).toFixed(step < 0.1 ? 2 : 1) : Math.round(v)) + unit;
  show(val);
  rg.addEventListener("input", () => { show(rg.value); onInput(parseFloat(rg.value)); });
  rg.addEventListener("change", save);
  row.append(lb, rg, pv);
  return row;
}

function renderProps() {
  const box = $("props");
  box.textContent = "";
  const o = sel();
  const title = document.createElement("div");
  title.className = "ptitle";
  if (!o) {
    title.textContent = "プロパティ";
    const p = document.createElement("div");
    p.id = "noSel";
    p.textContent = "俯瞰ビューで人物・カメラ・箱をタップすると、ここで回転・高さ・レンズなどを調整できます。ドラッグで位置を移動。";
    box.append(title, p);
    return;
  }

  if (o.type === "person") {
    title.textContent = "人物 " + o.label;
    box.appendChild(title);
    // colors
    const crow = document.createElement("div");
    crow.className = "prow";
    const clb = document.createElement("label"); clb.textContent = "カラー";
    const cbtns = document.createElement("div"); cbtns.className = "btns";
    for (const c of PERSON_COLORS) {
      const b = document.createElement("button");
      b.className = "colorDot" + (o.color === c ? " sel" : "");
      b.style.background = c;
      b.addEventListener("click", () => { o.color = c; save(); renderAll(); });
      cbtns.appendChild(b);
    }
    crow.append(clb, cbtns);
    box.appendChild(crow);
    // face
    const frow = document.createElement("div");
    frow.className = "prow";
    const flb = document.createElement("label"); flb.textContent = "表情";
    const fbtns = document.createElement("div"); fbtns.className = "btns";
    for (const [k, n] of FACES) {
      const b = document.createElement("button");
      b.textContent = n;
      if (o.face === k) b.classList.add("sel");
      b.addEventListener("click", () => { o.face = k; save(); renderAll(); });
      fbtns.appendChild(b);
    }
    frow.append(flb, fbtns);
    box.appendChild(frow);
    // pose presets
    const prow = document.createElement("div");
    prow.className = "prow";
    const plb = document.createElement("label"); plb.textContent = "ポーズ";
    const pbtns = document.createElement("div"); pbtns.className = "btns";
    for (const name of Object.keys(POSE_PRESETS)) {
      const b = document.createElement("button");
      b.textContent = name;
      if (o.poseName === name) b.classList.add("sel");
      b.addEventListener("click", () => {
        o.pv = Object.assign({}, DEFAULT_PV, POSE_PRESETS[name]);
        o.poseName = name;
        save(); renderAll();
      });
      pbtns.appendChild(b);
    }
    prow.append(plb, pbtns);
    box.appendChild(prow);
    box.appendChild(slider("身長", 1.2, 2.0, 0.01, o.h, "m", v => { o.h = v; renderAll(false); }));
    box.appendChild(slider("向き", -180, 180, 1, o.rot * 180 / Math.PI, "°", v => { o.rot = v * Math.PI / 180; renderAll(false); }));
    // fine-tune limbs
    const det = document.createElement("details");
    const sum = document.createElement("summary");
    sum.textContent = "手足を細かく動かす";
    det.appendChild(sum);
    const pvSlider = (label, key, min, max) =>
      det.appendChild(slider(label, min, max, 1, o.pv[key], "°", v => { o.pv[key] = v; o.poseName = null; renderAll(false); }));
    pvSlider("右腕 上げ", "armRp", -45, 180);
    pvSlider("右腕 開き", "armRa", 0, 90);
    pvSlider("右ひじ", "armRe", 0, 150);
    pvSlider("左腕 上げ", "armLp", -45, 180);
    pvSlider("左腕 開き", "armLa", 0, 90);
    pvSlider("左ひじ", "armLe", 0, 150);
    pvSlider("右脚 前後", "legRp", -45, 95);
    pvSlider("右ひざ", "legRk", 0, 140);
    pvSlider("左脚 前後", "legLp", -45, 95);
    pvSlider("左ひざ", "legLk", 0, 140);
    pvSlider("上体 前屈", "bend", -20, 60);
    pvSlider("首 上下", "headP", -35, 40);
    pvSlider("首 左右", "headY", -70, 70);
    box.appendChild(det);
  } else if (o.type === "camera") {
    title.textContent = "カメラ" + (o.id === cut().camId ? "(表示中)" : "");
    box.appendChild(title);
    // sensor
    const srow = document.createElement("div");
    srow.className = "prow";
    const slb = document.createElement("label"); slb.textContent = "センサー";
    const sbtns = document.createElement("div"); sbtns.className = "btns";
    for (const sn of SENSORS) {
      const b = document.createElement("button");
      b.textContent = sn.n;
      if ((o.sensor || "フルサイズ") === sn.n) b.classList.add("sel");
      b.addEventListener("click", () => { o.sensor = sn.n; save(); renderAll(); });
      sbtns.appendChild(b);
    }
    srow.append(slb, sbtns);
    box.appendChild(srow);
    box.appendChild(slider("焦点距離", 8, 300, 1, o.fl, "mm", v => { o.fl = v; renderAll(false); }));
    box.appendChild(slider("高さ", 0.2, 3.5, 0.05, o.h, "m", v => { o.h = v; renderAll(false); }));
    box.appendChild(slider("パン(向き)", -180, 180, 1, o.rot * 180 / Math.PI, "°", v => { o.rot = v * Math.PI / 180; renderAll(false); }));
    box.appendChild(slider("チルト", -45, 45, 1, o.tilt || 0, "°", v => { o.tilt = v; renderAll(false); }));
  } else {
    title.textContent = "箱・小道具";
    box.appendChild(title);
    box.appendChild(slider("幅", 0.2, 4, 0.1, o.w, "m", v => { o.w = v; renderAll(false); }));
    box.appendChild(slider("奥行", 0.2, 4, 0.1, o.d, "m", v => { o.d = v; renderAll(false); }));
    box.appendChild(slider("高さ", 0.1, 3, 0.05, o.bh, "m", v => { o.bh = v; renderAll(false); }));
    box.appendChild(slider("向き", -180, 180, 1, o.rot * 180 / Math.PI, "°", v => { o.rot = v * Math.PI / 180; renderAll(false); }));
  }

  const btns = document.createElement("div");
  btns.className = "prowBtns";
  if (o.type === "camera") {
    if (o.id !== cut().camId) {
      const useBtn = document.createElement("button");
      useBtn.className = "acc";
      useBtn.textContent = "このカメラで見る";
      useBtn.addEventListener("click", () => { cut().camId = o.id; save(); renderAll(); });
      btns.appendChild(useBtn);
    }
    const aimBtn = document.createElement("button");
    aimBtn.textContent = "近くの人物に向ける";
    aimBtn.addEventListener("click", () => {
      const people = objs().filter(x => x.type === "person");
      if (!people.length) return;
      let best = people[0], bd = 1e9;
      for (const p of people) {
        const d = Math.hypot(p.x - o.x, p.z - o.z);
        if (d < bd) { bd = d; best = p; }
      }
      o.rot = Math.atan2(best.z - o.z, best.x - o.x);
      const sitting = best.pv && (best.pv.legRp > 60 || best.pv.legLp > 60);
      const eyeY = best.h * (sitting ? 0.62 : 0.9);
      o.tilt = Math.round(Math.atan2(eyeY * 0.75 - o.h, bd) * 180 / Math.PI);
      save(); renderAll();
    });
    btns.appendChild(aimBtn);
  }
  const dup = document.createElement("button");
  dup.textContent = "複製";
  dup.addEventListener("click", () => {
    const c = JSON.parse(JSON.stringify(o));
    c.id = newId();
    c.x += 0.6;
    if (c.type === "person") c.label = nextLabel();
    objs().push(c);
    selId = c.id;
    save(); renderAll();
  });
  const del = document.createElement("button");
  del.className = "danger";
  del.textContent = "削除";
  del.addEventListener("click", () => {
    cut().objects = objs().filter(x => x.id !== o.id);
    if (o.type === "camera" && cut().camId === o.id) {
      const c2 = objs().find(x => x.type === "camera");
      cut().camId = c2 ? c2.id : null;
    }
    selId = null;
    save(); renderAll();
  });
  btns.append(dup, del);
  box.appendChild(btns);
}

/* ================= toolbar ================= */
function nextLabel() {
  const used = new Set(objs().filter(o => o.type === "person").map(o => o.label));
  for (const ch of "ABCDEFGHJKLMNP") if (!used.has(ch)) return ch;
  return "?";
}
$("addPerson").addEventListener("click", () => {
  const i = objs().filter(o => o.type === "person").length;
  const o = { id: newId(), type: "person", x: view.cx + (i % 3 - 1) * 0.8, z: view.cz, rot: Math.PI / 2,
    h: 1.7, pv: Object.assign({}, DEFAULT_PV), poseName: "立ち", face: "normal",
    color: PERSON_COLORS[i % PERSON_COLORS.length], label: nextLabel() };
  objs().push(o); selId = o.id;
  save(); renderAll();
});
$("addCam").addEventListener("click", () => {
  const o = { id: newId(), type: "camera", x: view.cx, z: view.cz + 2.5, rot: -Math.PI / 2, h: 1.5, fl: 35, tilt: 0, sensor: "フルサイズ" };
  objs().push(o);
  if (!activeCam()) cut().camId = o.id;
  selId = o.id;
  save(); renderAll();
});
$("addBox").addEventListener("click", () => {
  const o = { id: newId(), type: "box", x: view.cx + 1, z: view.cz, rot: 0, w: 1.2, d: 0.6, bh: 0.7 };
  objs().push(o); selId = o.id;
  save(); renderAll();
});

/* scene presets */
const sceneMenu = $("sceneMenu");
for (const key of Object.keys(SCENE_PRESETS)) {
  const b = document.createElement("button");
  b.textContent = key;
  b.addEventListener("click", () => { sceneMenu.hidden = true; insertScene(key); });
  sceneMenu.appendChild(b);
}
$("addScene").addEventListener("click", () => { sceneMenu.hidden = !sceneMenu.hidden; });
plan.addEventListener("pointerdown", () => { sceneMenu.hidden = true; });

function insertScene(key) {
  const sc = SCENE_PRESETS[key];
  const ox = Math.round(view.cx * 10) / 10, oz = Math.round(view.cz * 10) / 10;
  for (const b of sc.boxes || []) {
    objs().push({ id: newId(), type: "box", x: ox + b.dx, z: oz + b.dz,
      rot: (b.rotDeg || 0) * D2R, w: b.w, d: b.d, bh: b.bh });
  }
  let ci = objs().filter(o => o.type === "person").length;
  for (const p of sc.people) {
    objs().push({ id: newId(), type: "person", x: ox + p.dx, z: oz + p.dz,
      rot: p.rotDeg * D2R, h: 1.7,
      pv: Object.assign({}, DEFAULT_PV, p.pose), poseName: null,
      face: p.face || "normal",
      color: PERSON_COLORS[ci++ % PERSON_COLORS.length], label: nextLabel() });
  }
  selId = null;
  save(); renderAll();
}

/* cuts */
function renderCutSel() {
  const s = $("cutSel");
  s.textContent = "";
  for (const c of state.cuts) {
    const op = document.createElement("option");
    op.value = c.id; op.textContent = c.name || "(無題)";
    if (c.id === state.currentId) op.selected = true;
    s.appendChild(op);
  }
  $("cutName").value = cut().name;
}
$("cutSel").addEventListener("change", () => {
  state.currentId = $("cutSel").value;
  selId = null;
  save(); renderAll(); renderCutSel();
});
$("cutName").addEventListener("input", () => {
  cut().name = $("cutName").value;
  save(); renderCutSel();
});
$("newCut").addEventListener("click", () => {
  const c = defaultCut("カット" + (state.cuts.length + 1));
  state.cuts.push(c); state.currentId = c.id; selId = null;
  save(); renderAll(); renderCutSel();
});
$("dupCut").addEventListener("click", () => {
  const c = JSON.parse(JSON.stringify(cut()));
  c.id = newId();
  c.name = cut().name + " のコピー";
  // remap object ids
  for (const o of c.objects) {
    const nid = newId();
    if (c.camId === o.id) c.camId = nid;
    o.id = nid;
  }
  state.cuts.push(c); state.currentId = c.id; selId = null;
  save(); renderAll(); renderCutSel();
});
$("delCut").addEventListener("click", () => {
  if (!confirm("「" + (cut().name || "(無題)") + "」を削除しますか?")) return;
  state.cuts = state.cuts.filter(c => c.id !== state.currentId);
  if (!state.cuts.length) state.cuts = [defaultCut("カット1")];
  state.currentId = state.cuts[0].id;
  selId = null;
  save(); renderAll(); renderCutSel();
});

$("exportPng").addEventListener("click", () => {
  renderCam(); // ensure fresh frame
  const a = document.createElement("a");
  a.href = $("cam3d").toDataURL("image/png");
  a.download = (cut().name || "shot").replace(/[\\/:*?"<>|\s]+/g, "_") + ".png";
  document.body.appendChild(a);
  a.click();
  a.remove();
});

/* ================= first-person camera mode (Minecraft-style) ================= */
const camCanvas = $("cam3d");
const fpsKeys = new Set();
let fpsRaf = null, fpsLast = 0;
const fpsActive = () => document.pointerLockElement === camCanvas;

if (!("requestPointerLock" in HTMLElement.prototype)) {
  $("fpsBtn").style.display = "none"; // iPadなどポインターロック非対応環境
} else {
  $("fpsBtn").addEventListener("click", () => {
    if (!activeCam()) { alert("カメラがありません(＋カメラで追加)"); return; }
    camCanvas.requestPointerLock();
  });
}

document.addEventListener("pointerlockchange", () => {
  const on = fpsActive();
  $("fpsHint").hidden = !on;
  fpsKeys.clear();
  if (on) {
    fpsLast = performance.now();
    if (!fpsRaf) fpsRaf = requestAnimationFrame(fpsStep);
  } else {
    if (fpsRaf) { cancelAnimationFrame(fpsRaf); fpsRaf = null; }
    save();
    renderAll(); // 位置・向きをプロパティのスライダーにも反映
  }
});

document.addEventListener("mousemove", (e) => {
  if (!fpsActive()) return;
  const c = activeCam();
  if (!c) return;
  c.rot += e.movementX * 0.0022;
  c.tilt = Math.max(-89, Math.min(89, Math.round(((c.tilt || 0) - e.movementY * 0.12) * 10) / 10));
});
document.addEventListener("keydown", (e) => {
  if (!fpsActive()) return;
  fpsKeys.add(e.code);
  if (e.code !== "Escape") e.preventDefault();
});
document.addEventListener("keyup", (e) => { fpsKeys.delete(e.code); });
document.addEventListener("wheel", (e) => {
  if (!fpsActive()) return;
  e.preventDefault();
  const c = activeCam();
  if (c) c.fl = Math.round(Math.min(300, Math.max(8, c.fl * Math.exp(-e.deltaY * 0.001)))); // 上スクロール=望遠
}, { passive: false });

function fpsStep(t) {
  fpsRaf = null;
  if (!fpsActive()) return;
  const dt = Math.min(0.1, (t - fpsLast) / 1000);
  fpsLast = t;
  const c = activeCam();
  if (c) {
    const sp = 2.6 * dt; // 歩行速度 2.6m/s
    const fx = Math.cos(c.rot), fz = Math.sin(c.rot);
    let dx = 0, dz = 0, dy = 0;
    if (fpsKeys.has("KeyW")) { dx += fx; dz += fz; }
    if (fpsKeys.has("KeyS")) { dx -= fx; dz -= fz; }
    if (fpsKeys.has("KeyA")) { dx += fz; dz -= fx; }
    if (fpsKeys.has("KeyD")) { dx -= fz; dz += fx; }
    if (fpsKeys.has("Space")) dy += 1;
    if (fpsKeys.has("ShiftLeft") || fpsKeys.has("ShiftRight")) dy -= 1;
    const n = Math.hypot(dx, dz);
    if (n > 0) {
      c.x = Math.round((c.x + dx / n * sp) * 100) / 100;
      c.z = Math.round((c.z + dz / n * sp) * 100) / 100;
    }
    if (dy) c.h = Math.round(Math.min(4, Math.max(0.1, c.h + dy * sp)) * 100) / 100;
    renderCam();
    drawPlan();
  }
  fpsRaf = requestAnimationFrame(fpsStep);
}

/* ================= glue ================= */
let lastProps = null;
function renderAll(withProps = true) {
  drawPlan();
  renderCam();
  if (withProps || lastProps !== selId) { renderProps(); lastProps = selId; }
}

window.addEventListener("resize", () => { resizePlan(); renderCam(); });
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}

resizePlan();
renderCutSel();
renderAll();
</script>
