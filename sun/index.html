<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>日の出・マジックアワー — 8hammer</title>
<style>
  :root {
    --bg: #0e0e11;
    --panel: #1c1c22;
    --line: #33333c;
    --fg: #f2f2ee;
    --dim: #9a9aa4;
    --accent: #f7c114;
    --night: #1b2340;
    --blue: #3d5aa8;
    --golden: #e8963c;
    --day: #7ec3e8;
    --sab: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    min-height: 100dvh;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    touch-action: manipulation;
    padding: calc(10px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) calc(16px + var(--sab)) calc(14px + env(safe-area-inset-left));
  }
  #wrap { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
  #topbar { display: flex; align-items: center; gap: 12px; }
  #topbar img { height: 24px; }
  #topbar h1 { font-size: 17px; font-weight: 700; margin: 0; flex: 1; }
  #tzNote { font-size: 11px; color: var(--dim); }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 14px;
  }
  .ptitle { font-size: 12px; letter-spacing: .1em; color: var(--dim); margin-bottom: 8px; }

  #cityChips { display: flex; flex-wrap: wrap; gap: 8px; }
  #cityChips button {
    background: #24242c; color: var(--fg);
    border: 1px solid var(--line); border-radius: 20px;
    font-size: 14px; padding: 8px 14px;
  }
  #cityChips button.sel { background: #24242c; color: var(--accent); border-color: var(--accent); font-weight: 700; }
  #gpsBtn { font-weight: 600; }

  #coordRow { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
  #coordRow label { font-size: 13px; color: var(--dim); }
  #coordRow input {
    width: 110px;
    background: #16161b; color: var(--fg);
    border: 1px solid var(--line); border-radius: 8px;
    font-size: 15px; padding: 8px 10px;
    -webkit-user-select: text; user-select: text;
  }
  #coordRow input:focus { outline: none; border-color: var(--accent); }
  #placeName { flex: 1; min-width: 120px; font-size: 14px; color: var(--dim); text-align: right; }

  #dateRow { display: flex; gap: 8px; align-items: center; }
  #dateRow button {
    background: #24242c; color: var(--fg);
    border: 1px solid var(--line); border-radius: 10px;
    font-size: 16px; padding: 10px 16px;
  }
  #dateInput {
    flex: 1;
    background: #16161b; color: var(--fg);
    border: 1px solid var(--line); border-radius: 10px;
    font-size: 17px; font-weight: 600; padding: 9px 12px;
    text-align: center;
    font-family: inherit;
    color-scheme: dark;
  }

  #mainCards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .big {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
  }
  .big .lbl { font-size: 13px; color: var(--dim); }
  .big .time { font-size: 40px; font-weight: 800; font-variant-numeric: tabular-nums; margin: 2px 0; }
  .big .sub { font-size: 13px; color: var(--dim); }
  .big.rise { border-left: 4px solid var(--golden); }
  .big.set  { border-left: 4px solid #c96a2e; }

  table { width: 100%; border-collapse: collapse; font-size: 15px; }
  td { padding: 7px 4px; border-bottom: 1px solid #24242a; font-variant-numeric: tabular-nums; }
  td:first-child { color: var(--dim); font-size: 13.5px; }
  td:last-child { text-align: right; font-weight: 600; }
  tr:last-child td { border-bottom: none; }
  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 8px; vertical-align: -1px; }

  #timeline { height: 46px; border-radius: 10px; overflow: hidden; position: relative; border: 1px solid var(--line); }
  #tlCanvas { width: 100%; height: 100%; display: block; }
  #tlHours { display: flex; justify-content: space-between; font-size: 10px; color: var(--dim); margin-top: 3px; padding: 0 1px; }

  @media (max-width: 620px) {
    #mainCards { grid-template-columns: 1fr; }
    .big .time { font-size: 34px; }
  }
</style>
</head>

    <h1>日の出・マジックアワー</h1>
    <span id="tzNote"></span>
  </div>

  <div class="panel">
    <div class="ptitle">ロケ地</div>
    <div id="cityChips"></div>
    <div id="coordRow">
      <label>緯度 <input id="lat" inputmode="decimal"></label>
      <label>経度 <input id="lon" inputmode="decimal"></label>
      <span id="placeName"></span>
    </div>
  </div>

  <div class="panel">
    <div class="ptitle">日付</div>
    <div id="dateRow">
      <button id="prevDay">◀</button>
      <input type="date" id="dateInput">
      <button id="todayBtn">今日</button>
      <button id="nextDay">▶</button>
    </div>
  </div>

  <div id="mainCards">
    <div class="big rise">
      <div class="lbl">日の出 🌅</div>
      <div class="time" id="riseTime">--:--</div>
      <div class="sub" id="riseAz"></div>
    </div>
    <div class="big set">
      <div class="lbl">日の入 🌇</div>
      <div class="time" id="setTime">--:--</div>
      <div class="sub" id="setAz"></div>
    </div>
  </div>

  <div class="panel">
    <div class="ptitle">タイムライン(夜 → ブルーアワー → ゴールデンアワー → 昼)</div>
    <div id="timeline"><canvas id="tlCanvas"></canvas></div>
    <div id="tlHours"><span>0時</span><span>6時</span><span>12時</span><span>18時</span><span>24時</span></div>
  </div>

  <div class="panel">
    <div class="ptitle">詳細</div>
    <table id="detail"></table>
  </div>

  <div class="panel" style="font-size:12.5px; color:var(--dim); line-height:1.7">
    ゴールデンアワー=太陽高度 −4°〜+6°、ブルーアワー=−6°〜−4°、市民薄明=−6°〜日の出 として計算(NOAAの太陽位置計算式、精度±1分程度)。
    時刻はこの端末のタイムゾーンで表示しています。方角は真北基準です。
  </div>
</div>

<script>
"use strict";
const LS_KEY = "sun.v1";
const $ = (id) => document.getElementById(id);
const D2R = Math.PI / 180, R2D = 180 / Math.PI;

const CITIES = [
  { n: "現在地", gps: true },
  { n: "東京", la: 35.681, lo: 139.767 },
  { n: "横浜", la: 35.466, lo: 139.622 },
  { n: "名古屋", la: 35.171, lo: 136.882 },
  { n: "大阪", la: 34.702, lo: 135.496 },
  { n: "福岡", la: 33.590, lo: 130.402 },
  { n: "札幌", la: 43.062, lo: 141.354 },
  { n: "那覇", la: 26.212, lo: 127.679 },
];

let state = { lat: 35.681, lon: 139.767, city: "東京", dateStr: null };
try { Object.assign(state, JSON.parse(localStorage.getItem(LS_KEY) || "{}")); } catch (e) {}
state.dateStr = null; // always open on today

function save() { try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {} }

/* ---------- NOAA solar calculations ---------- */
function dayOfYear(d) {
  return Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 864e5);
}
function solarParams(doy, hourUTC) {
  const g = 2 * Math.PI / 365 * (doy - 1 + (hourUTC - 12) / 24);
  const eqtime = 229.18 * (0.000075 + 0.001868 * Math.cos(g) - 0.032077 * Math.sin(g)
    - 0.014615 * Math.cos(2 * g) - 0.040849 * Math.sin(2 * g));
  const decl = 0.006918 - 0.399912 * Math.cos(g) + 0.070257 * Math.sin(g)
    - 0.006758 * Math.cos(2 * g) + 0.000907 * Math.sin(2 * g)
    - 0.002697 * Math.cos(3 * g) + 0.00148 * Math.sin(3 * g);
  return { eqtime, decl };
}
// crossing time (minutes UTC) when sun altitude == alt (deg); morning or evening
function crossingUTC(date, lat, lon, altDeg, evening) {
  const doy = dayOfYear(date);
  let minutes = 720; // start at solar noon guess
  for (let i = 0; i < 3; i++) {
    const { eqtime, decl } = solarParams(doy, minutes / 60);
    const zenith = (90 - altDeg) * D2R;
    const cosHA = (Math.cos(zenith) - Math.sin(lat * D2R) * Math.sin(decl)) /
                  (Math.cos(lat * D2R) * Math.cos(decl));
    if (cosHA < -1 || cosHA > 1) return null; // sun never reaches this altitude
    const ha = Math.acos(cosHA) * R2D;
    minutes = 720 - 4 * (lon + (evening ? -ha : ha)) - eqtime;
  }
  return minutes;
}
function solarNoonUTC(date, lon) {
  const doy = dayOfYear(date);
  let m = 720 - 4 * lon;
  const { eqtime } = solarParams(doy, m / 60);
  return 720 - 4 * lon - eqtime;
}
function toLocal(date, minutesUTC) {
  if (minutesUTC == null) return null;
  return new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()) + minutesUTC * 60000);
}
function azimuthAt(date, lat, lon, minutesUTC) {
  const t = toLocal(date, minutesUTC);
  if (!t) return null;
  // standard formula: az measured from north
  const utcH = t.getUTCHours() + t.getUTCMinutes() / 60;
  const doy = dayOfYear(new Date(t.getUTCFullYear(), t.getUTCMonth(), t.getUTCDate()));
  const { eqtime, decl } = solarParams(doy, utcH);
  const tst = (utcH * 60 + eqtime + 4 * lon + 1440) % 1440;
  const haDeg = tst / 4 - 180;
  const ha = haDeg * D2R, latR = lat * D2R;
  const alt = Math.asin(Math.sin(latR) * Math.sin(decl) + Math.cos(latR) * Math.cos(decl) * Math.cos(ha));
  let cosAz = (Math.sin(decl) - Math.sin(alt) * Math.sin(latR)) / (Math.cos(alt) * Math.cos(latR));
  cosAz = Math.min(1, Math.max(-1, cosAz));
  let az = Math.acos(cosAz) * R2D; // 0=north, east side
  if (haDeg > 0) az = 360 - az;    // afternoon → west side
  return az;
}
function compass(az) {
  const dirs = ["北", "北北東", "北東", "東北東", "東", "東南東", "南東", "南南東",
    "南", "南南西", "南西", "西南西", "西", "西北西", "北西", "北北西"];
  return dirs[Math.round(az / 22.5) % 16];
}

/* ---------- UI ---------- */
function fmt(d) {
  if (!d) return "—";
  return String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
}
function selDate() {
  const v = $("dateInput").value;
  const [y, m, dd] = v.split("-").map(Number);
  return new Date(y, m - 1, dd);
}

function calc() {
  const lat = state.lat, lon = state.lon;
  const date = selDate();
  const T = (alt, ev) => toLocal(date, crossingUTC(date, lat, lon, alt, ev));

  const rise = T(-0.833, false), set = T(-0.833, true);
  const civilDawn = T(-6, false), civilDusk = T(-6, true);
  const blueAmStart = T(-6, false), blueAmEnd = T(-4, false);
  const goldAmStart = T(-4, false), goldAmEnd = T(6, false);
  const goldPmStart = T(6, true), goldPmEnd = T(-4, true);
  const bluePmStart = T(-4, true), bluePmEnd = T(-6, true);
  const noon = toLocal(date, solarNoonUTC(date, lon));

  const riseAz = azimuthAt(date, lat, lon, crossingUTC(date, lat, lon, -0.833, false));
  const setAz = azimuthAt(date, lat, lon, crossingUTC(date, lat, lon, -0.833, true));

  $("riseTime").textContent = fmt(rise);
  $("riseAz").textContent = riseAz != null ? "方角: " + compass(riseAz) + "(" + Math.round(riseAz) + "°)" : "";
  $("setTime").textContent = fmt(set);
  $("setAz").textContent = setAz != null ? "方角: " + compass(setAz) + "(" + Math.round(setAz) + "°)" : "";

  const dayLen = rise && set ? set - rise : null;
  const dl = dayLen ? Math.floor(dayLen / 3600000) + "時間" + Math.round(dayLen % 3600000 / 60000) + "分" : "—";

  const rows = [
    ["#3d5aa8", "朝のブルーアワー", fmt(blueAmStart) + " 〜 " + fmt(blueAmEnd)],
    ["#e8963c", "朝のゴールデンアワー", fmt(goldAmStart) + " 〜 " + fmt(goldAmEnd)],
    ["#e8963c", "夕方のゴールデンアワー", fmt(goldPmStart) + " 〜 " + fmt(goldPmEnd)],
    ["#3d5aa8", "夕方のブルーアワー", fmt(bluePmStart) + " 〜 " + fmt(bluePmEnd)],
    ["#9a9aa4", "市民薄明(明るくなる)", fmt(civilDawn) + " 〜 " + fmt(rise)],
    ["#9a9aa4", "市民薄明(暗くなる)", fmt(set) + " 〜 " + fmt(civilDusk)],
    ["#7ec3e8", "南中(太陽が最も高い)", fmt(noon)],
    ["#7ec3e8", "昼の長さ", dl],
  ];
  const tbl = $("detail");
  tbl.textContent = "";
  for (const [color, name, val] of rows) {
    const tr = document.createElement("tr");
    const td1 = document.createElement("td");
    const dot = document.createElement("span");
    dot.className = "dot"; dot.style.background = color;
    td1.append(dot, name);
    const td2 = document.createElement("td");
    td2.textContent = val;
    tr.append(td1, td2);
    tbl.appendChild(tr);
  }

  drawTimeline({ blueAmStart, goldAmStart, rise, goldAmEnd, goldPmStart, set, bluePmStart, bluePmEnd, date });
}

function drawTimeline(t) {
  const cv = $("tlCanvas");
  const W = cv.clientWidth * (window.devicePixelRatio || 1);
  const H = cv.clientHeight * (window.devicePixelRatio || 1);
  cv.width = W; cv.height = H;
  const ctx = cv.getContext("2d");
  const x = (d) => d ? (d.getHours() + d.getMinutes() / 60 + d.getSeconds() / 3600) / 24 * W : null;

  ctx.fillStyle = "#1b2340"; // night
  ctx.fillRect(0, 0, W, H);
  const seg = (a, b, color) => {
    const xa = x(a), xb = x(b);
    if (xa == null || xb == null || xb <= xa) return;
    ctx.fillStyle = color;
    ctx.fillRect(xa, 0, xb - xa, H);
  };
  seg(t.blueAmStart, t.goldAmStart, "#3d5aa8");
  seg(t.goldAmStart, t.goldAmEnd, "#e8963c");
  seg(t.goldAmEnd, t.goldPmStart, "#7ec3e8");   // full day
  seg(t.goldPmStart, t.bluePmStart, "#e8963c");
  seg(t.bluePmStart, t.bluePmEnd, "#3d5aa8");

  // hour ticks
  ctx.fillStyle = "rgba(255,255,255,.25)";
  for (let h = 1; h < 24; h++) ctx.fillRect(h / 24 * W, 0, 1, h % 6 === 0 ? H : H * 0.25);

  // now marker (only if the selected date is today)
  const now = new Date();
  if (now.toDateString() === t.date.toDateString()) {
    const nx = x(now);
    ctx.fillStyle = "#f7f2e8";
    ctx.fillRect(nx - 1, 0, 3, H);
    ctx.beginPath();
    ctx.moveTo(nx - 6, 0); ctx.lineTo(nx + 6, 0); ctx.lineTo(nx, 8);
    ctx.fill();
  }
}

/* ---------- controls ---------- */
function renderChips() {
  const box = $("cityChips");
  box.textContent = "";
  for (const c of CITIES) {
    const b = document.createElement("button");
    b.textContent = c.gps ? "📍 " + c.n : c.n;
    if (c.gps) b.id = "gpsBtn";
    if (!c.gps && c.n === state.city) b.classList.add("sel");
    b.addEventListener("click", () => {
      if (c.gps) {
        b.textContent = "📍 取得中…";
        navigator.geolocation.getCurrentPosition(
          (p) => {
            state.lat = +p.coords.latitude.toFixed(4);
            state.lon = +p.coords.longitude.toFixed(4);
            state.city = "現在地";
            save(); syncCoords(); renderChips(); calc();
            b.textContent = "📍 現在地";
          },
          () => { b.textContent = "📍 取得失敗"; setTimeout(renderChips, 1500); },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      } else {
        state.lat = c.la; state.lon = c.lo; state.city = c.n;
        save(); syncCoords(); renderChips(); calc();
      }
    });
    box.appendChild(b);
  }
}
function syncCoords() {
  $("lat").value = state.lat;
  $("lon").value = state.lon;
  $("placeName").textContent = state.city || "";
}
function bindCoords() {
  for (const id of ["lat", "lon"]) {
    $(id).addEventListener("change", () => {
      const v = parseFloat($(id).value);
      if (!Number.isFinite(v)) { syncCoords(); return; }
      state[id === "lat" ? "lat" : "lon"] = v;
      state.city = "カスタム";
      save(); renderChips(); syncCoords(); calc();
    });
  }
}
function setDate(d) {
  $("dateInput").value = d.getFullYear() + "-" +
    String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  calc();
}
function bindDate() {
  $("dateInput").addEventListener("change", calc);
  $("prevDay").addEventListener("click", () => { const d = selDate(); d.setDate(d.getDate() - 1); setDate(d); });
  $("nextDay").addEventListener("click", () => { const d = selDate(); d.setDate(d.getDate() + 1); setDate(d); });
  $("todayBtn").addEventListener("click", () => setDate(new Date()));
}

$("tzNote").textContent = "時刻表示: " + Intl.DateTimeFormat().resolvedOptions().timeZone + "(この端末のタイムゾーン)";
window.addEventListener("resize", calc);
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}

renderChips();
syncCoords();
bindCoords();
bindDate();
setDate(new Date());
setInterval(calc, 60000); // keep the "now" marker moving
</script>

<!-- 要望・不具合の送信(全ツール共通ウィジェット) -->
<script>
(function () {
  "use strict";
  var TOOL = "日の出・マジックアワー";
  var MAIL = "doi@8hammer.com";
  var st = document.createElement("style");
  st.textContent =
    "#fbBtn{position:fixed;right:14px;bottom:14px;z-index:40;width:36px;height:36px;border-radius:50%;" +
    "background:#1c1c22;color:#9a9aa4;border:1px solid #33333c;font-size:16px;padding:0;cursor:pointer;opacity:.6;}" +
    "#fbBtn:hover,#fbBtn:active{opacity:1;border-color:#f7c114;color:#f7c114;}" +
    "#fbWrap{position:fixed;inset:0;z-index:41;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:16px;}" +
    "#fbWrap[hidden]{display:none;}" +
    "#fbBox{width:min(92vw,400px);background:#1c1c22;color:#f2f2ee;border:1px solid #33333c;border-radius:14px;padding:16px;" +
    "display:flex;flex-direction:column;gap:10px;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;}" +
    "#fbBox h2{font-size:14px;font-weight:700;margin:0;}" +
    "#fbText{width:100%;background:#16161b;color:#f2f2ee;border:1px solid #33333c;border-radius:9px;font-size:14px;line-height:1.7;" +
    "padding:10px;resize:vertical;font-family:inherit;-webkit-user-select:text;user-select:text;}" +
    "#fbText:focus{outline:none;border-color:#f7c114;}" +
    "#fbNote{font-size:11px;color:#9a9aa4;line-height:1.7;}" +
    "#fbBtns{display:flex;gap:8px;justify-content:flex-end;}" +
    "#fbBtns button{background:#24242c;color:#f2f2ee;border:1px solid #33333c;border-radius:9px;font-size:13px;font-weight:600;" +
    "padding:9px 14px;cursor:pointer;font-family:inherit;}" +
    "#fbBtns button:hover,#fbBtns button:active{border-color:#f7c114;}" +
    "#fbBtns button.acc{background:#f7c114;color:#17130a;border-color:#f7c114;font-weight:700;}" +
    "#fbCopy{margin-right:auto;}";
  document.head.appendChild(st);

  var btn = document.createElement("button");
  btn.id = "fbBtn";
  btn.title = "要望・不具合を送る";
  btn.textContent = "\uD83D\uDCEE";
  document.body.appendChild(btn);

  var wrap = document.createElement("div");
  wrap.id = "fbWrap";
  wrap.hidden = true;
  wrap.innerHTML =
    '<div id="fbBox"><h2>\uD83D\uDCEE \u8981\u671B\u30FB\u4E0D\u5177\u5408\u3092\u9001\u308B \u2014 ' + TOOL + "</h2>" +
    '<textarea id="fbText" rows="5" placeholder="\u4F8B: \u25CB\u25CB\u304C\u3067\u304D\u308B\u3068\u52A9\u304B\u308B / \u25CB\u25CB\u306E\u3068\u304D\u306B\u8868\u793A\u304C\u5D29\u308C\u308B \u306A\u3069"></textarea>' +
    '<div id="fbNote">\u9001\u4FE1\u3059\u308B\u3068\u5171\u6709\u30B7\u30FC\u30C8\uFF08\u307E\u305F\u306F\u30E1\u30FC\u30EB\u4F5C\u6210\u753B\u9762\uFF09\u304C\u958B\u304D\u307E\u3059\u3002\u30C4\u30FC\u30EB\u540D\u30FB\u753B\u9762\u30B5\u30A4\u30BA\u306A\u3069\u306E\u74B0\u5883\u60C5\u5831\u3092\u81EA\u52D5\u3067\u6DFB\u4ED8\u3057\u307E\u3059\uFF08\u4F5C\u696D\u30C7\u30FC\u30BF\u306F\u9001\u3089\u308C\u307E\u305B\u3093\uFF09\u3002</div>' +
    '<div id="fbBtns"><button id="fbCopy">\u30B3\u30D4\u30FC</button><button id="fbCancel">\u30AD\u30E3\u30F3\u30BB\u30EB</button><button id="fbSend" class="acc">\u9001\u4FE1</button></div></div>';
  document.body.appendChild(wrap);

  function buildText() {
    var body = document.getElementById("fbText").value.trim();
    return "\u3010\u8981\u671B\u30FB\u4E0D\u5177\u5408\u3011" + TOOL + "\n" + body +
      "\n\n--- \u74B0\u5883\u60C5\u5831 ---" +
      "\n\u30C4\u30FC\u30EB: " + TOOL +
      "\nURL: " + location.href +
      "\n\u753B\u9762: " + window.innerWidth + "x" + window.innerHeight +
      "\nUA: " + navigator.userAgent;
  }
  function close() { wrap.hidden = true; }
  function mailto(text) {
    location.href = "mailto:" + MAIL +
      "?subject=" + encodeURIComponent("\u30108hammer Tools\u3011" + TOOL + " \u3078\u306E\u8981\u671B") +
      "&body=" + encodeURIComponent(text);
  }
  btn.addEventListener("click", function () { wrap.hidden = false; document.getElementById("fbText").focus(); });
  wrap.addEventListener("click", function (e) { if (e.target === wrap) close(); });
  document.getElementById("fbCancel").addEventListener("click", close);
  document.getElementById("fbCopy").addEventListener("click", function () {
    if (navigator.clipboard) navigator.clipboard.writeText(buildText());
    close();
  });
  document.getElementById("fbSend").addEventListener("click", function () {
    var t = document.getElementById("fbText");
    if (!t.value.trim()) { t.focus(); return; }
    var text = buildText();
    if (window.matchMedia("(pointer: coarse)").matches && navigator.share) {
      navigator.share({ text: text }).then(close).catch(function (e) {
        if (e && e.name === "AbortError") return;
        mailto(text); close();
      });
    } else { mailto(text); close(); }
  });
})();
</script>
</body>
</html>
