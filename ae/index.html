<html lang="ja">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>AEエクスプレッション集 — 8hammer</title>
<style>
  :root {
    --bg: #0e0e11;
    --panel: #1c1c22;
    --line: #33333c;
    --fg: #f2f2ee;
    --dim: #9a9aa4;
    --accent: #f7c114;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    min-height: 100dvh;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    touch-action: manipulation;
    padding: calc(10px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) calc(24px + env(safe-area-inset-bottom)) calc(12px + env(safe-area-inset-left));
  }
  button { font-family: inherit; }
  #wrap { max-width: 900px; margin: 0 auto; }

  #topbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  #topbar img { height: 24px; }
  #topbar h1 { font-size: 17px; font-weight: 700; margin: 0; flex: 1; white-space: nowrap; }
  #langToggle {
    background: var(--panel); color: var(--fg);
    border: 1px solid var(--line); border-radius: 9px;
    font-size: 13px; padding: 8px 12px;
  }
  #langToggle b { color: var(--accent); }

  #search {
    width: 100%;
    background: var(--panel); color: var(--fg);
    border: 1px solid var(--line); border-radius: 11px;
    font-size: 16px; padding: 11px 14px;
    margin-bottom: 10px;
    -webkit-user-select: text; user-select: text;
  }
  #search:focus { outline: none; border-color: var(--accent); }

  #cats { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
  #cats button {
    background: #24242c; color: var(--fg);
    border: 1px solid var(--line); border-radius: 18px;
    font-size: 13.5px; padding: 8px 13px;
  }
  #cats button.sel { background: var(--accent); color: #17130a; border-color: var(--accent); font-weight: 700; }

  .exp {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .ehead { display: flex; align-items: flex-start; gap: 8px; }
  .ehead .t { font-size: 15.5px; font-weight: 700; flex: 1; }
  .ehead .cat {
    font-size: 10.5px; color: var(--dim);
    border: 1px solid var(--line); border-radius: 6px;
    padding: 2px 7px; white-space: nowrap; margin-top: 1px;
  }
  .fav {
    background: transparent; border: none;
    font-size: 18px; padding: 0 2px;
    color: #55555f;
  }
  .fav.on { color: var(--accent); }
  .desc { font-size: 13px; color: var(--dim); line-height: 1.7; margin: 6px 0 8px; }
  .target { font-size: 11.5px; color: var(--accent); margin-bottom: 8px; }
  .params { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
  .params label { font-size: 12px; color: var(--dim); display: flex; align-items: center; gap: 5px; }
  .params input {
    width: 72px;
    background: #16161b; color: var(--fg);
    border: 1px solid var(--line); border-radius: 7px;
    font-size: 14px; font-weight: 700; padding: 6px 7px; text-align: right;
    -webkit-user-select: text; user-select: text;
  }
  .params input:focus { outline: none; border-color: var(--accent); }
  .demo {
    width: 100%; height: 120px;
    background: #101014;
    border: 1px solid #26262c;
    border-radius: 10px;
    margin-bottom: 8px;
    display: block;
  }
  .codeRow { position: relative; }
  pre {
    background: #101014;
    border: 1px solid #26262c;
    border-radius: 10px;
    padding: 11px 12px;
    margin: 0;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px;
    line-height: 1.65;
    overflow-x: auto;
    white-space: pre;
    color: #d8e6c8;
    -webkit-user-select: text; user-select: text;
  }
  .copyBtn {
    position: absolute; top: 8px; right: 8px;
    background: var(--accent); color: #17130a;
    border: none; border-radius: 8px;
    font-size: 12.5px; font-weight: 700;
    padding: 7px 12px;
  }
  .copyBtn:active { filter: brightness(.85); }

  #mySec { margin-top: 22px; }
  #mySec h2 { font-size: 15px; margin: 0 0 10px; display: flex; align-items: center; gap: 10px; }
  #addMy {
    background: var(--accent); color: #17130a;
    border: none; border-radius: 9px;
    font-size: 13px; font-weight: 700; padding: 8px 13px;
  }
  .myArea {
    width: 100%;
    background: #101014; color: #d8e6c8;
    border: 1px solid #26262c; border-radius: 10px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12.5px; line-height: 1.65;
    padding: 10px 12px;
    resize: vertical; min-height: 84px;
    -webkit-user-select: text; user-select: text;
  }
  .myTitle {
    width: 100%;
    background: #16161b; color: var(--fg);
    border: 1px solid var(--line); border-radius: 8px;
    font-size: 14.5px; font-weight: 600; padding: 9px 11px;
    margin-bottom: 8px;
    -webkit-user-select: text; user-select: text;
  }
  .myTitle:focus, .myArea:focus { outline: none; border-color: var(--accent); }
  .myBtns { display: flex; gap: 8px; margin-top: 8px; }
  .myBtns button {
    background: #24242c; color: var(--fg);
    border: 1px solid var(--line); border-radius: 8px;
    font-size: 13px; padding: 8px 13px;
  }
  .myBtns .cp { background: var(--accent); color: #17130a; border-color: var(--accent); font-weight: 700; }
  .myBtns .del { color: #ff8484; margin-left: auto; }

  #empty { color: var(--dim); font-size: 14px; text-align: center; padding: 30px 0; }
  #note { font-size: 12px; color: var(--dim); line-height: 1.8; margin-top: 20px; }

  #toast {
    position: fixed; left: 50%; bottom: 24px;
    transform: translateX(-50%);
    background: var(--accent); color: #17130a;
    font-size: 14px; font-weight: 700;
    padding: 10px 18px; border-radius: 12px;
    z-index: 20;
    display: none;
  }
</style>
</head>

<script>
"use strict";
const LS_KEY = "ae.v1";
const $ = (id) => document.getElementById(id);
const newId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

/* 日本語版AE ⇄ 英語版AE のエフェクト名対訳 */
const JP2EN = [
  ["スライダー制御", "Slider Control"],
  ["スライダー", "Slider"],
  ["チェックボックス制御", "Checkbox Control"],
  ["チェックボックス", "Checkbox"],
  ["両方のチャンネル", "Both Channels"],
  ["オーディオ振幅", "Audio Amplitude"],
];

const CATS = ["揺れ・ランダム", "ループ", "バウンス・弾み", "追従・遅延", "テキスト・数字", "配置・整列", "回転・軌道", "時間・その他"];

const LIB = [
  { cat: "揺れ・ランダム", title: "wiggle(基本の揺れ)", target: "位置・回転・不透明度など",
    desc: "いちばん使う揺れ。freq=1秒あたりの回数、amp=振れ幅。",
    params: [{ k: "freq", l: "回数/秒", d: 3 }, { k: "amp", l: "振れ幅", d: 30 }],
    code: "wiggle({{freq}}, {{amp}})" },
  { cat: "揺れ・ランダム", title: "横(X)だけ揺らす", target: "位置",
    desc: "縦は固定して横方向だけwiggle。[w[0], value[1]] の入れ替えで縦だけにも。",
    params: [{ k: "freq", l: "回数/秒", d: 3 }, { k: "amp", l: "振れ幅", d: 30 }],
    code: "w = wiggle({{freq}}, {{amp}});\n[w[0], value[1]]" },
  { cat: "揺れ・ランダム", title: "ループする揺れ(シームレス)", target: "位置など",
    desc: "指定秒でループしても継ぎ目が出ないwiggle。ループGIFやBG素材に。",
    params: [{ k: "freq", l: "回数/秒", d: 2 }, { k: "amp", l: "振れ幅", d: 30 }, { k: "dur", l: "ループ秒", d: 4 }],
    code: "freq = {{freq}}; amp = {{amp}}; loopTime = {{dur}};\nt = time % loopTime;\nw1 = wiggle(freq, amp, 1, 0.5, t);\nw2 = wiggle(freq, amp, 1, 0.5, t - loopTime);\nlinear(t, 0, loopTime, w1, w2)" },
  { cat: "揺れ・ランダム", title: "カクカク揺れ(コマ落ち風)", target: "位置・回転など",
    desc: "posterizeTimeで更新頻度を落としたwiggle。手描き風・ストップモーション風に。",
    params: [{ k: "fps", l: "更新fps", d: 4 }, { k: "amp", l: "振れ幅", d: 20 }],
    code: "posterizeTime({{fps}});\nwiggle(10, {{amp}})" },
  { cat: "揺れ・ランダム", title: "カメラの手ブレ風", target: "位置",
    desc: "ゆっくり大きな揺れ+細かい振動の合成。実写馴染みのAEカメラ揺らしに。",
    code: "wiggle(0.5, 20) + wiggle(8, 3) - value" },
  { cat: "揺れ・ランダム", title: "ランダム配置(シード固定)", target: "位置",
    desc: "レイヤーごとに違う場所へ固定配置。indexがシードなので再生中は動かない。",
    code: "seedRandom(index, true);\n[random(0, thisComp.width), random(0, thisComp.height)]" },

  { cat: "ループ", title: "キーフレームをループ", target: "キーフレームのあるプロパティ",
    desc: "最後のキー以降を繰り返し。\"cycle\"=最初から / \"pingpong\"=往復 / \"offset\"=位置を継ぎ足し / \"continue\"=速度を維持して進む。",
    code: "loopOut(\"cycle\")" },
  { cat: "ループ", title: "最初のキーの前もループ", target: "キーフレームのあるプロパティ",
    desc: "イン点より前にも同じ動きを繰り返す。loopOutと併用可。",
    code: "loopIn(\"cycle\") + loopOut(\"cycle\") - value" },

  { cat: "バウンス・弾み", title: "バウンス(キーフレーム後に弾む)", target: "位置・スケールなど(キーフレーム必須)",
    desc: "最後のキーフレームに到達した勢いでポヨンと弾む定番。amp=強さ、freq=速さ、decay=減衰。",
    params: [{ k: "amp", l: "強さ", d: 0.06 }, { k: "freq", l: "速さ", d: 4 }, { k: "decay", l: "減衰", d: 5 }],
    code: "n = 0;\nif (numKeys > 0){\n  n = nearestKey(time).index;\n  if (key(n).time > time) n--;\n}\nt = (n == 0) ? 0 : time - key(n).time;\nif (n > 0 && t < 1){\n  v = velocityAtTime(key(n).time - thisComp.frameDuration/10);\n  amp = {{amp}}; freq = {{freq}}; decay = {{decay}};\n  value + v*amp*Math.sin(freq*t*2*Math.PI)/Math.exp(decay*t);\n}else{\n  value;\n}" },
  { cat: "バウンス・弾み", title: "マーカーでポップ(スケール)", target: "スケール",
    desc: "レイヤーマーカーを打った瞬間にプルンと弾む。音ハメに便利。",
    params: [{ k: "amp", l: "強さ", d: 15 }, { k: "freq", l: "速さ", d: 5 }, { k: "decay", l: "減衰", d: 8 }],
    code: "amp = {{amp}}; freq = {{freq}}; decay = {{decay}};\nn = 0;\nif (marker.numKeys > 0){\n  n = marker.nearestKey(time).index;\n  if (marker.key(n).time > time) n--;\n}\nif (n > 0){\n  t = time - marker.key(n).time;\n  s = amp * Math.sin(freq*t*2*Math.PI) / Math.exp(decay*t);\n  value + [s, s];\n}else{\n  value;\n}" },
  { cat: "バウンス・弾み", title: "振り子(だんだん止まる)", target: "回転(アンカーを上に)",
    desc: "減衰する振り子運動。看板・ぶら下がりもの・キャラの小物に。",
    params: [{ k: "amp", l: "振れ角", d: 40 }, { k: "freq", l: "速さ", d: 1.5 }, { k: "decay", l: "減衰", d: 1.2 }],
    code: "amp = {{amp}}; freq = {{freq}}; decay = {{decay}};\namp * Math.sin(freq*time*2*Math.PI) / Math.exp(decay*time)" },

  { cat: "追従・遅延", title: "他レイヤーを遅れて追いかける", target: "位置",
    desc: "「リーダー」レイヤーの位置を delay 秒遅れでなぞる。しっぽ・残像・ゆるい追従に。",
    params: [{ k: "delay", l: "遅れ(秒)", d: 0.2 }],
    code: "delay = {{delay}};\nthisComp.layer(\"リーダー\").transform.position.valueAtTime(time - delay)" },
  { cat: "追従・遅延", title: "複製で時間差追従(index)", target: "位置(複製して使う)",
    desc: "レイヤー番号に応じて遅れが増える。複製するだけで数珠つなぎの動きに。",
    params: [{ k: "delay", l: "1枚あたりの遅れ", d: 0.1 }],
    code: "delay = {{delay}} * (index - 1);\nthisComp.layer(\"リーダー\").transform.position.valueAtTime(time - delay)" },
  { cat: "追従・遅延", title: "他レイヤーの方を向く", target: "回転",
    desc: "「ターゲット」レイヤーの方向へ常に回転。矢印・目線・砲台などに。",
    code: "target = thisComp.layer(\"ターゲット\");\nd = target.transform.position - transform.position;\nradiansToDegrees(Math.atan2(d[1], d[0]))" },
  { cat: "追従・遅延", title: "動きをなめらかに(smooth)", target: "位置など",
    desc: "トラッキングデータやガタつく動きを平均化してならす。幅=平均する秒数。",
    params: [{ k: "w", l: "幅(秒)", d: 0.2 }],
    code: "smooth({{w}}, 5)" },
  { cat: "追従・遅延", title: "音に反応(オーディオ振幅)", target: "スケールなど",
    desc: "音声を右クリック→「キーフレーム補助」→「オーディオをキーフレームに変換」してから使用。",
    params: [{ k: "mul", l: "反応の強さ", d: 0.5 }],
    code: "amp = thisComp.layer(\"オーディオ振幅\").effect(\"両方のチャンネル\")(\"スライダー\");\nvalue + [amp, amp] * {{mul}}" },

  { cat: "テキスト・数字", title: "カウントアップ数字", target: "ソーステキスト",
    desc: "時間経過で数字が増える。桁区切りカンマ付き。売上・カウンター演出に。",
    params: [{ k: "rate", l: "増加/秒", d: 100 }],
    code: "rate = {{rate}};\nn = Math.floor(time * rate);\nn.toString().replace(/\\B(?=(\\d{3})+(?!\\d))/g, \",\")" },
  { cat: "テキスト・数字", title: "スライダーの値を表示", target: "ソーステキスト",
    desc: "「スライダー制御」をテキストに適用し、スライダーにキーフレームを打って数字アニメ。カンマ付き。",
    code: "n = effect(\"スライダー制御\")(\"スライダー\");\nMath.round(n).toString().replace(/\\B(?=(\\d{3})+(?!\\d))/g, \",\")" },
  { cat: "テキスト・数字", title: "タイムコード表示", target: "ソーステキスト",
    desc: "分:秒:フレームを表示。撮影用の擬似TC・タイマー演出に。",

/* ---------- live demo engine ---------- */
const CX = 160, CY = 60; // 論理ステージ 320x120 の中心
// wiggle風の滑らかなノイズ(デモ用の近似)
function pw(f, a, t, s = 0) {
  return a * 0.55 * (Math.sin(t * f * 6.283 * 0.93 + s * 7.1 + 1.7)
       + 0.6 * Math.sin(t * f * 6.283 * 1.71 + s * 3.7 + 4.2));
}
function liss(t) {
  return { x: CX + 85 * Math.sin(t * 1.1), y: CY + 28 * Math.sin(t * 1.7 + 1) };
}
function fmtNum(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }

const DEMOS = {
  "wiggle(基本の揺れ)": (t, p, d) => d.sq(CX + pw(p.freq, p.amp, t, 1), CY + pw(p.freq, p.amp, t, 2)),
  "横(X)だけ揺らす": (t, p, d) => { d.hline(CY); d.sq(CX + pw(p.freq, p.amp, t, 1), CY); },
  "ループする揺れ(シームレス)": (t, p, d) => {
    const L = Math.max(0.5, p.dur), tt = t % L;
    const bl = (s) => { const a = pw(p.freq, p.amp, tt, s), b = pw(p.freq, p.amp, tt - L, s); return a + (b - a) * (tt / L); };
    d.sq(CX + bl(1), CY + bl(2));
    d.label("loop " + tt.toFixed(1) + "s / " + L + "s");
  },
  "カクカク揺れ(コマ落ち風)": (t, p, d) => {
    const q = Math.floor(t * Math.max(1, p.fps)) / Math.max(1, p.fps);
    d.sq(CX + pw(10, p.amp, q, 1), CY + pw(10, p.amp, q, 2));
  },
  "カメラの手ブレ風": (t, p, d) => d.sq(CX + pw(0.5, 20, t, 1) + pw(8, 3, t, 3), CY + pw(0.5, 20, t, 2) + pw(8, 3, t, 4)),
  "ランダム配置(シード固定)": (t, p, d) => {
    const R = (n) => { const x = Math.sin(n * 127.1) * 43758.5453; return x - Math.floor(x); };
    for (let i = 0; i < 5; i++) d.sq(25 + R(i + 1) * 270, 18 + R(i + 11) * 84, { size: 16, color: i ? "#8a8a94" : undefined });
    d.label("index毎に固定");
  },
  "キーフレームをループ": (t, p, d) => {
    const tt = (t % 1.6) / 1.0;
    d.kfmark(70, CY); d.kfmark(250, CY);
    d.sq(70 + Math.min(tt, 1) * 180, CY);
    d.label("cycle");
  },
  "最初のキーの前もループ": (t, p, d) => {
    const tt = t % 2, ph = tt < 1 ? tt : 2 - tt;
    d.kfmark(70, CY); d.kfmark(250, CY);
    d.sq(70 + ph * 180, CY);
    d.label("前後にループ");
  },
  "バウンス(キーフレーム後に弾む)": (t, p, d) => {
    const T = 2.4, tt = t % T, D = 0.55, v = 180 / D;
    let x;
    if (tt < D) x = 70 + (tt / D) * 180;
    else { const t2 = tt - D; x = 250 + v * p.amp * Math.sin(p.freq * t2 * 6.283) / Math.exp(p.decay * t2); }
    d.kfmark(70, CY); d.kfmark(250, CY);
    d.sq(x, CY);
  },
  "マーカーでポップ(スケール)": (t, p, d) => {
    const T = 1.4, tt = t % T;
    const sc = p.amp * Math.sin(p.freq * tt * 6.283) / Math.exp(p.decay * tt);
    d.sq(CX, CY, { scale: 1 + sc / 100 });
    d.label(tt < 0.12 ? "◆ marker!" : "◆");
  },
  "振り子(だんだん止まる)": (t, p, d) => {
    const T = 5, tt = t % T;
    const rot = p.amp * Math.sin(p.freq * tt * 6.283) / Math.exp(p.decay * tt);
    const a = (rot - 90) * Math.PI / 180;
    const px2 = CX + Math.cos(a) * -52, py2 = 14 - Math.sin(a) * -52;
    d.line(CX, 14, px2, py2);
    d.sq(px2, py2, { size: 20, rot });
  },
  "他レイヤーを遅れて追いかける": (t, p, d) => {
    const L = liss(t), F = liss(t - p.delay);
    d.dot(L.x, L.y, "#8a8a94"); d.label("グレー=リーダー");
    d.sq(F.x, F.y, { size: 22 });
  },
  "複製で時間差追従(index)": (t, p, d) => {
    const L = liss(t);
    d.dot(L.x, L.y, "#8a8a94");
    for (let i = 1; i <= 3; i++) { const F = liss(t - p.delay * i); d.sq(F.x, F.y, { size: 22 - i * 4 }); }
  },
  "他レイヤーの方を向く": (t, p, d) => {
    const tg = liss(t);
    d.dot(tg.x, tg.y, "#8a8a94");
    d.arrow(CX, CY, Math.atan2(tg.y - CY, tg.x - CX));
  },
  "動きをなめらかに(smooth)": (t, p, d) => {
    const raw = (x) => ({ x: liss(x).x + pw(7, 14, x, 5), y: liss(x).y + pw(7, 14, x, 6) });
    const r = raw(t);
    let sx = 0, sy = 0, N = 7;
    for (let i = 0; i < N; i++) { const q = raw(t - p.w / 2 + p.w * i / (N - 1)); sx += q.x; sy += q.y; }
    d.dot(r.x, r.y, "#8a8a94"); d.label("グレー=元の動き");
    d.sq(sx / N, sy / N, { size: 22 });
  },
  "音に反応(オーディオ振幅)": (t, p, d) => {
    const beat = Math.pow(Math.max(0, Math.sin(t * 6.283)), 8);
    d.sq(CX, CY, { scale: 1 + 0.5 * beat * p.mul });
    for (let i = 0; i < 5; i++) d.bar(30 + i * 12, 100, 8, 6 + 24 * Math.pow(Math.max(0, Math.sin(t * 6.283 + i)), 4));
  },
  "カウントアップ数字": (t, p, d) => d.bigtext(fmtNum(Math.floor((t % 6) * p.rate))),
  "スライダーの値を表示": (t, p, d) => {
    const ph = (t % 3) / 3;
    d.bigtext(fmtNum(Math.round(ph * 10000)));
    d.label("スライダー: " + (ph * 100).toFixed(0) + "%");
  },
  "タイムコード表示": (t, p, d) => {
    const tt = t % 600, m = Math.floor(tt / 60), sc = Math.floor(tt % 60), f = Math.floor((tt % 1) * 30);
    const z = (n) => ("0" + n).slice(-2);
    d.bigtext(z(m) + ":" + z(sc) + ":" + z(f));
  },
  "タイプライター(1文字ずつ)": (t, p, d) => {
    const str = "ここに表示したい文章";
    const T = p.dur + 1.2, tt = t % T;
    const n = Math.floor(Math.min(1, tt / p.dur) * str.length);
    d.bigtext(str.substr(0, n) + (tt % 0.8 < 0.4 ? "|" : ""), 17);
  },
  "画面中央に配置": (t, p, d) => { d.cross(); d.sq(CX, CY); },
  "indexで横に等間隔に並べる": (t, p, d) => {
    const g = Math.max(20, Math.min(Math.abs(p.gap) * 0.5, 80)) * Math.sign(p.gap || 1);
    for (let i = 0; i < 4; i++) d.sq(CX + (i - 1.5) * g, CY, { size: 22 });
  },
  "indexで時間差フェードイン": (t, p, d) => {
    const T = 4 * (p.delay * 3 + p.dur) > 2 ? (p.delay * 3 + p.dur + 1.2) : 3;
    const tt = t % T;
    for (let i = 0; i < 4; i++) {
      const o = Math.max(0, Math.min(1, (tt - i * p.delay) / Math.max(0.05, p.dur)));
      d.sq(75 + i * 57, CY, { size: 26, opacity: o });
    }
  },
  "テキスト幅に合わせる下線・座布団": (t, p, d) => {
    const texts = ["短い", "ながーいテキスト"];
    const idx = Math.floor(t / 1.8) % 2;
    const ph = (t % 1.8) / 1.8;
    const w1 = d.measure(texts[idx], 15) + p.pad * 0.4;
    const w0 = d.measure(texts[(idx + 1) % 2], 15) + p.pad * 0.4;
    const w = ph < 0.18 ? w0 + (w1 - w0) * (ph / 0.18) : w1;
    d.bar(CX - w / 2, CY + 12, w, 6);
    d.textAt(texts[idx], CX, CY, 15);
  },
  "等速でずっと回転": (t, p, d) => d.sq(CX, CY, { rot: t * p.speed, size: 34 }),
  "円運動(周回)": (t, p, d) => {
    const r = Math.min(Math.abs(p.r) * 0.22, 48);
    const a = t * p.speed * 6.283;
    d.dot(CX, CY, "#3a3a44");
    d.sq(CX + Math.cos(a) * r, CY + Math.sin(a) * r, { size: 20 });
  },
  "縦横比を固定してスケール": (t, p, d) => d.sq(CX, CY, { scale: 1 + 0.28 * Math.sin(t * 2.2), size: 30 }),
  "点滅(パカパカ)": (t, p, d) => d.sq(CX, CY, { opacity: Math.sin(t * p.freq * 6.283) > 0 ? 1 : 0 }),
  "コマ落ち(fpsを落とす)": (t, p, d) => {
    const x = (q) => 60 + ((q * 70) % 200);
    d.dot(x(t), 32, "#3a3a44"); d.label("グレー=元(滑らか)");
    const q = Math.floor(t * Math.max(1, p.fps)) / Math.max(1, p.fps);
    d.sq(x(q), 80, { size: 22 });
  },
  "別プロパティにリンク(範囲制限つき)": (t, p, d) => {

    const c = Math.max(20, Math.min(80, v));
    d.sq(CX, CY, { opacity: c / 100 });
    d.label("元 " + v.toFixed(0) + " → clamp " + c.toFixed(0));
  },
  "チェックボックスで表示切替": (t, p, d) => {
    const on = Math.floor(t) % 2 === 0;
    d.textAt(on ? "☑" : "☐", 30, CY, 22);
    d.sq(CX, CY, { opacity: on ? 1 : 0 });
  },
  "ポップイン(弾んで登場)": (t, p, d) => {
    const T = 2.4, tt = t % T;
    const sc = (100 - 100 * Math.cos(p.freq * tt * 6.283) / Math.exp(p.decay * tt)) / 100;
    d.sq(CX, CY, { scale: Math.max(0, sc), size: 34 });
  },
  "フェードイン/アウト自動": (t, p, d) => {
    const T = 3.2, tt = t % T, out = 2.6;
    const io = Math.max(0, Math.min(1, tt / Math.max(0.05, p.fade)));
    const oo = Math.max(0, Math.min(1, (out - tt) / Math.max(0.05, p.fade)));
    d.sq(CX, CY, { opacity: Math.min(io, oo) });
    d.label(tt < p.fade ? "イン点フェード" : tt > out - p.fade ? "アウト点フェード" : "");
  },
  "BPMで脈打つ(音楽同期)": (t, p, d) => {
    const beat = Math.pow(Math.max(0, Math.sin(t * p.bpm / 60 * Math.PI * 2)), 8);
    d.sq(CX, CY, { scale: 1 + beat * p.amp / 40, size: 32 });
    d.label(p.bpm + " BPM");
  },
  "エンドロール(自動スクロール)": (t, p, d) => {
    const sp = Math.max(10, p.speed) * 0.45;
    for (let i = 0; i < 7; i++) {
      const y = ((140 + i * 34 - t * sp) % 238 + 238) % 238 - 40;
      d.bar(CX - 60, y, 120 - (i % 3) * 26, 8);
    }
  },
  "画面端で跳ね返る(DVD風)": (t, p, d) => {
    const tri = (x, m) => { x = ((x % (2 * m)) + 2 * m) % (2 * m); return x < m ? x : 2 * m - x; };
    d.sq(12 + tri(p.vx * 0.35 * t, 296), 12 + tri(p.vy * 0.35 * t, 96), { size: 22 });
  },
  "グリッチ明滅(ランダム点滅)": (t, p, d) => {
    const q = Math.floor(t * Math.max(1, p.fps));
    const R = (n) => { const x = Math.sin(n * 127.1) * 43758.5453; return x - Math.floor(x); };
    d.sq(CX, CY, { opacity: R(q) < p.rate ? 1 : 0 });
  },
  "位置グリッチ(瞬間ズレ)": (t, p, d) => {
    const q = Math.floor(t * Math.max(1, p.fps));
    const R = (n) => { const x = Math.sin(n * 127.1) * 43758.5453; return x - Math.floor(x); };
    let x = CX, y = CY;
    if (R(q) < p.prob) { x += (R(q + 0.3) - 0.5) * 2 * p.amp; y += (R(q + 0.7) - 0.5) * 2 * Math.min(p.amp, 35); }
    d.sq(x, y);
  },
  "数字ロール(目標値で止まる)": (t, p, d) => {
    const T = p.dur + 1.6, tt = t % T;
    const ph = Math.max(0, Math.min(1, tt / Math.max(0.1, p.dur)));
    const e = 1 - Math.pow(1 - ph, 3);
    d.bigtext(fmtNum(Math.floor(e * p.target)));
  },
  "カウントダウン": (t, p, d) => {
    const T = p.total + 1.5, tt = t % T;
    d.bigtext(Math.ceil(Math.max(p.total - tt, 0)).toString(), 30);
  },
  "円形に等間隔配置": (t, p, d) => {
    const n = Math.max(2, Math.min(24, Math.round(p.n)));
    const r = Math.min(Math.abs(p.r) * 0.15, 46);
    for (let i = 0; i < n; i++) {
      const a = i * 2 * Math.PI / n - Math.PI / 2;
      d.sq(CX + Math.cos(a) * r, CY + Math.sin(a) * r, { size: Math.max(8, 20 - n * 0.5) });
    }
  },
  "秒針・カクカク回転": (t, p, d) => {
    const steps = Math.max(2, p.steps);
    const rot = Math.floor((t * 6) * steps / 60) * (360 / steps); // デモは6倍速
    const a = (rot - 90) * Math.PI / 180;
    for (let i = 0; i < 12; i++) {
      const b = i * Math.PI / 6;
      d.dot(CX + Math.cos(b) * 46, CY + Math.sin(b) * 46, "#3a3a44");
    }
    d.line(CX, CY, CX + Math.cos(a) * 42, CY + Math.sin(a) * 42);
    d.dot(CX, CY);
  },
  "ウェーブ(複製で波)": (t, p, d) => {
    for (let i = 0; i < 6; i++) {
      d.sq(48 + i * 45, CY + Math.sin(t * p.speed * 6.283 + i * p.phase) * Math.min(p.amp, 38), { size: 20 });
    }
  },
  "常にカメラ目線(3Dビルボード)": (t, p, d) => {
    const cam = liss(t);
    d.dot(cam.x, cam.y, "#8a8a94"); d.label("グレー=カメラ");
    const ang = Math.atan2(cam.y - CY, cam.x - CX);
    d.arrow(CX, CY, ang);
  },
};

const cvMap = new Map();   // canvas -> entry
const visibleCv = new Set();
const io = new IntersectionObserver((es) => {
  for (const en of es) {
    if (en.isIntersecting) visibleCv.add(en.target);
    else visibleCv.delete(en.target);
  }
});

function resolvedParams(e) {
  const o = {};
  for (const p of e.params || []) {
    const v = parseFloat((state.pvals[e.id] || {})[p.k]);
    o[p.k] = Number.isFinite(v) ? v : p.d;
  }
  return o;
}

function makeDraw(ctx, W, H) {
  const kx = W / 320, ky = H / 120;
  const S = Math.min(kx, ky);
  const X = (x) => x * kx, Y = (y) => y * ky;
  const d = {};
  d.sq = (x, y, o = {}) => {
    const size = (o.size || 26) * S * (o.scale != null ? o.scale : 1);
    ctx.save();
    ctx.globalAlpha = o.opacity != null ? o.opacity : 1;
    ctx.translate(X(x), Y(y));
    ctx.rotate((o.rot || 0) * Math.PI / 180);
    ctx.fillStyle = o.color || "#f7c114";
    const r = Math.min(5, size * 0.18);
    ctx.beginPath();
    ctx.roundRect(-size / 2, -size / 2, size, size, r);
    ctx.fill();
    ctx.restore();
  };
  d.dot = (x, y, color) => {
    ctx.fillStyle = color || "#f7c114";
    ctx.beginPath();
    ctx.arc(X(x), Y(y), 5 * S, 0, 7);
    ctx.fill();
  };
  d.bar = (x, y, w, h) => { ctx.fillStyle = "#f7c114"; ctx.fillRect(X(x), Y(y) - h * S, w * S, h * S); };
  d.line = (x1, y1, x2, y2) => {
    ctx.strokeStyle = "#55555f"; ctx.lineWidth = 2 * S;
    ctx.beginPath(); ctx.moveTo(X(x1), Y(y1)); ctx.lineTo(X(x2), Y(y2)); ctx.stroke();
  };
  d.hline = (y) => { ctx.strokeStyle = "#26262c"; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(0, Y(y)); ctx.lineTo(W, Y(y)); ctx.stroke(); };
  d.cross = () => {
    ctx.strokeStyle = "#26262c"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(X(CX), 0); ctx.lineTo(X(CX), H); ctx.moveTo(0, Y(CY)); ctx.lineTo(W, Y(CY)); ctx.stroke();
  };
  d.kfmark = (x, y) => {
    ctx.save();
    ctx.translate(X(x), Y(y + 34));
    ctx.rotate(Math.PI / 4);
    ctx.fillStyle = "#55555f";
    ctx.fillRect(-4 * S, -4 * S, 8 * S, 8 * S);
    ctx.restore();
  };
  d.arrow = (x, y, ang) => {
    ctx.save();
    ctx.translate(X(x), Y(y));
    ctx.rotate(ang);
    ctx.fillStyle = "#f7c114";
    ctx.beginPath();
    ctx.moveTo(22 * S, 0); ctx.lineTo(-14 * S, -12 * S); ctx.lineTo(-8 * S, 0); ctx.lineTo(-14 * S, 12 * S);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  };
  d.label = (str) => {
    ctx.fillStyle = "#9a9aa4";
    ctx.font = (11 * S) + "px sans-serif";
    ctx.textAlign = "left"; ctx.textBaseline = "top";
    ctx.fillText(str, 8, 7);
  };
  d.bigtext = (str, size = 26) => {
    ctx.fillStyle = "#f7f2ee";
    ctx.font = "700 " + (size * S) + "px ui-monospace, Menlo, monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(str, X(CX), Y(CY));
  };
  d.textAt = (str, x, y, size = 14) => {
    ctx.fillStyle = "#f7f2ee";
    ctx.font = "700 " + (size * S) + "px sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(str, X(x), Y(y));
  };
  d.measure = (str, size = 14) => {
    ctx.font = "700 " + (size * S) + "px sans-serif";
    return ctx.measureText(str).width / kx;
  };
  return d;
}

const demoT0 = performance.now();
function demoLoop(now) {
  const t = (now - demoT0) / 1000;
  for (const cv of visibleCv) {
    if (!cv.isConnected) { visibleCv.delete(cv); cvMap.delete(cv); continue; }
    const e = cvMap.get(cv);
    if (!e) continue;
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    const W = cv.clientWidth * dpr, H = cv.clientHeight * dpr;
    if (!W) continue;
    if (cv.width !== W) { cv.width = W; cv.height = H; }
    const ctx = cv.getContext("2d");
    ctx.clearRect(0, 0, W, H);
    try { DEMOS[e.title](t, resolvedParams(e), makeDraw(ctx, W, H)); } catch (err) {}
  }
  requestAnimationFrame(demoLoop);
}
requestAnimationFrame(demoLoop);

/* ---------- state ---------- */
let state = { lang: "jp", favs: [], my: [], cat: "すべて", pvals: {} };
try { Object.assign(state, JSON.parse(localStorage.getItem(LS_KEY) || "{}")); } catch (e) {}
function save() { try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {} }

function toEnglish(code) {
  let s = code;
  for (const [jp, en] of JP2EN) s = s.split(jp).join(en);
  return s;
}
function renderCode(e) {
  let code = e.code;
  for (const p of e.params || []) {
    const v = (state.pvals[e.id] || {})[p.k];
    code = code.split("{{" + p.k + "}}").join(v != null && v !== "" ? v : p.d);
  }
  return state.lang === "en" ? toEnglish(code) : code;
}
function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { t.style.display = "none"; }, 1800);
}
async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    toast("コピーしました");
  } catch (err) {
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();
    toast("コピーしました");
  }
}

/* ---------- top controls ---------- */
function renderLang() {
  $("langToggle").innerHTML = state.lang === "jp"
    ? "エフェクト名: <b>日本語版AE</b>"
    : "エフェクト名: <b>英語版AE</b>";
}
$("langToggle").addEventListener("click", () => {
  state.lang = state.lang === "jp" ? "en" : "jp";
  save(); renderLang(); renderList();
});
$("search").addEventListener("input", renderList);

function renderCats() {
  const box = $("cats");
  box.textContent = "";
  for (const c of ["すべて", "★お気に入り", ...CATS]) {
    const b = document.createElement("button");
    b.textContent = c;
    if (state.cat === c) b.classList.add("sel");
    b.addEventListener("click", () => { state.cat = c; save(); renderCats(); renderList(); });
    box.appendChild(b);
  }
}

/* ---------- library list ---------- */
function renderList() {
  const list = $("list");
  list.textContent = "";
  const q = $("search").value.trim().toLowerCase();
  let items = LIB;
  if (state.cat === "★お気に入り") items = items.filter(e => state.favs.includes(e.id));
  else if (state.cat !== "すべて") items = items.filter(e => e.cat === state.cat);
  if (q) items = items.filter(e =>
    (e.title + e.desc + e.code + e.cat + e.target).toLowerCase().includes(q));

  if (!items.length) {
    const d = document.createElement("div");
    d.id = "empty";
    d.textContent = "該当なし";
    list.appendChild(d);
    return;
  }
  for (const e of items) list.appendChild(expCard(e));
}

function expCard(e) {
  const card = document.createElement("div");
  card.className = "exp";

  const head = document.createElement("div");
  head.className = "ehead";
  const t = document.createElement("div");
  t.className = "t";
  t.textContent = e.title;
  const cat = document.createElement("span");
  cat.className = "cat";
  cat.textContent = e.cat;
  const fav = document.createElement("button");
  fav.className = "fav" + (state.favs.includes(e.id) ? " on" : "");
  fav.textContent = "★";
  fav.addEventListener("click", () => {
    state.favs = state.favs.includes(e.id)
      ? state.favs.filter(x => x !== e.id)
      : [...state.favs, e.id];
    save();
    fav.classList.toggle("on");
    if (state.cat === "★お気に入り") renderList();
  });
  head.append(t, cat, fav);

  const desc = document.createElement("div");
  desc.className = "desc";
  desc.textContent = e.desc;
  const target = document.createElement("div");
  target.className = "target";
  target.textContent = "適用先: " + e.target;

  card.append(head, desc, target);

  if (DEMOS[e.title]) {
    const cv = document.createElement("canvas");
    cv.className = "demo";
    cvMap.set(cv, e);
    io.observe(cv);
    card.appendChild(cv);
  }

  const codeRow = document.createElement("div");
  codeRow.className = "codeRow";
  const pre = document.createElement("pre");
  pre.textContent = renderCode(e);

  if (e.params) {
    const ps = document.createElement("div");
    ps.className = "params";
    for (const p of e.params) {
      const label = document.createElement("label");
      label.textContent = p.l;
      const inp = document.createElement("input");
      inp.inputMode = "decimal";
      inp.value = (state.pvals[e.id] || {})[p.k] ?? p.d;
      inp.addEventListener("input", () => {
        state.pvals[e.id] = state.pvals[e.id] || {};
        state.pvals[e.id][p.k] = inp.value;
        save();
        pre.textContent = renderCode(e);
      });
      label.appendChild(inp);
      ps.appendChild(label);
    }
    card.appendChild(ps);
  }

  const cp = document.createElement("button");
  cp.className = "copyBtn";
  cp.textContent = "コピー";
  cp.addEventListener("click", () => copyText(renderCode(e)));
  codeRow.append(pre, cp);
  card.appendChild(codeRow);
  return card;
}

/* ---------- my snippets ---------- */
function renderMy() {
  const box = $("myList");
  box.textContent = "";
  if (!state.my.length) {
    const d = document.createElement("div");
    d.style.cssText = "color:var(--dim);font-size:13px;";
    d.textContent = "現場でよく使う自作エクスプレッションをここに保存できます。";
    box.appendChild(d);
    return;
  }
  for (const m of state.my) {
    const card = document.createElement("div");
    card.className = "exp";
    const title = document.createElement("input");
    title.className = "myTitle";
    title.placeholder = "タイトル(例: ○○案件のカウンター)";
    title.value = m.title;
    title.addEventListener("input", () => { m.title = title.value; save(); });
    const area = document.createElement("textarea");
    area.className = "myArea";
    area.placeholder = "// エクスプレッションを貼り付け";
    area.value = m.code;
    area.addEventListener("input", () => { m.code = area.value; save(); });
    const btns = document.createElement("div");
    btns.className = "myBtns";
    const cp = document.createElement("button");
    cp.className = "cp";
    cp.textContent = "コピー";
    cp.addEventListener("click", () => copyText(m.code));
    const del = document.createElement("button");
    del.className = "del";
    del.textContent = "削除";
    del.addEventListener("click", () => {
      if (!confirm("「" + (m.title || "(無題)") + "」を削除しますか?")) return;
      state.my = state.my.filter(x => x.id !== m.id);
      save(); renderMy();
    });
    btns.append(cp, del);
    card.append(title, area, btns);
    box.appendChild(card);
  }
}
$("addMy").addEventListener("click", () => {
  state.my.unshift({ id: newId(), title: "", code: "" });
  save(); renderMy();
  $("myList").querySelector(".myTitle")?.focus();
});

/* ---------- boot ---------- */
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
renderLang();
renderCats();
renderList();
renderMy();
</script>
