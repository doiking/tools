<!DOCTYPE html>

<meta charset="UTF-8">
<title>8hammer MCPブリッジ</title>
<style>
  :root{
    --bg:#0e0e11; --panel:#1c1c22; --line:#33333c; --fg:#f2f2ee;
    --dim:#9a9aa4; --accent:#f7c114; --ok:#3ecf6e; --ng:#ff5a5a;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Yu Gothic UI",sans-serif;
    font-size:13px; padding:10px; display:flex; flex-direction:column; gap:10px; height:100vh; overflow:hidden;
  }
  #top{display:flex; align-items:center; gap:8px;}
  #top img{height:20px;}
  #top h1{font-size:14px; font-weight:700; margin:0; flex:1;}
  .panel{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px;}
  .ptitle{font-size:11px; letter-spacing:.08em; color:var(--dim); margin-bottom:7px;}
  .row{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  label{font-size:11.5px; color:var(--dim);}
  input[type=text],input[type=number]{
    background:#16161b; color:var(--fg); border:1px solid var(--line);
    border-radius:7px; font-size:12.5px; padding:6px 8px; font-family:inherit;
  }
  input:focus{outline:none; border-color:var(--accent);}
  button{
    background:var(--accent); color:#17130a; border:none; border-radius:8px;
    font-size:12.5px; font-weight:800; padding:7px 12px; cursor:pointer; font-family:inherit;
  }
  button.sub{background:var(--panel); color:var(--fg); border:1px solid var(--line); font-weight:600;}
  #state{font-size:12px; line-height:1.6;}
  #state .dot{display:inline-block; width:9px; height:9px; border-radius:50%; background:var(--ng); margin-right:6px; vertical-align:middle;}
  #state.on .dot{background:var(--ok);}
  #ep{font-family:ui-monospace,Menlo,Consolas,monospace; color:var(--accent); font-size:12px;}
  #log{flex:1; overflow-y:auto; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:11px; line-height:1.6; background:#101014; border:1px solid #26262c; border-radius:8px; padding:8px;}
  .le{white-space:pre-wrap; word-break:break-word; border-bottom:1px solid #1c1c22; padding:2px 0;}
  .le .t{color:var(--dim);}
  .le.err{color:var(--ng);}
  .le.ok .fn{color:var(--ok);}
  .fn{color:var(--accent); font-weight:700;}
  .note{font-size:11px; color:var(--dim); line-height:1.6;}
</style>
</head>

    <h1>MCPブリッジ</h1>
  </div>

  <div class="panel">
    <div class="ptitle">ローカル窓口(Claude Code から接続)</div>
    <div class="row" style="margin-bottom:8px">
      <label>ポート</label>
      <input type="number" id="port" value="8722" style="width:82px">
      <label>トークン</label>
      <input type="text" id="token" value="8hammer-local" style="flex:1;min-width:110px">
    </div>
    <div class="row" style="margin-bottom:8px">
      <button id="btnStart">起動</button>
      <button id="btnStop" class="sub">停止</button>
    </div>
    <div id="state"><span class="dot"></span><span id="stateText">停止中</span></div>
    <div id="ep" style="margin-top:4px"></div>
  </div>

  <div class="ptitle" style="margin:0 2px -4px">通信ログ</div>
  <div id="log"></div>

  <div class="note">
    このパネルは Premiere を外部から操作するための小さな窓口(localhostのみ)です。
    Claude Code はここを叩いて Premiere を動かします。データは端末内で完結し、外部送信はありません。
  </div>

<script>
"use strict";
const LS="mcpbridge.v1";
const $=(id)=>document.getElementById(id);
const bridge=window.__adobe_cep__||null;

let pref={port:8722,token:"8hammer-local"};
try{Object.assign(pref,JSON.parse(localStorage.getItem(LS)||"{}"));}catch(e){}
$("port").value=pref.port; $("token").value=pref.token;
function savePref(){try{localStorage.setItem(LS,JSON.stringify(pref));}catch(e){}}

function nodeRequire(){
  try{ return (window.cep_node&&window.cep_node.require)||window.require||require; }catch(e){ return null; }
}

/* ---- Premiere呼び出し(evalScript) ---- */
function jsx(code){
  return new Promise((resolve,reject)=>{
    if(!bridge){reject(new Error("Premiere外です"));return;}
    bridge.evalScript(code,(r)=>{
      if(typeof r==="string"&&r.indexOf("EvalScript error")===0) reject(new Error("EvalScript失敗: "+r));
      else resolve(r);
    });
  });
}
function jstr(v){return JSON.stringify(v);}

/* ツール名 → host.jsx 呼び出し文字列 */
function buildCall(fn,args){
  args=args||{};
  switch(fn){
    case "get_project_overview": return "paGetOverview()";
    case "get_active_sequence":  return "paGetSequence()";
    case "get_selection":        return "paGetSelection()";
    case "create_sequence":      return "paCreateSequence("+jstr(String(args.name||"sequence"))+")";
    case "place_clip":           return "paPlaceClip("+jstr(JSON.stringify(args))+")";
    case "add_marker":           return "paAddMarker("+jstr(JSON.stringify(args))+")";
    case "set_playhead":         return "paSetPlayhead("+Number(args.seconds||0)+")";
    case "import_files":         return "paImport("+jstr(JSON.stringify(args))+")";
    default: return null;
  }
}

/* ---- ログ ---- */
function logLine(cls,fn,detail){
  const box=$("log");
  const el=document.createElement("div");
  el.className="le "+(cls||"");
  const t=new Date();
  const ts=("0"+t.getHours()).slice(-2)+":"+("0"+t.getMinutes()).slice(-2)+":"+("0"+t.getSeconds()).slice(-2);
  const s=document.createElement("span"); s.className="t"; s.textContent="["+ts+"] ";
  const f=document.createElement("span"); f.className="fn"; f.textContent=fn+" ";
  el.append(s,f,document.createTextNode(detail||""));
  box.appendChild(el);
  box.scrollTop=box.scrollHeight;
  while(box.childNodes.length>200) box.removeChild(box.firstChild);
}

/* ---- HTTPサーバ ---- */
let server=null;
function setState(on,text){
  $("state").className=on?"on":"";
  $("stateText").textContent=text;
}
function endpoint(){ return "http://127.0.0.1:"+pref.port+"/call"; }

function start(){
  if(server){logLine("","(info)","すでに起動しています");return;}
  const req=nodeRequire();
  if(!req){logLine("err","(error)","Node統合が無効です(manifestの--enable-nodejsを確認)");return;}
  let http;
  try{ http=req("http"); }catch(e){ logLine("err","(error)","httpモジュール取得失敗: "+e.message); return; }

  server=http.createServer((rq,rs)=>{
    if(rq.method==="OPTIONS"){ rs.writeHead(204); rs.end(); return; }
    if(rq.method!=="POST"||rq.url!=="/call"){ rs.writeHead(404,{"content-type":"application/json"}); rs.end('{"err":"POST /call のみ対応"}'); return; }
    if(pref.token && rq.headers["x-8h-token"]!==pref.token){
      rs.writeHead(401,{"content-type":"application/json"}); rs.end('{"err":"トークン不一致"}');
      logLine("err","(auth)","トークン不一致で拒否");
      return;
    }
    let body="";
    rq.on("data",d=>{ body+=d; if(body.length>1e6){ rq.destroy(); } });
    rq.on("end",async ()=>{
      let fn="?",args={};
      try{
        const p=JSON.parse(body||"{}"); fn=p.fn; args=p.args||{};
        const code=buildCall(fn,args);
        if(!code) throw new Error("未知のツール: "+fn);
        const out=await jsx(code);
        rs.writeHead(200,{"content-type":"application/json"}); rs.end(out);
        let bad=false; try{bad=!!JSON.parse(out).err;}catch(e){}
        logLine(bad?"err":"ok",fn,(bad?"→ ":"→ ok ")+String(out).slice(0,120));
      }catch(e){
        const msg=String(e.message||e);
        rs.writeHead(500,{"content-type":"application/json"}); rs.end(JSON.stringify({err:msg}));
        logLine("err",fn,"→ "+msg);
      }
    });
  });
  server.on("error",(e)=>{
    logLine("err","(server)",e.message);
    setState(false,"エラー: "+e.message);
    server=null;
  });
  server.listen(pref.port,"127.0.0.1",()=>{
    setState(true,"起動中");
    $("ep").textContent=endpoint();
    logLine("ok","(server)","起動 "+endpoint());
  });
}
function stop(){
  if(!server){logLine("","(info)","起動していません");return;}
  try{ server.close(); }catch(e){}
  server=null;
  setState(false,"停止中");
  $("ep").textContent="";
  logLine("","(server)","停止");
}

$("btnStart").addEventListener("click",()=>{
  pref.port=parseInt($("port").value,10)||8722;
  pref.token=$("token").value;
  savePref();
  start();
});
$("btnStop").addEventListener("click",stop);
$("port").addEventListener("change",()=>{pref.port=parseInt($("port").value,10)||8722;savePref();});
$("token").addEventListener("change",()=>{pref.token=$("token").value;savePref();});

if(!bridge){ setState(false,"Premiere外"); logLine("err","(info)","Premiere外で開かれています。エクステンションとして起動してください。"); }
else { start(); }  /* パネルを開いたら自動起動 */
</script>
</body>
